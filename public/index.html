                                  return <p key={pi} className="text-sm text-gray-900 whitespace-pre-wrap">{part.text}</p>;
                                }
                                if (part.type === 'image_url' && part.image_url?.url) {
                                  return <img key={pi} src={part.image_url.url} alt="attachment" className="max-w-full max-h-[300px] rounded-lg border border-gray-200 object-contain" />;
                                }
                                return null;
                              })}
                            </div>
                          ) : (
                            <p className="text-sm text-gray-900 whitespace-pre-wrap">{msg.content}</p>
                          )}
                        </div>
                        {!streaming && (
                          <button onClick={() => handleEdit(i)}
                            title="Edit and resend"
                            className="opacity-0 group-hover/user:opacity-100 transition-opacity absolute left-1 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-400 hover:text-gray-600 hover:border-gray-300 shadow-sm">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                        )}
                      </div>
                    ) : (
                      <div className="max-w-[600px] flex flex-col gap-2">
                        <div className="px-4 py-3 bg-white border border-gray-200 rounded-2xl rounded-tl-sm group/msg relative">
                          <div className="md-body text-sm text-gray-900" dangerouslySetInnerHTML={{ __html: renderMd(msg.content) }} />
                          {!streaming && msg.content && (
                            <div className="flex absolute top-2 right-2 gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
                              <button onClick={() => { if (ttsSpeaking) TTS.stop(); else TTS.speak(msg.content, ttsVoice); }}
                                className="px-2 py-1 text-gray-500 bg-white/90 border border-gray-200 rounded-md hover:bg-gray-100 hover:text-gray-700 backdrop-blur-sm flex items-center gap-1"
                                title={ttsSpeaking ? 'Stop reading' : 'Read aloud'}>
                                {ttsSpeaking ? Icons.speakerOff('#6b7280') : Icons.speaker('#6b7280')}<span className="text-[10px]">{ttsSpeaking ? 'Stop' : 'Listen'}</span></button>
                              <button onClick={() => { copyToClipboard(msg.content); }}
                                className="px-2 py-1 text-gray-500 bg-white/90 border border-gray-200 rounded-md hover:bg-gray-100 hover:text-gray-700 backdrop-blur-sm flex items-center gap-1">
                                {Icons.copy('#6b7280')}<span className="text-[10px]">Copy</span></button>
                              <button onClick={() => downloadFile(`response-${i}.md`, msg.content)}
                                className="px-2 py-1 text-gray-500 bg-white/90 border border-gray-200 rounded-md hover:bg-gray-100 hover:text-gray-700 backdrop-blur-sm flex items-center gap-1">
                                {Icons.download('#6b7280')}<span className="text-[10px]">Save</span></button>
                            </div>
                          )}
                        </div>
                        {/* Code block save buttons */}
                        {!streaming && msg.content && (() => {
                          const blocks = extractCodeBlocks(msg.content);
                          if (blocks.length === 0) return null;
                          return (
                            <div className="flex flex-wrap items-center gap-2">
                              {blocks.map((b, j) => (
                                <button key={j} onClick={() => downloadFile(b.filename, b.code)}
                                  className="flex items-center gap-1 px-2 py-1 text-[11px] text-gray-500 bg-gray-50 border border-gray-200 rounded-md hover:bg-gray-100">
                                  {Icons.save('#6b7280')} {b.filename}
                                </button>
                              ))}
                              {blocks.length > 1 && (
                                <button onClick={() => downloadAllAsZip(blocks)}
                                  className="flex items-center gap-1 px-2 py-1 text-[11px] text-indigo-500 bg-indigo-50 border border-indigo-200 rounded-md hover:bg-indigo-100">
                                  {Icons.download('#6366f1')} Save all (.zip)
                                </button>
                              )}
                            </div>
                          );
                        })()}
                        {/* Stats */}
                        {(() => {
                          const s = activeConvId && statsMapRef.current[`${activeConvId}-${i}`];
                          if (!s) return null;
                          const statsText = `Total: ${s.totalTime?.toFixed(2)}s | TTFT: ${s.ttft?.toFixed(3)}s | Gen: ${s.genTime?.toFixed(2)}s | Speed: ${s.speed?.toFixed(1)} tk/s | Prompt: ${s.promptTokens || '—'} tk | Completion: ${s.completionTokens} tk | Chunks: ${s.chunks} | Chunk rate: ${s.chunkRate?.toFixed(1)}/s`;
                          return (
                            <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 mono text-[11px]">
                              <div className="flex justify-between items-center mb-2">
                                <span className="text-gray-500 font-semibold text-[10px] uppercase tracking-wider">Stats</span>
                                <button onClick={() => copyToClipboard(statsText)}
                                  className="text-gray-400 hover:text-gray-600 border border-gray-200 px-1.5 py-0.5 rounded flex items-center gap-1">
                                  {Icons.copy('#9ca3af')}<span className="text-[10px]">Copy</span></button>
                              </div>
                              <div className="grid grid-cols-4 gap-x-4 gap-y-1.5">
                                <div className="flex flex-col"><span className="text-gray-400">Total</span><span className="text-gray-700 font-medium">{s.totalTime?.toFixed(2)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">TTFT</span><span className="text-amber-500 font-medium">{s.ttft?.toFixed(3)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Generation</span><span className="text-gray-700 font-medium">{s.genTime?.toFixed(2)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Speed</span><span className="text-emerald-500 font-medium">{s.speed?.toFixed(1)} tk/s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Prompt</span><span className="text-gray-700 font-medium">{s.promptTokens || '—'} tk</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Completion</span><span className="text-indigo-400 font-medium">{s.completionTokens} tk</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Chunks</span><span className="text-gray-700 font-medium">{s.chunks}</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Chunk rate</span><span className="text-gray-700 font-medium">{s.chunkRate?.toFixed(1)}/s</span></div>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                ))}
                {streaming && (
                  <div className="flex justify-start">
                    {activeToolStatus ? (
                      <div className="px-3 py-2 text-sm flex items-center gap-2">
                        <span className="animate-spin text-indigo-500">⚙</span>
                        <span className="text-indigo-500 font-medium">
                          {activeToolStatus.tool === 'web_search' && `Searching: ${activeToolStatus.args?.query || '...'}`}
                          {activeToolStatus.tool === 'web_fetch' && `Fetching: ${activeToolStatus.args?.url?.slice(0, 50) || '...'}`}
                          {activeToolStatus.tool === 'web_fetch_full' && `Fetching: ${activeToolStatus.args?.url?.slice(0, 50) || '...'}`}
                        </span>
                      </div>
                    ) : (
                      <div className="px-3 py-2 text-gray-400 text-sm animate-pulse">●●●</div>
                    )}
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
            </div>

            {/* Warning */}
            {chatWarning && (
              <div className="mx-6 mb-2 px-4 py-2.5 bg-amber-50 border border-amber-200 rounded-xl flex items-center gap-2 flex-shrink-0">
                <span className="text-amber-500 text-sm">⚠</span>
                <span className="text-xs text-amber-800">{chatWarning}</span>
                <div className="flex-1" />
                <button onClick={() => setChatWarning(null)} className="text-amber-400 hover:text-amber-600 text-sm">×</button>
              </div>
            )}

            {/* Input bar */}
            <div className="px-6 py-4 bg-white border-t border-gray-200 flex-shrink-0">
              <div className="max-w-[720px] mx-auto">
                {/* File badges */}
                {attachedFiles.length > 0 && (
                  <div className="flex flex-wrap items-center gap-2 mb-2">
                    {attachedFiles.map((f, fi) => {
                      if (f.type === 'image') {
                        return (
                          <div key={fi} className="relative group/img rounded-lg overflow-hidden border border-indigo-200">
                            <img src={f.dataUrl} alt={f.name} className="h-16 w-auto max-w-[140px] object-cover bg-gray-50" />
                            <button onClick={() => setAttachedFiles(prev => prev.filter((_, j) => j !== fi))}
                              className="absolute top-1 right-1 w-5 h-5 flex items-center justify-center rounded-full bg-black/60 text-white text-[10px] hover:bg-red-500 opacity-0 group-hover/img:opacity-100 transition-opacity"
                              title="Remove">×</button>
                            <div className="absolute bottom-0 left-0 right-0 px-1.5 py-0.5 bg-black/60 text-white text-[9px] truncate">
                              {f.name} · {(f.size / 1024).toFixed(0)} KB
                            </div>
                          </div>
                        );
                      }
                      if (f.type === 'pdf') {
                        return (
                          <div key={fi} className="relative group/pdf rounded-lg overflow-hidden border border-rose-200 bg-rose-50">
                            {f.processing ? (
                              <div className="h-16 w-[140px] flex flex-col items-center justify-center gap-1 px-2">
                                <svg className="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e11d48" strokeWidth="2.5" strokeLinecap="round">
                                  <path d="M21 12a9 9 0 11-6.219-8.56" />
                                </svg>
                                <span className="text-[10px] text-rose-600 font-medium">Page {f.progress}</span>
                              </div>
                            ) : f.error ? (
                              <div className="h-16 w-[160px] flex flex-col items-center justify-center gap-1 px-2">
                                <span className="text-xs text-red-500">⚠ Failed</span>
                                <span className="text-[9px] text-red-400 truncate max-w-full" title={f.error}>{f.name}</span>
                              </div>
                            ) : (
                              <>
                                {f.thumbnail ? (
                                  <img src={f.thumbnail} alt={f.name} className="h-16 w-auto max-w-[140px] object-cover bg-white" />
                                ) : (
                                  <div className="h-16 w-[140px] flex items-center justify-center text-rose-400 text-2xl">PDF</div>
                                )}
                                <div className="absolute bottom-0 left-0 right-0 px-1.5 py-0.5 bg-rose-900/70 text-white text-[9px] truncate">
                                  {f.name} · {f.processedPages}p{f.truncated ? ` (of ${f.totalPages})` : ''}
                                </div>
                              </>
                            )}
                            <button onClick={() => setAttachedFiles(prev => prev.filter((_, j) => j !== fi))}
                              className="absolute top-1 right-1 w-5 h-5 flex items-center justify-center rounded-full bg-black/60 text-white text-[10px] hover:bg-red-500 opacity-0 group-hover/pdf:opacity-100 transition-opacity"
                              title="Remove">×</button>
                          </div>
                        );
                      }
                      // Text file
                      return (
                        <div key={fi} className="flex items-center gap-1.5 bg-indigo-50 border border-indigo-200 rounded-lg px-2.5 py-1 text-xs text-indigo-600">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          {f.name} <span className="text-indigo-400">({(f.size / 1024).toFixed(1)} KB)</span>
                          <button onClick={() => setAttachedFiles(prev => prev.filter((_, j) => j !== fi))} className="text-indigo-400 hover:text-red-500 ml-0.5">×</button>
                        </div>
                      );
                    })}
                    {attachedFiles.length > 1 && (
                      <button onClick={() => setAttachedFiles([])} className="text-[10px] text-gray-400 hover:text-red-500 self-center">Remove all</button>
                    )}
                  </div>
                )}
                {/* Vision warning — image/PDF attached but model isn't vision-capable */}
                {attachedFiles.some(f => f.type === 'image' || f.type === 'pdf') && (() => {
                  const currentModel = models.find(m => m.id === selectedModel);
                  if (currentModel && !currentModel.vision && chatSource === 'exo') {
                    return (
                      <div className="mb-2 px-3 py-1.5 bg-amber-50 border border-amber-200 rounded-lg text-[11px] text-amber-800 flex items-center gap-2">
                        <span>⚠</span>
                        <span>Current model doesn't support vision. Switch to a vision-capable model (Gemma, Qwen-VL) or the images will be ignored.</span>
                      </div>
                    );
                  }
                  return null;
                })()}
                <div className="flex items-end gap-2.5 px-3.5 py-2.5 border border-gray-300 rounded-xl bg-white focus-within:border-exo transition-colors">
                  <input ref={fileInputRef} type="file" multiple accept=".txt,.md,.json,.py,.js,.ts,.jsx,.tsx,.csv,.yaml,.yml,.toml,.sh,.html,.css,.xml,.log,.pdf,image/*,application/pdf" className="hidden" onChange={handleFileAttach} />
                  <button onClick={() => fileInputRef.current?.click()} disabled={streaming}
                    className="text-gray-400 hover:text-gray-600 disabled:opacity-30 flex-shrink-0 pb-0.5" title="Attach files">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                  </button>
                  <textarea ref={inputRef} value={input} onChange={e => { setInput(e.target.value); autoResize(); }}
                    onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                    placeholder="Type your message..." rows={2}
                    style={{ minHeight: '56px', overflowY: 'hidden' }}
                    className="flex-1 text-sm text-gray-900 outline-none resize-none placeholder-gray-400 bg-transparent leading-relaxed" />
                  <button onClick={() => setExpandedEditor(true)} className="text-gray-400 hover:text-gray-600 flex-shrink-0 pb-0.5" title="Expand editor">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" /><line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" /></svg>
                  </button>
                  {streaming ? (
                    <button onClick={stopStreaming} className="px-4 py-1.5 bg-red-500 text-white text-[13px] font-semibold rounded-lg hover:bg-red-600 transition-colors">Stop</button>
                  ) : (
                    <button onClick={handleSend} disabled={(!input.trim() && !attachedFiles.length) || attachedFiles.some(f => f.type === 'pdf' && f.processing)} className="px-4 py-1.5 bg-exo text-gray-900 text-[13px] font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40 disabled:cursor-not-allowed">Send</button>
                  )}
                </div>
              </div>
            </div>
          </div>
          {/* Expanded editor modal */}
          {expandedEditor && (
            <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-8" onClick={() => setExpandedEditor(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 py-3 border-b border-gray-200">
                  <span className="text-sm font-semibold text-gray-700">Edit message</span>
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-gray-400">{input.length} chars</span>
                    <button onClick={() => setExpandedEditor(false)} className="text-gray-400 hover:text-gray-600">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                    </button>
                  </div>
                </div>
                <div className="flex-1 p-4 overflow-hidden">
                  <textarea value={input} onChange={e => setInput(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); setExpandedEditor(false); handleSend(); } }}
                    autoFocus placeholder="Type your message..."
                    className="w-full h-full text-sm text-gray-900 outline-none resize-none placeholder-gray-400 leading-relaxed"
                    style={{ minHeight: '300px' }} />
                </div>
                <div className="flex items-center justify-between px-5 py-3 border-t border-gray-200">
                  <span className="text-xs text-gray-400">Shift+Enter for new line · Cmd+Enter to send</span>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setExpandedEditor(false)} className="px-4 py-1.5 text-sm text-gray-600 hover:text-gray-900 transition">Close</button>
                    <button onClick={() => { setExpandedEditor(false); handleSend(); }} disabled={!input.trim() && !attachedFiles.length}
                      className="px-5 py-1.5 bg-exo text-gray-900 text-[13px] font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40">Send</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Project Modal */}
          {showProjectModal && (
            <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50" onClick={() => { setShowNewProject(false); setEditingProject(null); }}>
              <div className="bg-white rounded-2xl shadow-xl w-[480px] max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="px-6 pt-6 pb-4">
                  <h2 className="text-lg font-bold text-gray-900 mb-1">{editingProject ? 'Edit Project' : 'New Project'}</h2>
                  <p className="text-sm text-gray-400 mb-5">Organize conversations with a shared context.</p>

                  {/* Name */}
                  <div className="mb-4">
                    <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Name</label>
                    <input type="text" value={projForm.name} onChange={e => setProjForm(f => ({ ...f, name: e.target.value }))}
                      placeholder="e.g. Q3 Research" autoFocus
                      className="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-white outline-none focus:border-exo transition" />
                  </div>

                  {/* Category chips */}
                  <div className="mb-4">
                    <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 block">Category</label>
                    <div className="flex flex-wrap gap-2">
                      {projectCategories.map(cat => (
                        <button key={cat.id} onClick={() => setProjForm(f => {
                          // Pre-fill system prompt from category template if prompt is empty or matches another template
                          const currentIsTemplate = projectCategories.some(c => c.systemPrompt && f.systemPrompt === c.systemPrompt);
                          const newPrompt = ((!f.systemPrompt || currentIsTemplate) && cat.systemPrompt) ? cat.systemPrompt : f.systemPrompt;
                          return { ...f, category: cat.id, systemPrompt: newPrompt };
                        })}
                          className={`px-3 py-1.5 rounded-full text-xs font-medium border transition-colors ${
                            projForm.category === cat.id
                              ? 'border-exo bg-exo/10 text-gray-900'
                              : 'border-gray-200 text-gray-500 hover:border-gray-300 hover:bg-gray-50'
                          }`}>
                          {cat.icon} {cat.name}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* System Prompt */}
                  <div className="mb-4">
                    <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">System Prompt</label>
                    <textarea value={projForm.systemPrompt} onChange={e => setProjForm(f => ({ ...f, systemPrompt: e.target.value }))}
                      placeholder="You are a helpful assistant specialized in..."
                      className="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 resize-none h-[100px] outline-none focus:border-exo transition" />
                    <p className="text-[10px] text-gray-400 mt-1">Applied to all conversations in this project. Replaces session-level system prompt.</p>
                  </div>

                  {/* Advanced toggle */}
                </div>

                {/* Footer */}
                <div className="flex justify-end gap-2 px-6 py-4 border-t border-gray-100">
                  <button onClick={() => { setShowNewProject(false); setEditingProject(null); }}
                    className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition">Cancel</button>
                  <button onClick={saveProject} disabled={!projForm.name.trim()}
                    className="px-5 py-2 bg-exo text-sm font-semibold text-gray-900 rounded-lg hover:brightness-95 transition disabled:opacity-40">
                    {editingProject ? 'Save changes' : 'Create project'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════════════════

    function DashboardPage({ clusterStatus, userRole }) {
      // Models state
      const [matrixData, setMatrixData] = useState({ nodes: [], models: [], matrix: {}, activeModel: null, diskInfo: {} });
      const [chatModels, setChatModels] = useState([]);
      const [loadStatus, setLoadStatus] = useState(null);
      const [activeSyncs, setActiveSyncs] = useState([]);
      const [deleteSelection, setDeleteSelection] = useState(new Set());
      const [deleting, setDeleting] = useState(false);
      // Dashboard state
      const [downloads, setDownloads] = useState([]);
      const [nodeMetrics, setNodeMetrics] = useState([]);
      const [ramData, setRamData] = useState([]);

      const { nodes: nodeNames, models, matrix, activeModel, diskInfo } = matrixData;

      // Poll real model status from exo
      function refreshExoStatus() {
        fetch('/api/monitoring/exo-load-status').then(r => r.json()).then(d => {
          if (d.status === 'idle') {
            setLoadStatus(null);
          } else {
            setLoadStatus({ status: d.status, model: d.model, readyRunners: d.readyRunners, totalRunners: d.totalRunners, loadingTasks: d.loadingTasks });
          }
        }).catch(() => {});
      }

      function refreshMatrix() {
        fetch('/api/models/matrix').then(r => r.json()).then(d => {
          setMatrixData(d);
        }).catch(() => {});
        fetch('/api/chat/models?engine=exo1').then(r => r.json()).then(d => setChatModels(d.models || [])).catch(() => {});
        refreshExoStatus();
      }
      function refreshSyncs() {
        fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
      }
      function refreshDashboard() {
        fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {});
        fetch('/api/monitoring/exo-node-metrics').then(r => r.json()).then(d => setNodeMetrics(d.nodes || [])).catch(() => {});
        fetch('/api/monitoring/ram').then(r => r.json()).then(setRamData).catch(() => {});
      }

      // Fast poll exo status when loading/warming (every 3s)
      useEffect(() => {
        if (loadStatus?.status === 'loading' || loadStatus?.status === 'warming') {
          const fast = setInterval(refreshExoStatus, 3000);
          return () => clearInterval(fast);
        }
      }, [loadStatus?.status]);

      useEffect(() => {
        refreshMatrix(); refreshSyncs(); refreshDashboard();
        const interval = setInterval(() => { refreshMatrix(); refreshSyncs(); refreshDashboard(); }, 10000);
        const onDlProgress = () => { fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {}); };
        socket.on('download:progress', onDlProgress);
        socket.on('download:complete', onDlProgress);
        socket.on('sync:progress', refreshSyncs);
        socket.on('sync:complete', () => { refreshSyncs(); refreshMatrix(); });
        return () => { clearInterval(interval); socket.off('download:progress', onDlProgress); socket.off('download:complete', onDlProgress); socket.off('sync:progress', refreshSyncs); socket.off('sync:complete'); };
      }, []);

      function modelOnNode(modelId, nodeName) {
        return (matrix[nodeName] || []).find(m => m.id === modelId);
      }

      const activeDownloads = downloads.filter(d => d.status === 'downloading');
      const queued = downloads.filter(d => d.status === 'queued');
      const history = downloads.filter(d => ['done', 'stopped', 'error'].includes(d.status));
      const nodes = clusterStatus?.nodes || [];

      function parseProgress(prog) {
        if (!prog) return { gb: 0, total: 0, pct: 0, speed: 0 };
        const parts = prog.split(':');
        return { gb: parseFloat(parts[0]) || 0, total: parseFloat(parts[1]) || 0, speed: parseFloat(parts[3]) || 0, pct: parts[1] > 0 ? Math.round(parseFloat(parts[0]) / parseFloat(parts[1]) * 100) : 0 };
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          {/* Status bar: running model + exo dashboard link */}
          <div className={`flex items-center gap-3 mx-6 mt-4 px-4 py-2.5 rounded-xl flex-shrink-0 ${
            loadStatus?.status === 'running' ? 'bg-emerald-50 border border-emerald-200' :
            loadStatus?.status === 'warming' ? 'bg-blue-50 border border-blue-200' :
            loadStatus?.status === 'loading' ? 'bg-amber-50 border border-amber-200' :
            'bg-gray-50 border border-gray-200'
          }`}>
            {loadStatus?.status === 'running' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-emerald-500" />
                <span className="text-[13px] font-semibold text-emerald-600">Running</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
              </>
            ) : loadStatus?.status === 'warming' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
                <span className="text-[13px] font-semibold text-blue-600">Warming up...</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
              </>
            ) : loadStatus?.status === 'loading' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse" />
                <span className="text-[13px] font-semibold text-amber-600">Loading...</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
              </>
            ) : (
              <span className="text-[13px] text-gray-500">No model loaded</span>
            )}
            <div className="flex-1" />
            <a href={clusterStatus?.dashboardURL || '#'} target="_blank" rel="noopener"
              className="flex items-center gap-2 px-4 py-1.5 bg-exo rounded-lg text-[11px] font-semibold text-gray-900 hover:brightness-95 transition">
              Manage on exo Dashboard <span>↗</span>
            </a>
          </div>

          {/* Two-column layout */}
          <div className="flex-1 flex gap-5 px-6 py-4">
            {/* Left: Matrix + Activity */}
            <div className="flex-1 flex flex-col gap-4 overflow-hidden">

              {/* Model matrix */}
              {models.length > 0 && (
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex px-4 py-2.5 bg-gray-50 border-b border-gray-200">
                  <div className="flex-[2.5]"><span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Model</span></div>
                  {nodeNames.map(name => (
                    <div key={name} className="flex-1 text-center">
                      <span className="text-[11px] font-semibold text-gray-700">{name}</span>
                      {diskInfo[name] && <div className="mono text-[9px] text-gray-400">{diskInfo[name].freeGB} GB free</div>}
                    </div>
                  ))}
                  <div className="w-[50px]" />
                </div>
                {models.map(model => {
                  const isActive = activeModel === model.id;
                  const presentOn = nodeNames.filter(n => modelOnNode(model.id, n));
                  const missingOn = nodeNames.filter(n => !modelOnNode(model.id, n));
                  return (
                    <div key={model.id} className={`flex px-4 py-3 border-b border-gray-100 items-center ${isActive ? 'bg-amber-50' : 'hover:bg-gray-50'}`}>
                      <div className="flex-[2.5] flex flex-col gap-0.5">
                        <span className={`text-[12px] font-medium text-gray-900 ${isActive ? 'font-semibold' : ''}`}>{isActive && '⚡ '}{model.id.split('/').pop()}</span>
                        <span className="mono text-[10px] text-gray-400">{model.id.split('/')[0]} · {formatBytes(model.sizeBytes)}</span>
                      </div>
                      {nodeNames.map(name => {
                        const m = modelOnNode(model.id, name);
                        return (
                          <div key={name} className="flex-1 text-center">
                            {m ? (
                              <div className="flex flex-col items-center gap-0.5">
                                <span className="text-emerald-500 text-sm">✓ <span className="mono text-[10px] text-gray-500">{formatBytes(m.sizeBytes)}</span></span>
                                <button onClick={() => {
                                  const key = `${model.id}::${name}`;
                                  setDeleteSelection(prev => { const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s; });
                                }} className={`transition-colors ${deleteSelection.has(`${model.id}::${name}`) ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}`}>
                                  {Icons.trash(deleteSelection.has(`${model.id}::${name}`) ? '#ef4444' : undefined)}
                                </button>
                              </div>
                            ) : (
                              <span className="mono text-[10px] text-gray-300">—</span>
                            )}
                          </div>
                        );
                      })}
                      <div className="w-[50px] text-right">
                        {missingOn.length > 0 && missingOn.length < nodeNames.length && (
                          <button onClick={async () => {
                            await fetch('/api/models/sync', {
                              method: 'POST', headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ modelId: model.id, sourceNode: presentOn[0], targetNodes: missingOn }),
                            });
                          }} className="text-[10px] text-indigo-500 font-medium hover:underline">Sync</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
              )}

              {/* Delete bar */}
              {deleteSelection.size > 0 && (
                <div className="flex items-center gap-3 px-4 py-2.5 bg-red-50 border border-red-200 rounded-xl">
                  <span className="text-xs text-red-700 font-medium">{deleteSelection.size} selected</span>
                  <div className="flex-1" />
                  <button onClick={() => setDeleteSelection(new Set())} className="px-3 py-1 text-xs text-gray-500 border border-gray-200 rounded-md hover:bg-white">Cancel</button>
                  <button onClick={async () => {
                    if (!confirm(`Delete ${deleteSelection.size} model(s)?`)) return;
                    setDeleting(true);
                    for (const key of deleteSelection) {
                      const [modelId, nodeName] = key.split('::');
                      await fetch('/api/models/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ modelId, nodeName }) });
                    }
                    setDeleteSelection(new Set()); setDeleting(false); refreshMatrix();
                  }} disabled={deleting} className="px-3 py-1 bg-red-500 text-white text-xs font-semibold rounded-md hover:bg-red-600 disabled:opacity-50">
                    {deleting ? 'Deleting...' : `Delete ${deleteSelection.size}`}
                  </button>
                </div>
              )}

              {/* Active syncs */}
              {activeSyncs.filter(s => s.status === 'syncing').map(s => (
                <div key={s.id} className="bg-white border border-indigo-200 rounded-xl p-3.5 flex flex-col gap-2">
                  <div className="flex items-center gap-2">
                    <div className="px-1.5 py-0.5 bg-indigo-50 rounded text-[9px] font-semibold text-indigo-500">RSYNC</div>
                    <span className="text-xs font-medium text-gray-900">{s.modelId}</span>
                    <span className="mono text-[10px] text-gray-400 flex-1">{s.sourceNode} → {(s.targetNodes || []).join(', ')}</span>
                    <button onClick={() => { fetch(`/api/models/syncs/${s.id}`, { method: 'DELETE' }); }}
                      className="text-gray-300 hover:text-red-500 transition" title="Cancel sync">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </div>
                  {s.progress && Object.entries(s.progress).map(([node, p]) => (
                    <div key={node} className="flex items-center gap-2">
                      <span className="text-[10px] text-gray-500 w-12">{node}</span>
                      <div className="flex-1 h-1.5 bg-gray-100 rounded-full"><div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${p.percent || 0}%` }} /></div>
                      <span className={`mono text-[10px] ${p.status === 'done' ? 'text-emerald-500' : p.status === 'error' ? 'text-red-500' : 'text-indigo-500'}`}>{p.status === 'done' ? '✓' : p.status === 'error' ? '✗' : `${p.percent || 0}%`}</span>
                    </div>
                  ))}
                </div>
              ))}

              {/* Activity: Downloads */}
              {(activeDownloads.length > 0 || queued.length > 0 || history.length > 0) && (
                <div className="flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Activity</span>
                  {activeDownloads.map(dl => {
                    const p = parseProgress(dl.progress);
                    return (
                      <div key={dl.id} className="bg-white border border-gray-200 rounded-xl p-3.5 flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                          <span className="text-xs font-semibold text-gray-900">{dl.modelId}</span>
                          <div className="flex items-center gap-2">
                            <span className="mono text-[10px] text-gray-500">{p.gb}/{p.total} GB</span>
                            <span className="mono text-[10px] font-semibold">{p.pct}%</span>
                            <span className="mono text-[10px] text-emerald-500">{p.speed} MB/s</span>
                            <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })} className="px-2 py-0.5 border border-red-200 rounded text-[10px] text-red-600">Stop</button>
                          </div>
                        </div>
                        <div className="h-1 bg-gray-100 rounded-full"><div className="h-full bg-exo rounded-full transition-all" style={{ width: `${p.pct}%` }} /></div>
                      </div>
                    );
                  })}
                  {queued.map((dl, i) => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 flex justify-between items-center">
                      <div className="flex items-center gap-2"><span className="mono text-[9px] text-gray-500 bg-gray-100 px-1 py-0.5 rounded">#{i+1}</span><span className="text-xs text-gray-900">{dl.modelId}</span></div>
                      <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })} className="text-[10px] text-red-600">Cancel</button>
                    </div>
                  ))}
                  {history.slice(0, 5).map(dl => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 flex justify-between items-center">
                      <div className="flex items-center gap-2">
                        <span className={`text-sm ${dl.status === 'done' ? 'text-emerald-500' : 'text-yellow-500'}`}>{dl.status === 'done' ? '✓' : '⚠'}</span>
                        <span className="text-xs text-gray-700">{dl.modelId}</span>
                        <span className="mono text-[9px] text-gray-400">{dl.status}</span>
                      </div>
                      <div className="flex gap-2">
                        {dl.status !== 'done' && <button onClick={() => fetch(`/api/download/restart/${dl.id}`, { method: 'POST' })} className="text-[10px] text-indigo-500">Restart</button>}
                        <button onClick={() => fetch(`/api/download/${dl.id}`, { method: 'DELETE' })} className="text-[10px] text-gray-400">{Icons.trash('#9ca3af')}</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Right: Cluster Nodes */}
            <div className="w-[280px] flex flex-col gap-2 flex-shrink-0">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Cluster</span>
              {nodes.map(node => {
                const metrics = nodeMetrics.find(m => m.name === node.name);
                const ram = ramData.find(r => r.name === node.name);
                return (
                  <div key={node.name} className={`bg-white border rounded-xl p-3 flex flex-col gap-1.5 ${node.online ? 'border-gray-200' : 'border-red-200 opacity-60'}`}>
                    <div className="flex justify-between items-center">
                      <div className="flex items-center gap-1.5">
                        <div className={`w-[6px] h-[6px] rounded-full ${node.online ? 'bg-emerald-500' : 'bg-red-500'}`} />
                        <span className="text-xs font-semibold text-gray-900">{node.name}</span>
                      </div>
                      <span className="mono text-[9px] text-gray-400">{node.ip}</span>
                    </div>
                    {node.online ? (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex justify-between"><span className="text-[10px] text-gray-500">RAM</span><span className="mono text-[10px] text-gray-500">{ram ? `${ram.used}/${ram.total} GB` : '—'}</span></div>
                          <div className="h-[3px] bg-gray-100 rounded-full"><div className="h-full bg-emerald-500 rounded-full" style={{ width: `${ram?.percent || 0}%`, minWidth: '4px' }} /></div>
                        </div>
                        <div className="flex gap-3 items-center">
                          <span className="mono text-[9px] text-gray-400">GPU {metrics?.gpuPct ?? '—'}%</span>
                          <span className="mono text-[9px] text-gray-400">{metrics?.tempC ?? '—'}°C</span>
                          <span className="mono text-[9px] text-gray-400">{metrics?.watts ?? '—'}W</span>
                          <div className="flex-1" />
                          {diskInfo[node.name] && (() => {
                            const free = diskInfo[node.name].freeGB;
                            const total = diskInfo[node.name].totalGB || (free + 1);
                            const usedPct = total > 0 ? Math.round((1 - free / total) * 100) : 0;
                            const color = usedPct > 90 ? 'border-red-400 text-red-600' : usedPct > 75 ? 'border-amber-400 text-amber-600' : 'border-emerald-400 text-emerald-600';
                            return <span className={`mono text-[9px] px-1.5 py-0.5 border rounded flex items-center gap-1 ${color}`}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>{free} GB free</span>;
                          })()}
                        </div>
                      </>
                    ) : (
                      <span className="text-[10px] text-red-500">Offline</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODELS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ModelsPage({ clusterStatus }) {
      const [matrixData, setMatrixData] = useState({ nodes: [], models: [], matrix: {}, activeModel: null, diskInfo: {} });
      const [chatModels, setChatModels] = useState([]);
      const [activeSyncs, setActiveSyncs] = useState([]);
      const [deleteSelection, setDeleteSelection] = useState(new Set()); // "modelId::nodeName"
      const [deleting, setDeleting] = useState(false);

      function refreshMatrix() {
        fetch('/api/models/matrix').then(r => r.json()).then(d => {
          setMatrixData(d);
        }).catch(() => {});
        fetch('/api/chat/models?engine=exo1').then(r => r.json()).then(d => setChatModels(d.models || [])).catch(() => {});
      }
      function refreshSyncs() {
        fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
      }

      useEffect(() => {
        refreshMatrix();
        refreshSyncs();
        // Poll every 10s
        const interval = setInterval(() => { refreshMatrix(); refreshSyncs(); }, 10000);
        // Listen for sync progress
        socket.on('sync:progress', refreshSyncs);
        socket.on('sync:complete', () => { refreshSyncs(); refreshMatrix(); });
        return () => { clearInterval(interval); socket.off('sync:progress', refreshSyncs); socket.off('sync:complete'); };
      }, []);

      const { nodes: nodeNames, models, matrix, activeModel, diskInfo } = matrixData;

      function modelOnNode(modelId, nodeName) {
        const nodeList = matrix[nodeName] || [];
        return nodeList.find(m => m.id === modelId);
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-4">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Models</span>
              <span className="text-[13px] text-gray-400">{models.length} models across {nodeNames.length} nodes</span>
            </div>
          </div>

          {/* Model matrix table */}
          {models.length > 0 && (
          <div className="px-10 pb-4">
            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
              {/* Header */}
              <div className="flex px-5 py-3 bg-gray-50 border-b border-gray-200">
                <div className="flex-[2.5]"><span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Model</span></div>
                {nodeNames.map(name => (
                  <div key={name} className="flex-1 text-center flex flex-col items-center gap-0.5">
                    <span className="text-xs font-semibold text-gray-700">{name}</span>
                    {diskInfo[name] && <span className="mono text-[10px] text-gray-400">{diskInfo[name].freeGB} GB free</span>}
                  </div>
                ))}
                <div className="w-[70px]" />
              </div>
              {/* Rows */}
              {models.map(model => {
                const isActive = activeModel === model.id;
                const presentOn = nodeNames.filter(n => modelOnNode(model.id, n));
                const missingOn = nodeNames.filter(n => !modelOnNode(model.id, n));
                return (
                  <div key={model.id} className={`flex px-5 py-3.5 border-b border-gray-100 items-center ${isActive ? 'bg-amber-50' : 'hover:bg-gray-50'}`}>
                    <div className="flex-[2.5] flex flex-col gap-0.5">
                      <div className="flex items-center gap-1.5">
                        {isActive && <span className="text-[11px]">⚡</span>}
                        <span className={`text-[13px] font-medium text-gray-900 ${isActive ? 'font-semibold' : ''}`}>{model.id.split('/').pop()}</span>
                      </div>
                      <span className="mono text-[11px] text-gray-400">{model.id.split('/')[0]} · {formatBytes(model.sizeBytes)}</span>
                    </div>
                    {nodeNames.map(name => {
                      const m = modelOnNode(model.id, name);
                      return (
                        <div key={name} className="flex-1 text-center">
                          {m ? (
                            <div className="flex flex-col items-center gap-0.5">
                              <span className="text-emerald-500 text-sm">✓ <span className="mono text-[11px] text-gray-500">{formatBytes(m.sizeBytes)}</span></span>
                              <button onClick={() => {
                                const key = `${model.id}::${name}`;
                                setDeleteSelection(prev => { const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s; });
                              }} className={`transition-colors ${deleteSelection.has(`${model.id}::${name}`) ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}`}>
                                {Icons.trash(deleteSelection.has(`${model.id}::${name}`) ? '#ef4444' : undefined)}
                              </button>
                            </div>
                          ) : (
                            <span className="mono text-[11px] text-gray-300">—</span>
                          )}
                        </div>
                      );
                    })}
                    <div className="w-[70px] text-right">
                      {missingOn.length > 0 && missingOn.length < nodeNames.length && (
                        <button onClick={async () => {
                          const sourceNode = presentOn[0];
                          await fetch('/api/models/sync', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ modelId: model.id, sourceNode, targetNodes: missingOn }),
                          });
                        }} className="text-[11px] text-indigo-500 font-medium hover:underline">Sync</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          )}

          {/* Delete bar */}
          {deleteSelection.size > 0 && (
            <div className="px-10 pb-4">
              <div className="flex items-center gap-3 px-4 py-3 bg-red-50 border border-red-200 rounded-xl">
                <span className="text-xs text-red-700 font-medium">{deleteSelection.size} selected for deletion</span>
                <div className="flex-1" />
                <button onClick={() => setDeleteSelection(new Set())}
                  className="px-3 py-1 text-xs text-gray-500 border border-gray-200 rounded-md hover:bg-white">Cancel</button>
                <button onClick={async () => {
                  if (!confirm(`Delete ${deleteSelection.size} model(s) from nodes? This cannot be undone.`)) return;
                  setDeleting(true);
                  for (const key of deleteSelection) {
                    const [modelId, nodeName] = key.split('::');
                    await fetch('/api/models/delete', {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ modelId, nodeName }),
                    });
                  }
                  setDeleteSelection(new Set());
                  setDeleting(false);
                  // Immediate refresh
                  refreshMatrix();
                  refreshSyncs();
                }} disabled={deleting}
                  className="px-4 py-1 bg-red-500 text-white text-xs font-semibold rounded-md hover:bg-red-600 disabled:opacity-50">
                  {deleting ? 'Deleting...' : `Delete ${deleteSelection.size} model(s)`}
                </button>
              </div>
            </div>
          )}

          {/* Active syncs */}
          {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').length > 0 && (
            <div className="px-10 pb-4 flex flex-col gap-2">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Syncing</span>
              {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').map(s => (
                <div key={s.id} className="bg-white border border-indigo-200 rounded-xl p-4 flex flex-col gap-2">
                  <div className="flex justify-between items-center">
                    <div className="flex items-center gap-2">
                      <div className="px-1.5 py-0.5 bg-indigo-50 rounded text-[10px] font-semibold text-indigo-500">RSYNC</div>
                      <span className="text-[13px] font-medium text-gray-900">{s.modelId}</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="mono text-[11px] text-gray-400">{s.sourceNode} → {(s.targetNodes || []).join(', ')}</span>
                      <button onClick={() => { fetch(`/api/models/syncs/${s.id}`, { method: 'DELETE' }); }}
                        className="text-gray-300 hover:text-red-500 transition" title="Cancel sync">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </div>
                  </div>
                  {s.progress && Object.entries(s.progress).map(([node, p]) => (
                    <div key={node} className="flex items-center gap-3">
                      <span className="text-[11px] text-gray-500 w-16">{node}</span>
                      <div className="flex-1 h-1.5 bg-gray-100 rounded-full">
                        <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${p.percent || 0}%` }} />
                      </div>
                      <span className={`mono text-[11px] ${p.status === 'done' ? 'text-emerald-500' : p.status === 'error' ? 'text-red-500' : 'text-indigo-500'}`}>
                        {p.status === 'done' ? '✓' : p.status === 'error' ? '✗ ' + (p.error || '') : `${p.percent || 0}%`}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {/* Model Management — link to exo Dashboard */}
          <div className="px-10 pb-6">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex items-center justify-between">
              <div>
                <span className="text-lg font-bold text-gray-900">Model Management</span>
                <p className="text-xs text-gray-400 mt-1">Load, unload and manage models directly on the exo dashboard</p>
              </div>
              <a href={clusterStatus?.dashboardURL || '#'} target="_blank" rel="noopener"
                className="flex items-center gap-2 px-5 py-2.5 bg-exo rounded-lg text-sm font-semibold text-gray-900 hover:brightness-95 transition">
                <span>Manage on exo Dashboard</span>
                <span className="text-base">↗</span>
              </a>
            </div>
          </div>

        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // DOWNLOADS PAGE (HuggingFace Search)
    // ═══════════════════════════════════════════════════════════════════

    // Persistent search state (survives page switches) — plain object, not a hook
    const _dlState = { query: '', results: [], rawResults: [], quantFilter: '', paramsFilter: '' };

    function DownloadsPage() {
      const [query, setQuery] = useState(_dlState.query);
      const [results, setResults] = useState(_dlState.results);
      const [loading, setLoading] = useState(false);
      const [format, setFormat] = useState('mlx');
      const [sort, setSort] = useState('downloads');
      const [sortDir, setSortDir] = useState('desc');
      const [quantFilter, setQuantFilter] = useState(_dlState.quantFilter);
      const [paramsFilter, setParamsFilter] = useState(_dlState.paramsFilter);
      const [directId, setDirectId] = useState('');
      const [rawResults, setRawResults] = useState(_dlState.rawResults);
      const [downloadingIds, setDownloadingIds] = useState(new Set());
      const [distributed, setDistributed] = useState(true);
      const [activeDownloads, setActiveDownloads] = useState([]);

      // Persist search state to survive page switches
      useEffect(() => { Object.assign(_dlState, { query, results, rawResults, quantFilter, paramsFilter }); }, [query, results, rawResults, quantFilter, paramsFilter]);

      // Poll active downloads
      useEffect(() => {
        const refresh = () => fetch('/api/downloads').then(r => r.json()).then(d => setActiveDownloads(d.filter(dl => dl.status === 'downloading' || dl.status === 'queued'))).catch(() => {});
        refresh();
        const interval = setInterval(refresh, 5000);
        socket.on('download:progress', refresh);
        socket.on('download:complete', refresh);
        return () => { clearInterval(interval); socket.off('download:progress', refresh); socket.off('download:complete', refresh); };
      }, []);

      // Compute available quants/params based on current cross-filter
      const availableQuants = useMemo(() => {
        let pool = rawResults;
        if (paramsFilter) pool = pool.filter(m => String(m.namedParams) === String(paramsFilter));
        return [...new Set(pool.map(m => m.quantBits).filter(Boolean))].sort((a, b) => a - b);
      }, [rawResults, paramsFilter]);

      const availableParams = useMemo(() => {
        let pool = rawResults;
        if (quantFilter) pool = pool.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
        return [...new Set(pool.map(m => m.namedParams).filter(Boolean))].sort((a, b) => a - b);
      }, [rawResults, quantFilter]);

      async function search() {
        if (!query.trim()) return;
        setLoading(true);
        setQuantFilter(''); setParamsFilter('');
        try {
          const apiSort = sort === 'estimatedSizeGB' ? 'downloads' : sort;
          // Include params filter in search query for better API results
          let searchQuery = query;
          if (paramsFilter) searchQuery += ` ${paramsFilter}B`;
          if (quantFilter) searchQuery += ` ${quantFilter}bit`;
          const params = new URLSearchParams({ q: searchQuery, format: 'mlx', sort: apiSort, limit: '50' });
          const res = await fetch(`/api/hub/search?${params}`);
          const data = await res.json();
          setRawResults(data);
          // Apply client-side filters on results
          let filtered = data;
          if (quantFilter) filtered = filtered.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
          if (paramsFilter) filtered = filtered.filter(m => String(m.namedParams) === String(paramsFilter));
          if (sort === 'estimatedSizeGB') {
            filtered.sort((a, b) => sortDir === 'desc' ? (b.estimatedSizeGB || 0) - (a.estimatedSizeGB || 0) : (a.estimatedSizeGB || 0) - (b.estimatedSizeGB || 0));
          }
          setResults(filtered);
        } catch (e) {
          console.error('HF search error:', e);
        }
        setLoading(false);
      }

      function applyFilters() {
        let filtered = [...rawResults];
        if (quantFilter) filtered = filtered.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
        if (paramsFilter) filtered = filtered.filter(m => String(m.namedParams) === String(paramsFilter));
        if (sort === 'estimatedSizeGB') {
          filtered.sort((a, b) => sortDir === 'desc' ? (b.estimatedSizeGB || 0) - (a.estimatedSizeGB || 0) : (a.estimatedSizeGB || 0) - (b.estimatedSizeGB || 0));
        }
        setResults(filtered);
      }

      async function downloadModel(modelId) {
        setDownloadingIds(prev => new Set([...prev, modelId]));
        try {
          await fetch('/api/download', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId, distributed }),
          });
        } catch (e) {}
      }

      async function downloadDirect() {
        if (!directId.includes('/')) return;
        await downloadModel(directId);
        setDirectId('');
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-0">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Downloads</span>
              <span className="text-[13px] text-gray-400">Search and download models on HuggingFace · exo qualified only</span>
            </div>
            <a href="https://huggingface.com" target="_blank" rel="noopener" className="flex items-center gap-1.5 px-2.5 py-1 border border-gray-200 rounded-md hover:bg-gray-50">
              <span className="text-[11px]">↗</span>
              <span className="text-xs text-gray-500">huggingface.com</span>
            </a>
          </div>

          {/* Search + Direct */}
          <div className="px-10 py-4 flex gap-3">
            <div className="flex-1 flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl">
              <span className="text-gray-400">🔍</span>
              <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && search()}
                placeholder="Search HuggingFace..." className="flex-1 text-sm text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={search} className="px-3 py-1 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95">Search</button>
            </div>
            <div className="flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl w-[360px]">
              <span className="text-xs text-gray-400">Direct:</span>
              <input type="text" value={directId} onChange={e => setDirectId(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && downloadDirect()}
                placeholder="author/model-name" className="flex-1 mono text-xs text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={downloadDirect} disabled={!directId.includes('/')}
                className="px-2.5 py-1 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95 disabled:opacity-40">↓</button>
            </div>
          </div>

          {/* Filters + Download Mode — single row */}
          <div className="px-10 pb-4 flex items-center gap-4 flex-wrap">
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Format</span>
              <span className="px-2.5 py-1 rounded-md text-[11px] font-semibold bg-exo text-gray-900">MLX</span>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Quant</span>
              <select value={quantFilter} onChange={e => setQuantFilter(e.target.value)}
                className="mono text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white min-w-[80px]">
                <option value="">All</option>
                {availableQuants.map(q => <option key={q} value={q}>{q}-bit</option>)}
              </select>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Parameters</span>
              <select value={paramsFilter} onChange={e => setParamsFilter(e.target.value)}
                className="mono text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white min-w-[80px]">
                <option value="">All</option>
                {availableParams.map(p => <option key={p} value={p}>{p}B</option>)}
              </select>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Sort</span>
              <select value={sort} onChange={e => setSort(e.target.value)} className="text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white">
                <option value="downloads">Popularity</option>
                <option value="lastModified">Date</option>
                <option value="likes">Likes</option>
                <option value="estimatedSizeGB">Size</option>
              </select>
              <button onClick={() => setSortDir(d => d === 'desc' ? 'asc' : 'desc')}
                className="px-2 py-1 border border-gray-200 rounded-md text-[11px] text-gray-500 hover:bg-gray-50">
                {sortDir === 'desc' ? '↓' : '↑'}
              </button>
            </div>
            <button onClick={() => { search(); }}
              className="px-3 py-1 bg-exo rounded-md text-[11px] font-semibold text-gray-900 hover:brightness-95">Apply</button>
            <div className="flex-1" />
            <div className="flex items-center gap-3 px-3 py-1.5 bg-[#f9fafb] border border-gray-200 rounded-lg">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">DOWNLOAD MODE</span>
              <button onClick={() => setDistributed(false)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-colors ${!distributed ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'text-gray-500 hover:bg-gray-100'}`}>
                Node 1 only
              </button>
              <button onClick={() => setDistributed(true)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-colors ${distributed ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'text-gray-500 hover:bg-gray-100'}`}>
                Distributed
              </button>
            </div>
          </div>

          {/* Results */}
          <div className="px-10 pb-4">
            {loading && <div className="text-center py-8 text-gray-400 text-sm">Searching...</div>}
            {!loading && results.length > 0 && (
              <div className="flex items-center gap-3 mb-2">
                <span className="text-xs text-gray-400">{results.length} results</span>
                {results.length > 0 && (
                  <button onClick={() => { setResults([]); setRawResults([]); setQuery(''); setQuantFilter(''); setParamsFilter(''); }}
                    className="text-[10px] text-gray-400 hover:text-gray-600 border border-gray-200 px-2 py-0.5 rounded">Clear results</button>
                )}
              </div>
            )}
          </div>
          <div className="flex-1 px-10 pb-6 flex flex-col gap-2 overflow-y-auto">
            {results.map(m => (
              <div key={m.id} className="bg-white border border-gray-200 rounded-xl px-5 py-3.5 flex items-center gap-4">
                <div className="flex-1 flex flex-col gap-1">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold text-gray-900">{m.modelName || m.id}</span>
                    <span className="mono text-[10px] font-semibold px-1.5 py-0.5 rounded text-amber-700 bg-amber-50">MLX</span>
                    {m.quantBits && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.quantBits}-bit</span>}
                    {m.precision && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.precision}</span>}
                    {m.namedParams && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.namedParams}B</span>}
                    <a href={`https://huggingface.co/${m.id}`} target="_blank" rel="noopener" className="text-gray-300 hover:text-gray-500 transition-colors">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="mono text-[11px] text-gray-400">{m.author}</span>
                    {m.estimatedSizeGB && <span className="mono text-[11px] text-gray-500">~{m.estimatedSizeGB} GB</span>}
                    <span className="text-[11px] text-gray-400">↓ {m.downloads >= 1000 ? `${(m.downloads/1000).toFixed(1)}K` : m.downloads}</span>
                  </div>
                </div>
                <button onClick={() => downloadModel(m.id)} disabled={downloadingIds.has(m.id)}
                  className={`px-3.5 py-1.5 rounded-md text-xs font-semibold flex-shrink-0 ${downloadingIds.has(m.id) ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-exo text-gray-900 hover:brightness-95'}`}>
                  {downloadingIds.has(m.id) ? '✓ Queued' : 'Download'}
                </button>
              </div>
            ))}
            {!loading && results.length === 0 && query && (
              <div className="text-center py-8 text-gray-400 text-sm">No results. Try a different search.</div>
            )}
            {!query && results.length === 0 && (
              <div className="text-center py-12 text-gray-400 text-sm">Search HuggingFace to find models for your cluster.</div>
            )}
          </div>

          {/* Active downloads mini progress */}
          {activeDownloads.length > 0 && (
            <div className="flex-shrink-0 border-t border-gray-200 bg-white px-10 py-3 flex flex-col gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Active downloads</span>
              {activeDownloads.map(dl => {
                const parts = (dl.progress || '').split(':');
                const gb = parseFloat(parts[0]) || 0;
                const total = parseFloat(parts[1]) || 0;
                const speed = parseFloat(parts[3]) || 0;
                const pct = total > 0 ? Math.round(gb / total * 100) : 0;
                return (
                  <div key={dl.id} className="flex items-center gap-3">
                    <span className="text-[11px] font-medium text-gray-700 truncate max-w-[200px]">{dl.modelId?.split('/').pop()}</span>
                    <div className="flex-1 h-1.5 bg-gray-100 rounded-full">
                      <div className="h-full bg-exo rounded-full transition-all" style={{ width: `${pct}%` }} />
                    </div>
                    <span className="mono text-[10px] text-gray-500 w-8 text-right">{pct}%</span>
                    {speed > 0 && <span className="mono text-[10px] text-emerald-500 w-16">{speed} MB/s</span>}
                    {dl.status === 'queued' && <span className="text-[10px] text-gray-400">queued</span>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // SETTINGS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function SettingsPage({ settings, refreshSettings, authState, setAuthState }) {
      const [nodes, setNodes] = useState(settings?.nodes || []);
      const [exoIp, setExoIp] = useState(settings?.chat?.exo1?.ip || '');
      const [exoPort, setExoPort] = useState(settings?.chat?.exo1?.port || 52415);
      const [sshUser, setSshUser] = useState(settings?.sshUser || 'admin');
      const [newNodeName, setNewNodeName] = useState('');
      const [newNodeIp, setNewNodeIp] = useState('');
      const [newNodeRam, setNewNodeRam] = useState('');
      const [passwords, setPasswords] = useState({}); // ip → password
      const [showPasswords, setShowPasswords] = useState({});
      const [discovering, setDiscovering] = useState(false);
      const [discovered, setDiscovered] = useState([]);
      const [testResult, setTestResult] = useState(null);
      const [openRouterKey, setOpenRouterKey] = useState(settings?.openRouterApiKey || '');
      const [sshStatus, setSshStatus] = useState({}); // ip → { ok, method }
      const [setupResult, setSetupResult] = useState(null);
      const [configCheck, setConfigCheck] = useState(null);
      const [checking, setChecking] = useState(false);
      const [saveStatus, setSaveStatus] = useState(null);
      // Admin mode
      const [adminPassword, setAdminPassword] = useState('');
      const [adminToggleError, setAdminToggleError] = useState('');
      const [users, setUsers] = useState([]);
      const [newUser, setNewUser] = useState({ username: '', password: '', role: 'user' });
      const [userError, setUserError] = useState('');
      // Auth log
      const [authLog, setAuthLog] = useState([]);
      const [authLogOpen, setAuthLogOpen] = useState(false);
      // TTS accessibility
      const [ttsSettingsKey, setTtsSettingsKey] = useState(0); // force re-render
      const [availableVoices, setAvailableVoices] = useState([]);
      useEffect(() => {
        const loadVoices = () => setAvailableVoices(speechSynthesis.getVoices());
        loadVoices();
        speechSynthesis.onvoiceschanged = loadVoices;
        return () => { speechSynthesis.onvoiceschanged = null; };
      }, []);
      useEffect(() => {
        if (settings) {
          setNodes(settings.nodes || []);
          setExoIp(settings.chat?.exo1?.ip || '');
          setExoPort(settings.chat?.exo1?.port || 52415);
          setSshUser(settings.sshUser || 'admin');
          setOpenRouterKey(settings.openRouterApiKey || '');
        }
      }, [settings]);

      // Load users when admin mode is on
      useEffect(() => {
        if (settings?.adminMode) {
          fetch('/api/admin/users').then(r => r.ok ? r.json() : []).then(setUsers).catch(() => {});
        }
      }, [settings?.adminMode]);

      // Load auth log
      const refreshAuthLog = useCallback(() => {
        fetch('/api/admin/auth-log').then(r => r.ok ? r.json() : []).then(setAuthLog).catch(() => {});
      }, []);
      useEffect(() => {
        if (settings?.adminMode && authLogOpen) refreshAuthLog();
      }, [settings?.adminMode, authLogOpen]);

      async function toggleAdminMode() {
        setAdminToggleError('');
        if (!settings?.adminMode) {
          // Enable admin mode
          if (!adminPassword || adminPassword.length < 4) {
            setAdminToggleError('Password must be at least 4 characters');
            return;
          }
          const res = await fetch('/api/settings', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminMode: true, adminPassword }),
          });
          if (!res.ok) { const d = await res.json(); setAdminToggleError(d.error); return; }
          refreshSettings();
          // Auto-login as admin with the password we just set
          const loginRes = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: 'admin', password: adminPassword }),
          });
          setAdminPassword('');
          if (loginRes.ok) {
            const user = await loginRes.json();
            setAuthState({ adminMode: true, user });
          }
        } else {
          // Disable admin mode
          const res = await fetch('/api/settings', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminMode: false }),
          });
          if (!res.ok) { const d = await res.json(); setAdminToggleError(d.error); return; }
          await fetch('/api/auth/logout', { method: 'POST' });
          setAuthState({ adminMode: false, user: null });
          refreshSettings();
        }
      }

      async function addUserAccount() {
        setUserError('');
        if (!newUser.username || !newUser.password) { setUserError('Username and password required'); return; }
        const res = await fetch('/api/admin/users', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: newUser.username, password: newUser.password, role: newUser.role || 'user' }),
        });
        if (!res.ok) { const d = await res.json(); setUserError(d.error); return; }
        setNewUser({ username: '', password: '', role: 'user' });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function toggleUserActive(username, active) {
        await fetch(`/api/admin/users/${username}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ active: !active }),
        });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function deleteUserAccount(username) {
        if (!confirm(`Delete user "${username}"?`)) return;
        await fetch(`/api/admin/users/${username}`, { method: 'DELETE' });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function save() {
        const updated = {
          ...settings,
          nodes,
          chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } },
          sshUser,
