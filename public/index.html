        const interval = setInterval(() => { refreshMatrix(); refreshSyncs(); }, 10000);
        // Listen for sync progress
        socket.on('sync:progress', refreshSyncs);
        socket.on('sync:complete', () => { refreshSyncs(); refreshMatrix(); });
        return () => { clearInterval(interval); socket.off('sync:progress', refreshSyncs); socket.off('sync:complete'); };
      }, []);

      const { nodes: nodeNames, models, matrix, activeModel, diskInfo } = matrixData;

      async function handleLoad() {
        if (!loadModel) return;
        setLoadStatus({ status: 'loading', model: loadModel });
        try {
          const onlineCount = clusterStatus?.nodes?.filter(n => n.online)?.length || 1;
          const res = await fetch('/api/monitoring/load', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId: loadModel, sharding, minNodes: onlineCount }),
          });
          const data = await res.json();
          if (res.ok) {
            setLoadStatus({ status: 'running', model: loadModel });
          } else {
            setLoadStatus({ status: 'failed', model: loadModel, error: data.error });
          }
        } catch (e) {
          setLoadStatus({ status: 'failed', model: loadModel, error: e.message });
        }
      }

      async function handleUnload() {
        try {
          await fetch('/api/monitoring/purge', { method: 'POST' });
          setLoadStatus(null);
        } catch (e) {}
      }

      function modelOnNode(modelId, nodeName) {
        const nodeList = matrix[nodeName] || [];
        return nodeList.find(m => m.id === modelId);
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-4">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Models</span>
              <span className="text-[13px] text-gray-400">{models.length} models across {nodeNames.length} nodes</span>
            </div>
          </div>

          {/* Model matrix table */}
          {models.length > 0 && (
          <div className="px-10 pb-4">
            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
              {/* Header */}
              <div className="flex px-5 py-3 bg-gray-50 border-b border-gray-200">
                <div className="flex-[2.5]"><span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Model</span></div>
                {nodeNames.map(name => (
                  <div key={name} className="flex-1 text-center flex flex-col items-center gap-0.5">
                    <span className="text-xs font-semibold text-gray-700">{name}</span>
                    {diskInfo[name] && <span className="mono text-[10px] text-gray-400">{diskInfo[name].freeGB} GB free</span>}
                  </div>
                ))}
                <div className="w-[70px]" />
              </div>
              {/* Rows */}
              {models.map(model => {
                const isActive = activeModel === model.id;
                const presentOn = nodeNames.filter(n => modelOnNode(model.id, n));
                const missingOn = nodeNames.filter(n => !modelOnNode(model.id, n));
                return (
                  <div key={model.id} className={`flex px-5 py-3.5 border-b border-gray-100 items-center ${isActive ? 'bg-amber-50' : 'hover:bg-gray-50'}`}>
                    <div className="flex-[2.5] flex flex-col gap-0.5">
                      <div className="flex items-center gap-1.5">
                        {isActive && <span className="text-[11px]">⚡</span>}
                        <span className={`text-[13px] font-medium text-gray-900 ${isActive ? 'font-semibold' : ''}`}>{model.id.split('/').pop()}</span>
                      </div>
                      <span className="mono text-[11px] text-gray-400">{model.id.split('/')[0]} · {formatBytes(model.sizeBytes)}</span>
                    </div>
                    {nodeNames.map(name => {
                      const m = modelOnNode(model.id, name);
                      return (
                        <div key={name} className="flex-1 text-center">
                          {m ? (
                            <div className="flex flex-col items-center gap-0.5">
                              <span className="text-emerald-500 text-sm">✓ <span className="mono text-[11px] text-gray-500">{formatBytes(m.sizeBytes)}</span></span>
                              <button onClick={() => {
                                const key = `${model.id}::${name}`;
                                setDeleteSelection(prev => { const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s; });
                              }} className={`transition-colors ${deleteSelection.has(`${model.id}::${name}`) ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}`}>
                                {Icons.trash(deleteSelection.has(`${model.id}::${name}`) ? '#ef4444' : undefined)}
                              </button>
                            </div>
                          ) : (
                            <span className="mono text-[11px] text-gray-300">—</span>
                          )}
                        </div>
                      );
                    })}
                    <div className="w-[70px] text-right">
                      {missingOn.length > 0 && missingOn.length < nodeNames.length && (
                        <button onClick={async () => {
                          const sourceNode = presentOn[0];
                          await fetch('/api/models/sync', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ modelId: model.id, sourceNode, targetNodes: missingOn }),
                          });
                        }} className="text-[11px] text-indigo-500 font-medium hover:underline">Sync</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          )}

          {/* Delete bar */}
          {deleteSelection.size > 0 && (
            <div className="px-10 pb-4">
              <div className="flex items-center gap-3 px-4 py-3 bg-red-50 border border-red-200 rounded-xl">
                <span className="text-xs text-red-700 font-medium">{deleteSelection.size} selected for deletion</span>
                <div className="flex-1" />
                <button onClick={() => setDeleteSelection(new Set())}
                  className="px-3 py-1 text-xs text-gray-500 border border-gray-200 rounded-md hover:bg-white">Cancel</button>
                <button onClick={async () => {
                  if (!confirm(`Delete ${deleteSelection.size} model(s) from nodes? This cannot be undone.`)) return;
                  setDeleting(true);
                  for (const key of deleteSelection) {
                    const [modelId, nodeName] = key.split('::');
                    await fetch('/api/models/delete', {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ modelId, nodeName }),
                    });
                  }
                  setDeleteSelection(new Set());
                  setDeleting(false);
                  // Immediate refresh
                  refreshMatrix();
                  refreshSyncs();
                }} disabled={deleting}
                  className="px-4 py-1 bg-red-500 text-white text-xs font-semibold rounded-md hover:bg-red-600 disabled:opacity-50">
                  {deleting ? 'Deleting...' : `Delete ${deleteSelection.size} model(s)`}
                </button>
              </div>
            </div>
          )}

          {/* Active syncs */}
          {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').length > 0 && (
            <div className="px-10 pb-4 flex flex-col gap-2">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Syncing</span>
              {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').map(s => (
                <div key={s.id} className="bg-white border border-indigo-200 rounded-xl p-4 flex flex-col gap-2">
                  <div className="flex justify-between items-center">
                    <div className="flex items-center gap-2">
                      <div className="px-1.5 py-0.5 bg-indigo-50 rounded text-[10px] font-semibold text-indigo-500">RSYNC</div>
                      <span className="text-[13px] font-medium text-gray-900">{s.modelId}</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="mono text-[11px] text-gray-400">{s.sourceNode} → {(s.targetNodes || []).join(', ')}</span>
                      <button onClick={() => { fetch(`/api/models/syncs/${s.id}`, { method: 'DELETE' }); }}
                        className="text-gray-300 hover:text-red-500 transition" title="Cancel sync">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </div>
                  </div>
                  {s.progress && Object.entries(s.progress).map(([node, p]) => (
                    <div key={node} className="flex items-center gap-3">
                      <span className="text-[11px] text-gray-500 w-16">{node}</span>
                      <div className="flex-1 h-1.5 bg-gray-100 rounded-full">
                        <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${p.percent || 0}%` }} />
                      </div>
                      <span className={`mono text-[11px] ${p.status === 'done' ? 'text-emerald-500' : p.status === 'error' ? 'text-red-500' : 'text-indigo-500'}`}>
                        {p.status === 'done' ? '✓' : p.status === 'error' ? '✗ ' + (p.error || '') : `${p.percent || 0}%`}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {/* Load Model section */}
          <div className="px-10 pb-6">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-4">
              <div className="flex justify-between items-center">
                <span className="text-lg font-bold text-gray-900">Load Model</span>
                <span className="text-xs text-gray-400">v1: single instance</span>
              </div>
              <div className="flex gap-4 items-end">
                <div className="flex-1 flex flex-col gap-1.5">
                  <span className="text-xs text-gray-500 font-medium">Model</span>
                  <select value={loadModel} onChange={e => setLoadModel(e.target.value)}
                    className="mono text-xs px-3 py-2.5 border border-gray-200 rounded-lg bg-white text-gray-900">
                    <option value="">Select a model...</option>
                    {chatModels.map(m => (
                      <option key={m.id} value={m.id}>{m.id === activeModel ? '⚡ ' : ''}{m.id}</option>
                    ))}
                  </select>
                </div>
                <div className="flex flex-col gap-1.5">
                  <span className="text-xs text-gray-500 font-medium">Sharding</span>
                  <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                    <button onClick={() => setSharding('Pipeline')} className={`px-4 py-2 text-[13px] font-medium ${sharding === 'Pipeline' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Pipeline</button>
                    <button onClick={() => setSharding('Tensor')} className={`px-4 py-2 text-[13px] font-medium ${sharding === 'Tensor' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Tensor</button>
                  </div>
                </div>
              </div>

              {/* Status + Load button */}
              {loadStatus ? (
                <div className={`flex items-center gap-3 px-4 py-3 rounded-lg ${
                  loadStatus.status === 'running' ? 'bg-emerald-50 border border-emerald-200' :
                  loadStatus.status === 'loading' ? 'bg-amber-50 border border-amber-200' :
                  'bg-red-50 border border-red-200'
                }`}>
                  <div className={`w-2 h-2 rounded-full ${
                    loadStatus.status === 'running' ? 'bg-emerald-500' :
                    loadStatus.status === 'loading' ? 'bg-amber-500 animate-pulse' : 'bg-red-500'
                  }`} />
                  <span className={`text-[13px] font-semibold ${
                    loadStatus.status === 'running' ? 'text-emerald-600' :
                    loadStatus.status === 'loading' ? 'text-amber-600' : 'text-red-600'
                  }`}>{loadStatus.status === 'running' ? 'Running' : loadStatus.status === 'loading' ? 'Loading...' : 'Failed'}</span>
                  <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
                  {loadStatus.error && <span className="text-xs text-red-500">{loadStatus.error}</span>}
                  <div className="flex-1" />
                  {loadStatus.status === 'running' && (
                    <button onClick={handleUnload} className="px-3 py-1 border border-red-200 rounded text-xs text-red-600 hover:bg-red-50">Unload</button>
                  )}
                  <button onClick={handleLoad} className="px-4 py-1.5 bg-exo rounded-md text-[13px] font-semibold text-gray-900 hover:brightness-95">Load Model</button>
                </div>
              ) : (
                <div className="flex justify-end">
                  <button onClick={handleLoad} className="px-5 py-2.5 bg-exo rounded-lg text-sm font-semibold text-gray-900 hover:brightness-95">Load Model</button>
                </div>
              )}
            </div>
          </div>

        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // DOWNLOADS PAGE (HuggingFace Search)
    // ═══════════════════════════════════════════════════════════════════

    // Persistent search state (survives page switches) — plain object, not a hook
    const _dlState = { query: '', results: [], rawResults: [], quantFilter: '', paramsFilter: '' };

    function DownloadsPage() {
      const [query, setQuery] = useState(_dlState.query);
      const [results, setResults] = useState(_dlState.results);
      const [loading, setLoading] = useState(false);
      const [format, setFormat] = useState('mlx');
      const [sort, setSort] = useState('downloads');
      const [sortDir, setSortDir] = useState('desc');
      const [quantFilter, setQuantFilter] = useState(_dlState.quantFilter);
      const [paramsFilter, setParamsFilter] = useState(_dlState.paramsFilter);
      const [directId, setDirectId] = useState('');
      const [rawResults, setRawResults] = useState(_dlState.rawResults);
      const [downloadingIds, setDownloadingIds] = useState(new Set());
      const [distributed, setDistributed] = useState(true);
      const [activeDownloads, setActiveDownloads] = useState([]);

      // Persist search state to survive page switches
      useEffect(() => { Object.assign(_dlState, { query, results, rawResults, quantFilter, paramsFilter }); }, [query, results, rawResults, quantFilter, paramsFilter]);

      // Poll active downloads
      useEffect(() => {
        const refresh = () => fetch('/api/downloads').then(r => r.json()).then(d => setActiveDownloads(d.filter(dl => dl.status === 'downloading' || dl.status === 'queued'))).catch(() => {});
        refresh();
        const interval = setInterval(refresh, 5000);
        socket.on('download:progress', refresh);
        socket.on('download:complete', refresh);
        return () => { clearInterval(interval); socket.off('download:progress', refresh); socket.off('download:complete', refresh); };
      }, []);

      // Compute available quants/params based on current cross-filter
      const availableQuants = useMemo(() => {
        let pool = rawResults;
        if (paramsFilter) pool = pool.filter(m => String(m.namedParams) === String(paramsFilter));
        return [...new Set(pool.map(m => m.quantBits).filter(Boolean))].sort((a, b) => a - b);
      }, [rawResults, paramsFilter]);

      const availableParams = useMemo(() => {
        let pool = rawResults;
        if (quantFilter) pool = pool.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
        return [...new Set(pool.map(m => m.namedParams).filter(Boolean))].sort((a, b) => a - b);
      }, [rawResults, quantFilter]);

      async function search() {
        if (!query.trim()) return;
        setLoading(true);
        setQuantFilter(''); setParamsFilter('');
        try {
          const apiSort = sort === 'estimatedSizeGB' ? 'downloads' : sort;
          // Include params filter in search query for better API results
          let searchQuery = query;
          if (paramsFilter) searchQuery += ` ${paramsFilter}B`;
          if (quantFilter) searchQuery += ` ${quantFilter}bit`;
          const params = new URLSearchParams({ q: searchQuery, format: 'mlx', sort: apiSort, limit: '50' });
          const res = await fetch(`/api/hub/search?${params}`);
          const data = await res.json();
          setRawResults(data);
          // Apply client-side filters on results
          let filtered = data;
          if (quantFilter) filtered = filtered.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
          if (paramsFilter) filtered = filtered.filter(m => String(m.namedParams) === String(paramsFilter));
          if (sort === 'estimatedSizeGB') {
            filtered.sort((a, b) => sortDir === 'desc' ? (b.estimatedSizeGB || 0) - (a.estimatedSizeGB || 0) : (a.estimatedSizeGB || 0) - (b.estimatedSizeGB || 0));
          }
          setResults(filtered);
        } catch (e) {
          console.error('HF search error:', e);
        }
        setLoading(false);
      }

      function applyFilters() {
        let filtered = [...rawResults];
        if (quantFilter) filtered = filtered.filter(m => String(m.quantBits) === String(quantFilter) || (m.precision && m.precision.toLowerCase() === quantFilter.toLowerCase()));
        if (paramsFilter) filtered = filtered.filter(m => String(m.namedParams) === String(paramsFilter));
        if (sort === 'estimatedSizeGB') {
          filtered.sort((a, b) => sortDir === 'desc' ? (b.estimatedSizeGB || 0) - (a.estimatedSizeGB || 0) : (a.estimatedSizeGB || 0) - (b.estimatedSizeGB || 0));
        }
        setResults(filtered);
      }

      async function downloadModel(modelId) {
        setDownloadingIds(prev => new Set([...prev, modelId]));
        try {
          await fetch('/api/download', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId, distributed }),
          });
        } catch (e) {}
      }

      async function downloadDirect() {
        if (!directId.includes('/')) return;
        await downloadModel(directId);
        setDirectId('');
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-0">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Downloads</span>
              <span className="text-[13px] text-gray-400">Search and download models on HuggingFace · exo qualified only</span>
            </div>
            <a href="https://huggingface.com" target="_blank" rel="noopener" className="flex items-center gap-1.5 px-2.5 py-1 border border-gray-200 rounded-md hover:bg-gray-50">
              <span className="text-[11px]">↗</span>
              <span className="text-xs text-gray-500">huggingface.com</span>
            </a>
          </div>

          {/* Search + Direct */}
          <div className="px-10 py-4 flex gap-3">
            <div className="flex-1 flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl">
              <span className="text-gray-400">🔍</span>
              <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && search()}
                placeholder="Search HuggingFace..." className="flex-1 text-sm text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={search} className="px-3 py-1 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95">Search</button>
            </div>
            <div className="flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl w-[360px]">
              <span className="text-xs text-gray-400">Direct:</span>
              <input type="text" value={directId} onChange={e => setDirectId(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && downloadDirect()}
                placeholder="author/model-name" className="flex-1 mono text-xs text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={downloadDirect} disabled={!directId.includes('/')}
                className="px-2.5 py-1 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95 disabled:opacity-40">↓</button>
            </div>
          </div>

          {/* Filters + Download Mode — single row */}
          <div className="px-10 pb-4 flex items-center gap-4 flex-wrap">
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Format</span>
              <span className="px-2.5 py-1 rounded-md text-[11px] font-semibold bg-exo text-gray-900">MLX</span>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Quant</span>
              <select value={quantFilter} onChange={e => setQuantFilter(e.target.value)}
                className="mono text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white min-w-[80px]">
                <option value="">All</option>
                {availableQuants.map(q => <option key={q} value={q}>{q}-bit</option>)}
              </select>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Parameters</span>
              <select value={paramsFilter} onChange={e => setParamsFilter(e.target.value)}
                className="mono text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white min-w-[80px]">
                <option value="">All</option>
                {availableParams.map(p => <option key={p} value={p}>{p}B</option>)}
              </select>
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Sort</span>
              <select value={sort} onChange={e => setSort(e.target.value)} className="text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white">
                <option value="downloads">Popularity</option>
                <option value="lastModified">Date</option>
                <option value="likes">Likes</option>
                <option value="estimatedSizeGB">Size</option>
              </select>
              <button onClick={() => setSortDir(d => d === 'desc' ? 'asc' : 'desc')}
                className="px-2 py-1 border border-gray-200 rounded-md text-[11px] text-gray-500 hover:bg-gray-50">
                {sortDir === 'desc' ? '↓' : '↑'}
              </button>
            </div>
            <button onClick={() => { search(); }}
              className="px-3 py-1 bg-exo rounded-md text-[11px] font-semibold text-gray-900 hover:brightness-95">Apply</button>
            <div className="flex-1" />
            <div className="flex items-center gap-3 px-3 py-1.5 bg-[#f9fafb] border border-gray-200 rounded-lg">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">DOWNLOAD MODE</span>
              <button onClick={() => setDistributed(false)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-colors ${!distributed ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'text-gray-500 hover:bg-gray-100'}`}>
                Node 1 only
              </button>
              <button onClick={() => setDistributed(true)}
                className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-colors ${distributed ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'text-gray-500 hover:bg-gray-100'}`}>
                Distributed
              </button>
            </div>
          </div>

          {/* Results */}
          <div className="px-10 pb-4">
            {loading && <div className="text-center py-8 text-gray-400 text-sm">Searching...</div>}
            {!loading && results.length > 0 && (
              <div className="flex items-center gap-3 mb-2">
                <span className="text-xs text-gray-400">{results.length} results</span>
                {results.length > 0 && (
                  <button onClick={() => { setResults([]); setRawResults([]); setQuery(''); setQuantFilter(''); setParamsFilter(''); }}
                    className="text-[10px] text-gray-400 hover:text-gray-600 border border-gray-200 px-2 py-0.5 rounded">Clear results</button>
                )}
              </div>
            )}
          </div>
          <div className="flex-1 px-10 pb-6 flex flex-col gap-2 overflow-y-auto">
            {results.map(m => (
              <div key={m.id} className="bg-white border border-gray-200 rounded-xl px-5 py-3.5 flex items-center gap-4">
                <div className="flex-1 flex flex-col gap-1">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold text-gray-900">{m.modelName || m.id}</span>
                    <span className="mono text-[10px] font-semibold px-1.5 py-0.5 rounded text-amber-700 bg-amber-50">MLX</span>
                    {m.quantBits && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.quantBits}-bit</span>}
                    {m.precision && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.precision}</span>}
                    {m.namedParams && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.namedParams}B</span>}
                    <a href={`https://huggingface.co/${m.id}`} target="_blank" rel="noopener" className="text-gray-300 hover:text-gray-500 transition-colors">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="mono text-[11px] text-gray-400">{m.author}</span>
                    {m.estimatedSizeGB && <span className="mono text-[11px] text-gray-500">~{m.estimatedSizeGB} GB</span>}
                    <span className="text-[11px] text-gray-400">↓ {m.downloads >= 1000 ? `${(m.downloads/1000).toFixed(1)}K` : m.downloads}</span>
                  </div>
                </div>
                <button onClick={() => downloadModel(m.id)} disabled={downloadingIds.has(m.id)}
                  className={`px-3.5 py-1.5 rounded-md text-xs font-semibold flex-shrink-0 ${downloadingIds.has(m.id) ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-exo text-gray-900 hover:brightness-95'}`}>
                  {downloadingIds.has(m.id) ? '✓ Queued' : 'Download'}
                </button>
              </div>
            ))}
            {!loading && results.length === 0 && query && (
              <div className="text-center py-8 text-gray-400 text-sm">No results. Try a different search.</div>
            )}
            {!query && results.length === 0 && (
              <div className="text-center py-12 text-gray-400 text-sm">Search HuggingFace to find models for your cluster.</div>
            )}
          </div>

          {/* Active downloads mini progress */}
          {activeDownloads.length > 0 && (
            <div className="flex-shrink-0 border-t border-gray-200 bg-white px-10 py-3 flex flex-col gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Active downloads</span>
              {activeDownloads.map(dl => {
                const parts = (dl.progress || '').split(':');
                const gb = parseFloat(parts[0]) || 0;
                const total = parseFloat(parts[1]) || 0;
                const speed = parseFloat(parts[3]) || 0;
                const pct = total > 0 ? Math.round(gb / total * 100) : 0;
                return (
                  <div key={dl.id} className="flex items-center gap-3">
                    <span className="text-[11px] font-medium text-gray-700 truncate max-w-[200px]">{dl.modelId?.split('/').pop()}</span>
                    <div className="flex-1 h-1.5 bg-gray-100 rounded-full">
                      <div className="h-full bg-exo rounded-full transition-all" style={{ width: `${pct}%` }} />
                    </div>
                    <span className="mono text-[10px] text-gray-500 w-8 text-right">{pct}%</span>
                    {speed > 0 && <span className="mono text-[10px] text-emerald-500 w-16">{speed} MB/s</span>}
                    {dl.status === 'queued' && <span className="text-[10px] text-gray-400">queued</span>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // SETTINGS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function SettingsPage({ settings, refreshSettings, authState, setAuthState }) {
      const [nodes, setNodes] = useState(settings?.nodes || []);
      const [exoIp, setExoIp] = useState(settings?.chat?.exo1?.ip || '');
      const [exoPort, setExoPort] = useState(settings?.chat?.exo1?.port || 52415);
      const [sshUser, setSshUser] = useState(settings?.sshUser || 'admin');
      const [newNodeName, setNewNodeName] = useState('');
      const [newNodeIp, setNewNodeIp] = useState('');
      const [newNodeRam, setNewNodeRam] = useState('');
      const [passwords, setPasswords] = useState({}); // ip → password
      const [showPasswords, setShowPasswords] = useState({});
      const [discovering, setDiscovering] = useState(false);
      const [discovered, setDiscovered] = useState([]);
      const [testResult, setTestResult] = useState(null);
      const [openRouterKey, setOpenRouterKey] = useState(settings?.openRouterApiKey || '');
      const [sshStatus, setSshStatus] = useState({}); // ip → { ok, method }
      const [setupResult, setSetupResult] = useState(null);
      const [configCheck, setConfigCheck] = useState(null);
      const [checking, setChecking] = useState(false);
      const [saveStatus, setSaveStatus] = useState(null);
      // Admin mode
      const [adminPassword, setAdminPassword] = useState('');
      const [adminToggleError, setAdminToggleError] = useState('');
      const [users, setUsers] = useState([]);
      const [newUser, setNewUser] = useState({ username: '', password: '', role: 'user' });
      const [userError, setUserError] = useState('');
      // Auth log
      const [authLog, setAuthLog] = useState([]);
      const [authLogOpen, setAuthLogOpen] = useState(false);

      useEffect(() => {
        if (settings) {
          setNodes(settings.nodes || []);
          setExoIp(settings.chat?.exo1?.ip || '');
          setExoPort(settings.chat?.exo1?.port || 52415);
          setSshUser(settings.sshUser || 'admin');
          setOpenRouterKey(settings.openRouterApiKey || '');
        }
      }, [settings]);

      // Load users when admin mode is on
      useEffect(() => {
        if (settings?.adminMode) {
          fetch('/api/admin/users').then(r => r.ok ? r.json() : []).then(setUsers).catch(() => {});
        }
      }, [settings?.adminMode]);

      // Load auth log
      const refreshAuthLog = useCallback(() => {
        fetch('/api/admin/auth-log').then(r => r.ok ? r.json() : []).then(setAuthLog).catch(() => {});
      }, []);
      useEffect(() => {
        if (settings?.adminMode && authLogOpen) refreshAuthLog();
      }, [settings?.adminMode, authLogOpen]);

      async function toggleAdminMode() {
        setAdminToggleError('');
        if (!settings?.adminMode) {
          // Enable admin mode
          if (!adminPassword || adminPassword.length < 4) {
            setAdminToggleError('Password must be at least 4 characters');
            return;
          }
          const res = await fetch('/api/settings', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminMode: true, adminPassword }),
          });
          if (!res.ok) { const d = await res.json(); setAdminToggleError(d.error); return; }
          refreshSettings();
          // Auto-login as admin with the password we just set
          const loginRes = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: 'admin', password: adminPassword }),
          });
          setAdminPassword('');
          if (loginRes.ok) {
            const user = await loginRes.json();
            setAuthState({ adminMode: true, user });
          }
        } else {
          // Disable admin mode
          const res = await fetch('/api/settings', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminMode: false }),
          });
          if (!res.ok) { const d = await res.json(); setAdminToggleError(d.error); return; }
          await fetch('/api/auth/logout', { method: 'POST' });
          setAuthState({ adminMode: false, user: null });
          refreshSettings();
        }
      }

      async function addUserAccount() {
        setUserError('');
        if (!newUser.username || !newUser.password) { setUserError('Username and password required'); return; }
        const res = await fetch('/api/admin/users', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: newUser.username, password: newUser.password, role: newUser.role || 'user' }),
        });
        if (!res.ok) { const d = await res.json(); setUserError(d.error); return; }
        setNewUser({ username: '', password: '', role: 'user' });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function toggleUserActive(username, active) {
        await fetch(`/api/admin/users/${username}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ active: !active }),
        });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function deleteUserAccount(username) {
        if (!confirm(`Delete user "${username}"?`)) return;
        await fetch(`/api/admin/users/${username}`, { method: 'DELETE' });
        fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
      }

      async function save() {
        const updated = {
          ...settings,
          nodes,
          chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } },
          sshUser,
          openRouterApiKey: openRouterKey,
          setupComplete: nodes.length > 0,
        };
        setSaveStatus('saving');
        await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
        refreshSettings();
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(null), 2000);
      }

      async function discover() {
        setDiscovering(true);
        try {
          const res = await fetch('/api/discover');
          const data = await res.json();
          setDiscovered(data);
        } catch (e) {}
        setDiscovering(false);
      }

      function addNode() {
        if (!newNodeName || !newNodeIp) return;
        setNodes(prev => [...prev, { name: newNodeName, ip: newNodeIp, ram: newNodeRam || '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(newNodeIp);
        setNewNodeName(''); setNewNodeIp(''); setNewNodeRam('');
      }

      function addDiscoveredNode(ip) {
        const name = `node-${ip.split('.').pop()}`;
        setNodes(prev => [...prev, { name, ip, ram: '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(ip);
      }

      function removeNode(i) {
        setNodes(prev => prev.filter((_, idx) => idx !== i));
      }

      async function testSSH() {
        const results = {};
        for (const node of nodes) {
          try {
            const r = await fetch('/api/ssh/test', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ip: node.ip, user: sshUser }),
            });
            const data = await r.json();
            results[node.ip] = { ok: data.connected, method: data.method };
          } catch (e) {
            results[node.ip] = { ok: false, method: 'error' };
          }
        }
        setSshStatus(results);
      }

      async function setupSSHKeys() {
        const nodesWithPwd = nodes.filter(n => passwords[n.ip]).map(n => ({
          ip: n.ip, user: sshUser, password: passwords[n.ip],
        }));
        if (nodesWithPwd.length === 0) { setSetupResult('Enter passwords for nodes first'); return; }
        setSetupResult('Installing SSH keys...');
        try {
          const r = await fetch('/api/ssh/setup-keys', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nodes: nodesWithPwd }),
          });
          const data = await r.json();
          const ok = data.results?.filter(r => r.ok)?.length || 0;
          const fail = data.results?.filter(r => !r.ok)?.length || 0;
          const interOk = data.interNodeResults?.filter(r => r.ok)?.length || 0;
          const interFail = data.interNodeResults?.filter(r => !r.ok)?.length || 0;
          setSetupResult(`Container→nodes: ${ok} OK. Inter-node: ${interOk} OK${interFail ? `, ${interFail} failed` : ''}. Total: ${ok + interOk} keys`);
          // Clear passwords after setup
          setPasswords({});
          // Re-test
          setTimeout(testSSH, 1000);
        } catch (e) {
          setSetupResult(`Error: ${e.message}`);
        }
      }

      async function testEndpoint() {
        try {
          // Save current endpoint first so backend uses it
          const updated = { ...settings, chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } }, sshUser };
          await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
          // Test via backend proxy (avoids CORS)
          const res = await fetch('/api/chat/active-model?engine=exo1');
          setTestResult(res.ok ? 'connected' : 'failed');
        } catch (e) {
          setTestResult('failed');
        }
        setTimeout(() => setTestResult(null), 5000);
      }

      return (
        <div className="flex-1 flex gap-8 px-10 py-5 overflow-y-auto">
          <div className="flex-1 flex flex-col gap-7">
            <span className="text-[22px] font-bold text-gray-900">Settings</span>

            {/* EXO Nodes */}
            <div className="flex flex-col gap-3">
              <div className="flex justify-between items-center">
                <span className="text-sm font-semibold text-gray-900">EXO Nodes</span>
                <div className="flex gap-2">
                  <button onClick={discover} disabled={discovering}
                    className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                    {discovering ? 'Scanning...' : '🔍 Re-discover'}
                  </button>
                </div>
              </div>

              {/* Discovered nodes */}
              {discovered.length > 0 && (
                <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-indigo-600 uppercase">Discovered on LAN</span>
                  {discovered.map(d => (
                    <div key={d.ip} className="flex items-center justify-between">
                      <span className="mono text-xs text-gray-700">{d.ip}:{d.port} — {d.modelCount} models</span>
                      {!nodes.find(n => n.ip === d.ip) ? (
                        <button onClick={() => addDiscoveredNode(d.ip)} className="text-[11px] text-indigo-600 hover:underline">+ Add</button>
                      ) : (
                        <span className="text-[11px] text-gray-400">Already added</span>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* Nodes table */}
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex px-4 py-2 bg-gray-50 border-b border-gray-200">
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Name</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">IP Address</div>
                  <div className="flex-1 text-[11px] font-semibold text-gray-400 uppercase tracking-wider">RAM</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Password (for SSH setup)</div>
                  <div className="w-[80px] text-[11px] font-semibold text-gray-400 uppercase tracking-wider text-center">SSH</div>
                  <div className="w-[60px]" />
                </div>
                {nodes.map((node, i) => (
                  <div key={i} className="flex px-4 py-2.5 border-b border-gray-100 items-center">
                    <div className="flex-[2] text-[13px] font-medium text-gray-900">{node.name}</div>
                    <div className="flex-[2] mono text-xs text-gray-500">{node.ip}</div>
                    <div className="flex-1 text-xs text-gray-500">{node.ram}</div>
                    <div className="flex-[2] flex items-center gap-1">
                      <input type={showPasswords[node.ip] ? 'text' : 'password'}
                        value={passwords[node.ip] || ''} onChange={e => setPasswords(p => ({ ...p, [node.ip]: e.target.value }))}
                        placeholder="••••••" className="mono text-xs px-2 py-1 border border-gray-200 rounded bg-white w-full" />
                      <button onClick={() => setShowPasswords(p => ({ ...p, [node.ip]: !p[node.ip] }))}
                        className="text-gray-400 hover:text-gray-600 flex-shrink-0">{showPasswords[node.ip] ? Icons.eyeOff('#9ca3af') : Icons.eye('#9ca3af')}</button>
                    </div>
                    <div className="w-[80px] text-center">
                      {sshStatus[node.ip] ? (
                        <span className={`text-[11px] font-medium ${sshStatus[node.ip].ok ? 'text-emerald-500' : 'text-red-500'}`}>
                          {sshStatus[node.ip].ok ? '✓ Key' : '✗ No key'}
                        </span>
                      ) : (
                        <span className="text-[11px] text-gray-300">—</span>
                      )}
                    </div>
                    <div className="w-[60px] text-right">
                      <button onClick={() => removeNode(i)} className="text-xs text-red-400 hover:text-red-600">Remove</button>
                    </div>
                  </div>
                ))}
                {/* Add row */}
                <div className="flex px-4 py-2 items-center gap-2 bg-gray-50">
                  <input type="text" value={newNodeName} onChange={e => setNewNodeName(e.target.value)} placeholder="Name" className="flex-[2] text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeIp} onChange={e => setNewNodeIp(e.target.value)} placeholder="IP Address" className="flex-[2] mono text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeRam} onChange={e => setNewNodeRam(e.target.value)} placeholder="RAM" className="flex-1 text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <button onClick={addNode} className="px-3 py-1.5 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95">+ Add</button>
                </div>
              </div>
              {/* SSH actions */}
              <div className="flex items-center gap-3 mt-1">
                <button onClick={testSSH} className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50 flex items-center gap-1.5">
                  {Icons.key('#6b7280')} Test SSH Keys
                </button>
                <button onClick={setupSSHKeys} className="px-3 py-1.5 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95 flex items-center gap-1.5">
                  {Icons.lock('#111827')} Setup SSH Keys
                </button>
                {setupResult && <span className="text-xs text-gray-500">{setupResult}</span>}
                <div className="flex-1" />
                <button onClick={async () => {
                  setChecking(true); setConfigCheck(null);
                  try {
                    const r = await fetch('/api/config-check', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                    setConfigCheck(await r.json());
                  } catch (e) { setConfigCheck({ error: e.message }); }
                  setChecking(false);
                }} disabled={checking || nodes.length === 0}
                  className="px-3 py-1.5 border border-indigo-200 bg-indigo-50 rounded-md text-xs font-semibold text-indigo-600 hover:bg-indigo-100 disabled:opacity-50 flex items-center gap-1.5">
                  {checking ? 'Checking...' : 'Check Config'}
                </button>
              </div>
            </div>

            {/* Config Check Results */}
            {configCheck && configCheck.nodes && (
              <div className="bg-white border border-gray-200 rounded-xl">
                <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Config Check Results</span>
                  <button onClick={() => setConfigCheck(null)} className="text-[11px] text-gray-400 hover:text-gray-600">×</button>
                </div>
                {configCheck.nodes.map(node => {
                  const c = node.checks;
                  const Dot = ({ ok }) => <div className={`w-2 h-2 rounded-full flex-shrink-0 ${ok ? 'bg-emerald-500' : ok === false ? 'bg-red-500' : 'bg-gray-300'}`} />;
                  const allOk = c.ssh && c.exoApi && c.python && (c.huggingfaceHub === null || c.huggingfaceHub) && c.rsync && c.modelPath;
                  return (
                    <div key={node.name} className="px-4 py-3 border-b border-gray-100">
                      <div className="flex items-center gap-2 mb-2">
                        <Dot ok={allOk} />
                        <span className="text-[13px] font-semibold text-gray-900">{node.name}</span>
                        <span className="mono text-[10px] text-gray-400">{node.ip}</span>
                        {allOk && <span className="text-[10px] text-emerald-500 font-medium">All checks passed</span>}
                      </div>
                      <div className="grid grid-cols-4 gap-2 ml-4">
                        <div className="flex items-center gap-1.5"><Dot ok={c.ssh} /><span className="text-[11px] text-gray-600">SSH</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.exoApi} /><span className="text-[11px] text-gray-600">exo API</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.python} /><span className="text-[11px] text-gray-600">Python3 {c.pythonVersion ? <span className="mono text-[9px] text-gray-400">{c.pythonVersion.replace('Python ','')}</span> : ''}</span></div>
                        <div className="flex items-center gap-1.5">
                          {c.huggingfaceHub === null ? <div className="w-2 h-2 rounded-full bg-gray-200 flex-shrink-0" /> : <Dot ok={c.huggingfaceHub} />}
                          <span className="text-[11px] text-gray-600">huggingface_hub {c.hfHubVersion ? <span className="mono text-[9px] text-gray-400">{c.hfHubVersion}</span> : c.huggingfaceHub === null ? <span className="text-[9px] text-gray-300">not required</span> : ''}</span>
                        </div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.rsync} /><span className="text-[11px] text-gray-600">rsync</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.modelPath} /><span className="text-[11px] text-gray-600">~/.exo/models/</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={!!c.diskFree} /><span className="text-[11px] text-gray-600">Disk {c.diskFree || '—'} free</span></div>
                        {c.interNodeSSH && (
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="text-[11px] text-gray-600">SSH→</span>
                            {Object.entries(c.interNodeSSH).map(([name, ok]) => (
                              <span key={name} className="flex items-center gap-0.5"><Dot ok={ok} /><span className="text-[9px] text-gray-400">{name}</span></span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* EXO Endpoint */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">EXO Endpoint</span>
              <div className="flex gap-3 items-center">
                <input type="text" value={exoIp} onChange={e => setExoIp(e.target.value)} placeholder="192.168.86.29"
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[200px]" />
                <span className="text-gray-400">:</span>
                <input type="number" value={exoPort} onChange={e => setExoPort(parseInt(e.target.value) || 52415)}
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[80px]" />
                <button onClick={testEndpoint} className="px-3.5 py-2 border border-gray-200 rounded-lg text-xs text-gray-500 hover:bg-gray-50">Test</button>
                {testResult && (
                  <div className="flex items-center gap-1.5">
                    <div className={`w-1.5 h-1.5 rounded-full ${testResult === 'connected' ? 'bg-emerald-500' : 'bg-red-500'}`} />
                    <span className={`text-xs ${testResult === 'connected' ? 'text-emerald-600' : 'text-red-600'}`}>
                      {testResult === 'connected' ? 'Connected' : 'Failed'}
                    </span>
                  </div>
                )}
              </div>
            </div>

            {/* SSH */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">SSH</span>
              <div className="flex gap-4">
                <div className="flex flex-col gap-1 flex-1">
                  <span className="text-xs text-gray-500">User</span>
                  <input type="text" value={sshUser} onChange={e => setSshUser(e.target.value)}
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                </div>
                <div className="flex flex-col gap-1 flex-[2]">
                  <span className="text-xs text-gray-500">Key path</span>
                  <input type="text" value={settings?.sshOpts?.match(/-i\s+(\S+)/)?.[1] || '/root/.ssh/id_ed25519'} readOnly
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500" />
                </div>
              </div>
            </div>

            {/* OpenRouter */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">OpenRouter (optional cloud fallback)</span>
              <p className="text-xs text-gray-400">Add your OpenRouter API key to access cloud models alongside your local exo cluster.</p>
              <div className="flex gap-3 items-center">
                <input type="password" value={openRouterKey} onChange={e => setOpenRouterKey(e.target.value)}
                  placeholder="sk-or-..." className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[400px]" />
                {openRouterKey && <span className="text-[11px] text-emerald-500">Key configured</span>}
              </div>
            </div>

            {/* Administrator Mode */}
            <div className="flex flex-col gap-3">
              <span className="text-sm font-semibold text-gray-900">Administrator Mode</span>
              <p className="text-xs text-gray-400">When enabled, users must log in. Only the admin can access Settings, Downloads, and manage cluster.</p>
              <div className="flex items-center gap-4">
                <button onClick={() => { if (settings?.adminMode) toggleAdminMode(); }}
                  className={`relative w-11 h-6 rounded-full transition-colors ${settings?.adminMode ? 'bg-indigo-500' : 'bg-gray-300 cursor-default'}`}>
                  <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${settings?.adminMode ? 'translate-x-[22px]' : 'translate-x-0.5'}`} />
                </button>
                <span className="text-xs text-gray-600">{settings?.adminMode ? 'Enabled' : 'Disabled'}</span>
              </div>
              {!settings?.adminMode && (
                <div className="flex items-center gap-3">
                  <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)}
                    placeholder="Set admin password..." className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[250px]" />
                  <button onClick={toggleAdminMode} disabled={!adminPassword}
                    className="px-4 py-2 bg-indigo-500 text-white text-xs font-semibold rounded-lg hover:bg-indigo-600 transition disabled:opacity-40">
                    Enable
                  </button>
                </div>
              )}
              {adminToggleError && <span className="text-xs text-red-500">{adminToggleError}</span>}
            </div>

            {/* Guest Mode (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <span className="text-sm font-semibold text-gray-900">Guest Access</span>
                <p className="text-xs text-gray-400">Allow unauthenticated users to chat with a token limit per session.</p>
                <div className="flex items-center gap-4">
                  <button onClick={async () => {
                    await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ guestMode: !settings.guestMode }) });
                    refreshSettings();
                  }} className={`relative w-11 h-6 rounded-full transition-colors ${settings.guestMode ? 'bg-indigo-500' : 'bg-gray-300'}`}>
                    <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${settings.guestMode ? 'translate-x-[22px]' : 'translate-x-0.5'}`} />
                  </button>
                  <span className="text-xs text-gray-600">{settings.guestMode ? 'Enabled' : 'Disabled'}</span>
                  {settings.guestMode && (
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-400">Limit:</span>
                      <input type="number" value={settings.guestTokenLimit || 50000}
                        onChange={async e => {
                          await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ guestTokenLimit: parseInt(e.target.value) || 50000 }) });
                          refreshSettings();
                        }}
                        className="w-[100px] px-2 py-1 border border-gray-200 rounded text-xs text-center" />
                      <span className="text-xs text-gray-400">tokens/session</span>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Auth Log (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <div className="flex items-center justify-between">
                  <span className="text-sm font-semibold text-gray-900">Connection Log</span>
                  <div className="flex items-center gap-2">
                    {authLogOpen && (
                      <>
                        <button onClick={refreshAuthLog} className="text-[11px] text-gray-400 hover:text-gray-600">Refresh</button>
                        <button onClick={async () => {
                          await fetch('/api/admin/auth-log', { method: 'DELETE' });
                          setAuthLog([]);
                        }} className="text-[11px] text-gray-400 hover:text-red-500">Clear</button>
                      </>
                    )}
                    <button onClick={() => setAuthLogOpen(!authLogOpen)}
                      className="text-[11px] text-indigo-500 hover:text-indigo-700">{authLogOpen ? 'Hide' : 'Show'}</button>
                  </div>
                </div>
                {authLogOpen && (
                  <div className="border border-gray-200 rounded-lg overflow-hidden">
                    {authLog.length === 0 ? (
                      <div className="px-4 py-6 text-center text-xs text-gray-400">No connections logged yet</div>
                    ) : (
                      <div className="max-h-[300px] overflow-y-auto">
                        <table className="w-full text-sm">
                          <thead className="sticky top-0">
                            <tr className="bg-gray-50 border-b border-gray-200">
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Time</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">User</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Action</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">IP</th>
                            </tr>
                          </thead>
                          <tbody>
                            {[...authLog].reverse().map((entry, i) => (
                              <tr key={i} className="border-b border-gray-100 last:border-0">
                                <td className="px-4 py-2 text-xs text-gray-500 whitespace-nowrap mono">
                                  {new Date(entry.ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' })}
                                </td>
                                <td className="px-4 py-2 text-xs text-gray-900 font-medium">{entry.username}</td>
                                <td className="px-4 py-2">
                                  <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                                    entry.action === 'login' ? 'bg-emerald-100 text-emerald-600' :
                                    entry.action === 'logout' ? 'bg-gray-100 text-gray-600' :
                                    entry.action === 'guest' ? 'bg-amber-100 text-amber-600' :
                                    entry.action === 'login_failed' ? 'bg-red-100 text-red-600' :
                                    'bg-gray-100 text-gray-600'
                                  }`}>{entry.action === 'login_failed' ? 'failed' : entry.action}</span>
                                </td>
                                <td className="px-4 py-2 text-xs text-gray-400 mono">{entry.ip?.replace('::ffff:', '')}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* User Management (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <span className="text-sm font-semibold text-gray-900">Users</span>
                <div className="border border-gray-200 rounded-lg overflow-hidden">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-200">
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Username</th>
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Role</th>
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Status</th>
                        <th className="text-right px-4 py-2 text-xs font-semibold text-gray-500">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {users.map(u => (
                        <tr key={u.username} className="border-b border-gray-100 last:border-0">
                          <td className="px-4 py-2.5 text-gray-900 font-medium">{u.username}</td>
                          <td className="px-4 py-2.5">
                            <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                              u.role === 'admin' ? 'bg-indigo-100 text-indigo-600' :
                              u.role === 'organizer' ? 'bg-amber-100 text-amber-600' :
                              'bg-gray-100 text-gray-600'
                            }`}>{u.role}</span>
                          </td>
                          <td className="px-4 py-2.5">
                            <span className={`text-xs ${u.active ? 'text-emerald-600' : 'text-gray-400'}`}>{u.active ? 'Active' : 'Inactive'}</span>
                          </td>
                          <td className="px-4 py-2.5 text-right">
                            {u.username !== 'admin' && (
                              <div className="flex items-center justify-end gap-2">
                                <select value={u.role} onChange={async e => {
                                  await fetch(`/api/admin/users/${u.username}`, {
                                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ role: e.target.value }),
                                  });
                                  fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
                                }} className="text-[11px] px-1.5 py-0.5 border border-gray-200 rounded bg-white text-gray-600">
                                  <option value="user">user</option>
                                  <option value="organizer">organizer</option>
                                  <option value="admin">admin</option>
                                </select>
                                <button onClick={() => toggleUserActive(u.username, u.active)}
                                  className="text-[11px] text-gray-400 hover:text-gray-600">{u.active ? 'Deactivate' : 'Activate'}</button>
                                <button onClick={() => deleteUserAccount(u.username)}
                                  className="text-[11px] text-gray-400 hover:text-red-500">Delete</button>
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {/* Add user form */}
                <div className="flex items-center gap-3">
                  <input type="text" value={newUser.username} onChange={e => setNewUser(p => ({ ...p, username: e.target.value }))}
                    placeholder="Username" className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[140px]" />
                  <input type="password" value={newUser.password} onChange={e => setNewUser(p => ({ ...p, password: e.target.value }))}
                    placeholder="Password" className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[140px]" />
                  <select value={newUser.role} onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))}
                    className="px-2 py-2 border border-gray-200 rounded-lg text-sm text-gray-600">
                    <option value="user">user</option>
                    <option value="organizer">organizer</option>
                    <option value="admin">admin</option>
                  </select>
                  <button onClick={addUserAccount} disabled={!newUser.username || !newUser.password}
                    className="px-4 py-2 bg-exo text-gray-900 text-xs font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40">
                    Add User
                  </button>
                </div>
                {userError && <span className="text-xs text-red-500">{userError}</span>}
              </div>
            )}

            {/* Save */}
            <button onClick={save} disabled={saveStatus === 'saving'}
              className={`self-start px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 ${
                saveStatus === 'saved' ? 'bg-emerald-500 text-white scale-[1.02]' : 'bg-exo text-gray-900 hover:brightness-95'
              } disabled:opacity-60`}>
              {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? '✓ Saved' : 'Save Settings'}
            </button>
          </div>

          {/* About card */}
          <div className="w-[260px] flex-shrink-0">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-3.5">
              <span className="text-sm font-semibold text-gray-900">About</span>
              <div className="flex flex-col gap-2">
                <div className="flex justify-between"><span className="text-xs text-gray-500">Version</span><span className="mono text-xs text-gray-900">{settings?.version || '—'}</span></div>
                <div className="flex justify-between"><span className="text-xs text-gray-500">Nodes</span><span className="text-xs text-gray-900">{nodes.length} configured</span></div>
              </div>
              <div className="h-px bg-gray-100" />
              <div className="flex flex-col gap-2">
                <a href="https://github.com/Sofille65/exoscopy" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ ExoScopy on GitHub</a>
                <a href="https://github.com/exo-explore/exo" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ exo on GitHub</a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════════════

    function LoginScreen({ onLogin, guestMode }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleLogin(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || 'Login failed'); setLoading(false); return; }
          onLogin(data);
        } catch (e) { setError('Connection error'); setLoading(false); }
      }

      async function handleGuest() {
        setError('');
        setLoading(true);
        try {
          const res = await fetch('/api/auth/guest', { method: 'POST' });
          const data = await res.json();
          if (!res.ok) { setError(data.error || 'Guest access failed'); setLoading(false); return; }
          onLogin(data);
        } catch (e) { setError('Connection error'); setLoading(false); }
      }

      return (
        <div className="h-screen flex items-center justify-center bg-gray-50">
          <form onSubmit={handleLogin} className="bg-white border border-gray-200 rounded-2xl p-8 w-[380px] flex flex-col gap-5 shadow-sm">
            <div className="flex flex-col items-center gap-2">
              <img src="logo.png" alt="" className="w-10 h-10" />
              <span className="text-xl font-bold text-gray-900">ExoScopy</span>
              <span className="text-xs text-gray-400">Sign in to continue</span>
            </div>
            {error && <div className="text-xs text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{error}</div>}
            <div className="flex flex-col gap-3">
              <input type="text" value={username} onChange={e => setUsername(e.target.value)}
                placeholder="Username" autoFocus autoComplete="username"
                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-exo transition-colors" />
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                placeholder="Password" autoComplete="current-password"
                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-exo transition-colors" />
            </div>
            <button type="submit" disabled={loading || !username || !password}
              className="px-4 py-2.5 bg-exo text-gray-900 text-sm font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40">
              {loading ? 'Signing in...' : 'Sign in'}
            </button>
            {guestMode && (
              <>
                <div className="flex items-center gap-3">
                  <div className="flex-1 h-px bg-gray-200" />
                  <span className="text-[11px] text-gray-400">or</span>
                  <div className="flex-1 h-px bg-gray-200" />
                </div>
                <button type="button" onClick={handleGuest} disabled={loading}
                  className="px-4 py-2.5 border border-gray-200 text-sm text-gray-600 font-medium rounded-lg hover:bg-gray-50 transition disabled:opacity-40 flex flex-col items-center gap-0.5">
                  <span>Try as Guest</span>
                  <span className="text-[10px] text-gray-400 font-normal">Chat only — limited tokens</span>
                </button>
              </>
            )}
          </form>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // APP — Router
    // ═══════════════════════════════════════════════════════════════════

    function App() {
      const [page, setPage] = useState('Chat');
      const [settings, setSettings] = useState(null);
      const [clusterStatus, setClusterStatus] = useState(null);
      const [showHelp, setShowHelp] = useState(false);
      const [authState, setAuthState] = useState(null); // null=loading, {adminMode, user}

      function refreshSettings() {
        fetch('/api/settings').then(r => r.json()).then(setSettings).catch(() => {});
      }

      // Check auth status on mount
      useEffect(() => {
        async function checkAuth() {
          try {
            const statusRes = await fetch('/api/auth/status');
            const { adminMode, guestMode } = await statusRes.json();
            if (!adminMode) {
              setAuthState({ adminMode: false, guestMode: false, user: null });
            } else {
              // Try to restore session
              const meRes = await fetch('/api/auth/me');
              if (meRes.ok) {
                const user = await meRes.json();
                setAuthState({ adminMode: true, guestMode, user });
              } else {
                setAuthState({ adminMode: true, guestMode, user: null });
              }
            }
          } catch (e) {
            setAuthState({ adminMode: false, user: null });
          }
        }
        checkAuth();
      }, []);

      useEffect(() => {
        if (authState && (authState.user || !authState.adminMode)) {
          refreshSettings();
          const fetchStatus = () => {
            fetch('/api/monitoring/status').then(r => r.json()).then(setClusterStatus).catch(() => {});
          };
          fetchStatus();
          const interval = setInterval(fetchStatus, 15000);
          return () => clearInterval(interval);
        }
      }, [authState]);

      async function handleLogout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        setAuthState({ adminMode: true, user: null });
        setPage('Chat');
      }

      function handleLogin(user) {
        setAuthState(prev => ({ ...prev, adminMode: true, user }));
      }

      // Refresh guest token count periodically
      useEffect(() => {
        if (authState?.user?.role !== 'guest') return;
        const refresh = () => {
          fetch('/api/auth/me').then(r => r.ok ? r.json() : null).then(user => {
            if (user) setAuthState(prev => ({ ...prev, user }));
          }).catch(() => {});
        };
        const interval = setInterval(refresh, 10000);
        return () => clearInterval(interval);
      }, [authState?.user?.role]);

      // Auth loading
      if (!authState) return (
        <div className="h-screen flex items-center justify-center bg-gray-50">
          <span className="text-sm text-gray-400">Loading...</span>
        </div>
      );

      // Login required
      if (authState.adminMode && !authState.user) return <LoginScreen onLogin={handleLogin} guestMode={authState.guestMode} />;

      const userRole = authState.user?.role || null;

      return (
        <div className="h-screen flex flex-col">
          <NavBar page={page} setPage={setPage} version={settings?.version} clusterStatus={clusterStatus}
            showHelp={showHelp} setShowHelp={setShowHelp}
            user={authState.user} onLogout={handleLogout} />
          {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
          {page === 'Chat' && <ChatPage clusterStatus={clusterStatus} settings={settings} userRole={userRole} />}
          {page === 'Dashboard' && <DashboardPage clusterStatus={clusterStatus} userRole={userRole} />}
          {page === 'Downloads' && (!userRole || userRole === 'admin') && <DownloadsPage />}
          {page === 'Settings' && (!userRole || userRole === 'admin') && <SettingsPage settings={settings} refreshSettings={refreshSettings} authState={authState} setAuthState={setAuthState} />}
        </div>
      );
    }

    // ─── Error Boundary ───────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      render() {
        if (this.state.error) {
          return (
            <div className="h-screen flex items-center justify-center bg-gray-50">
              <div className="text-center max-w-md">
                <h1 className="text-xl font-bold text-red-600 mb-2">Something went wrong</h1>
                <p className="text-sm text-gray-500 mb-4">{this.state.error.message}</p>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-exo rounded-lg text-sm font-semibold">Reload</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );
  </script>
</body>
</html>
