<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExoScopy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            exo: '#ffde00',
            'exo-dark': '#d4a800',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { background: #f9fafb; color: #111827; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', monospace; }
    .md-body p { margin: 0.4em 0; line-height: 1.6; }
    .md-body p:first-child { margin-top: 0; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body h1, .md-body h2, .md-body h3 { font-weight: 600; margin: 0.8em 0 0.3em; }
    .md-body h1 { font-size: 1.25em; }
    .md-body h2 { font-size: 1.1em; }
    .md-body h3 { font-size: 1em; color: #6366f1; }
    .md-body ul, .md-body ol { margin: 0.3em 0; padding-left: 1.5em; }
    .md-body ul { list-style-type: disc; }
    .md-body ol { list-style-type: decimal; }
    .md-body li { margin: 0.15em 0; }
    .md-body code { background: #1e1e2e; color: #a5b4fc; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.88em; font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', monospace; }
    .md-body pre { background: #1e1e2e; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.8em 1em; margin: 0.5em 0; overflow-x: auto; }
    .md-body pre code { background: none; padding: 0; color: #e2e8f0; display: block; line-height: 1.6; font-size: 0.85em; }
    .md-body blockquote { border-left: 3px solid #e5e7eb; padding-left: 0.8em; margin: 0.4em 0; color: #6b7280; }
    .md-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
    .md-body th, .md-body td { border: 1px solid #e5e7eb; padding: 0.3em 0.6em; font-size: 0.88em; }
    .md-body th { background: #f9fafb; font-weight: 600; }
    .md-body strong { font-weight: 600; color: #111827; }
    .md-body a { color: #6366f1; text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 0.8em 0; }
    .think-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .think-block summary { cursor: pointer; color: #9ca3af; font-style: italic; font-size: 0.85em; }
    .think-block .think-content { color: #6b7280; font-style: italic; font-size: 0.9em; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const socket = io();

    // ═══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════

    // Render markdown — same approach as Model Manager (simple, reliable)
    const renderMd = (text) => {
      if (!text) return '';
      let t = text.replace(/\\n/g, '\n');
      // Handle think blocks before markdown
      t = t.replace(/<think>([\s\S]*?)<\/think>/g, (_, content) => {
        return `<details class="think-block"><summary>Thinking... (click to expand)</summary><div class="think-content">${content}</div></details>`;
      });
      try {
        if (typeof marked !== 'undefined') {
          const fn = typeof marked.parse === 'function' ? marked.parse : marked;
          return fn(t, { breaks: true, gfm: true });
        }
      } catch (e) {}
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d`;
      return new Date(dateStr).toLocaleDateString('en', { month: 'short', day: 'numeric' });
    }

    // Extract code blocks from markdown text
    function extractCodeBlocks(text) {
      const blocks = [];
      const regex = /```(\w*)\n([\s\S]*?)```/g;
      const lines = text.split('\n');
      let match;
      while ((match = regex.exec(text)) !== null) {
        const lang = match[1] || 'txt';
        const code = match[2];
        // Try to detect filename from line before the code block
        const beforeIdx = text.substring(0, match.index).split('\n').length - 2;
        let filename = null;
        if (beforeIdx >= 0 && lines[beforeIdx]) {
          const line = lines[beforeIdx].trim();
          const fnMatch = line.match(/^(?:\*\*)?`?([a-zA-Z0-9_\-]+\.[a-zA-Z0-9]+)`?(?:\*\*)?$/);
          if (fnMatch) filename = fnMatch[1];
        }
        if (!filename) filename = `file-${blocks.length + 1}.${lang === 'javascript' ? 'js' : lang === 'python' ? 'py' : lang === 'typescript' ? 'ts' : lang || 'txt'}`;
        blocks.push({ filename, lang, code });
      }
      return blocks;
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function downloadAllAsZip(blocks) {
      const zip = new JSZip();
      const names = {};
      for (const b of blocks) {
        let name = b.filename;
        if (names[name]) { const ext = name.split('.').pop(); name = name.replace(`.${ext}`, `-${names[name]}.${ext}`); }
        names[b.filename] = (names[b.filename] || 0) + 1;
        zip.file(name, b.code);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'code-blocks.zip'; a.click();
      URL.revokeObjectURL(url);
    }

    function exportConversation(conv, messages, format = 'md') {
      if (format === 'md') {
        let md = `# ${conv.title || 'Conversation'}\n\n`;
        md += `Model: ${conv.model || '—'}\nDate: ${new Date(conv.createdAt).toLocaleString()}\n\n---\n\n`;
        for (const m of messages) {
          md += m.role === 'user' ? `**User:**\n${m.content}\n\n` : `**Assistant:**\n${m.content}\n\n---\n\n`;
        }
        downloadFile(`${conv.title || 'conversation'}.md`, md);
      } else {
        downloadFile(`${conv.title || 'conversation'}.json`, JSON.stringify({ ...conv, messages }, null, 2));
      }
    }

    // Clipboard copy that works on HTTP (not just HTTPS)
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        copyToClipboard(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    function formatGB(sizeKb) {
      if (!sizeKb) return '—';
      return `${(sizeKb / 1048576).toFixed(0)} GB`;
    }

    // ═══════════════════════════════════════════════════════════════════
    // NAV BAR
    // ═══════════════════════════════════════════════════════════════════

    function NavBar({ page, setPage, version, clusterStatus }) {
      const pages = ['Chat', 'Dashboard', 'Models', 'Downloads', 'Settings'];
      const onlineCount = clusterStatus?.nodes?.filter(n => n.online)?.length || 0;
      const totalCount = clusterStatus?.nodes?.length || 0;

      return (
        <div className="flex items-center justify-between px-6 h-[52px] bg-white border-b border-gray-200 flex-shrink-0">
          <div className="flex items-center gap-3">
            <span className="text-[17px] font-bold text-gray-900 tracking-tight">ExoScopy</span>
            {version && <span className="text-[11px] text-gray-400 font-medium">v{version}</span>}
          </div>
          <div className="flex items-center gap-1">
            {pages.map(p => (
              <button key={p} onClick={() => setPage(p)}
                className={`px-3.5 py-1.5 text-[13px] rounded-md transition-colors ${
                  page === p ? 'font-semibold text-indigo-500 bg-indigo-50' : 'font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}>
                {p}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-4">
            {totalCount > 0 && (
              <div className="flex items-center gap-1.5">
                <div className={`w-[7px] h-[7px] rounded-full ${onlineCount === totalCount ? 'bg-emerald-500' : onlineCount > 0 ? 'bg-yellow-500' : 'bg-red-500'}`} />
                <span className="text-xs text-gray-500 font-medium">{onlineCount}/{totalCount} online</span>
              </div>
            )}
            <a href={clusterStatus?.dashboardURL || '#'} target="_blank" rel="noopener"
              className="flex items-center gap-1.5 px-2.5 py-1 border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
              <span className="text-[11px]">↗</span>
              <span className="text-xs text-gray-500">exo Dashboard</span>
            </a>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // CHAT PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ChatPage({ clusterStatus }) {
      const [conversations, setConversations] = useState([]);
      const [activeConvId, setActiveConvId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [streaming, setStreaming] = useState(false);
      const [activeModel, setActiveModel] = useState(null);
      const [models, setModels] = useState([]);
      const [selectedModel, setSelectedModel] = useState('');
      const [preset, setPreset] = useState('normal');
      const [showSettings, setShowSettings] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [params, setParams] = useState({ temperature: 0.7, maxTokens: 32768, thinking: false, reasoningEffort: 'medium', topP: null, topK: null, minP: null, repPenalty: null, seed: null });
      const [systemPrompt, setSystemPrompt] = useState('');
      const [systemPromptEnabled, setSystemPromptEnabled] = useState(false);
      const [savedPrompts, setSavedPrompts] = useState([]);
      const [selectedPromptIdx, setSelectedPromptIdx] = useState(-1);
      const statsMapRef = useRef({}); // convId-msgIdx → stats
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);
      const abortRef = useRef(null);

      const PRESETS = {
        creative: { temperature: 1.2, topP: 0.95, topK: null, minP: null, maxTokens: 32768, thinking: false },
        normal: { temperature: 0.7, topP: null, topK: null, minP: null, maxTokens: 32768, thinking: false },
        code: { temperature: 0.2, topP: 0.9, topK: 50, minP: 0.05, maxTokens: 65536, thinking: false },
      };

      // Load conversations + models + active model
      useEffect(() => {
        fetch('/api/conversations').then(r => r.json()).then(setConversations).catch(() => {});
        fetch('/api/chat/models?engine=exo1').then(r => r.json()).then(d => setModels(d.models || [])).catch(() => {});
        fetch('/api/chat/active-model?engine=exo1').then(r => r.json()).then(d => {
          if (d.activeModel) { setActiveModel(d.activeModel); setSelectedModel(d.activeModel); }
        }).catch(() => {});
      }, []);

      // Load conversation messages when active changes
      useEffect(() => {
        if (!activeConvId) { setMessages([]); return; }
        fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d => {
          setMessages(d.messages || []);
        }).catch(() => {});
      }, [activeConvId]);

      // Auto-scroll
      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      // Apply preset
      function applyPreset(name) {
        setPreset(name);
        const p = PRESETS[name];
        setParams(prev => ({ ...prev, temperature: p.temperature, topP: p.topP, topK: p.topK, minP: p.minP, maxTokens: p.maxTokens, thinking: p.thinking }));
      }

      // Create new conversation
      async function newConversation() {
        const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ engine: 'exo1', model: selectedModel }) }).then(r => r.json());
        setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        setActiveConvId(conv.id);
        setMessages([]);
      }

      // Delete conversation
      async function deleteConversation(id) {
        await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
        setConversations(prev => prev.filter(c => c.id !== id));
        if (activeConvId === id) { setActiveConvId(null); setMessages([]); }
      }

      // Send message
      async function handleSend() {
        if ((!input.trim()) || streaming) return;
        const userMsg = input.trim();
        setInput('');

        let convId = activeConvId;
        if (!convId) {
          const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ engine: 'exo1', model: selectedModel }) }).then(r => r.json());
          convId = conv.id;
          setActiveConvId(convId);
          setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        }

        const userMessage = { role: 'user', content: userMsg, timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, userMessage]);

        const allMessages = [...messages, userMessage];
        const apiMessages = [];
        if (systemPromptEnabled && systemPrompt) {
          apiMessages.push({ role: 'system', content: systemPrompt });
        }
        apiMessages.push(...allMessages.map(m => ({ role: m.role, content: m.content })));

        setStreaming(true);
        const assistantMsg = { role: 'assistant', content: '', timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, assistantMsg]);
        const streamStartTime = Date.now();
        let firstTokenTime = null;
        let tokenCount = 0;
        let chunkCount = 0;
        let promptTokens = 0;
        let completionTokens = 0;

        try {
          const body = {
            engine: 'exo1', model: selectedModel || undefined, messages: apiMessages, stream: true,
            conversationId: convId,
            temperature: params.temperature, max_tokens: params.maxTokens,
          };
          if (params.thinking) { body.thinking = true; body.enable_thinking = true; }
          else { body.enable_thinking = false; }
          if (params.thinking && params.reasoningEffort) body.reasoning_effort = params.reasoningEffort;
          if (params.topP != null) body.top_p = params.topP;
          if (params.topK != null) body.top_k = params.topK;
          if (params.minP != null) body.min_p = params.minP;
          if (params.repPenalty != null) { body.repetition_penalty = params.repPenalty; body.repetition_context_size = 256; }
          if (params.seed != null) body.seed = params.seed;

          const controller = new AbortController();
          abortRef.current = controller;
          const res = await fetch('/api/chat/completions', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body), signal: controller.signal,
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let accumulated = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            for (const line of chunk.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices?.[0]?.delta?.content;
                if (delta) {
                  if (!firstTokenTime) firstTokenTime = Date.now();
                  accumulated += delta;
                  tokenCount += delta.length > 0 ? 1 : 0; // approximate: 1 token per SSE delta
                  chunkCount++;
                  // Check for usage stats in the chunk
                  if (parsed.usage) {
                    if (parsed.usage.completion_tokens) completionTokens = parsed.usage.completion_tokens;
                    if (parsed.usage.prompt_tokens) promptTokens = parsed.usage.prompt_tokens;
                  }
                  setMessages(prev => {
                    const updated = [...prev];
                    updated[updated.length - 1] = { ...updated[updated.length - 1], content: accumulated };
                    return updated;
                  });
                }
              } catch (e) {}
            }
          }
        } catch (e) {
          if (e.name !== 'AbortError') {
            setMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { ...updated[updated.length - 1], content: `Error: ${e.message}` };
              return updated;
            });
          }
        }
        // Calculate final stats and store by convId + message index
        const totalTime = (Date.now() - streamStartTime) / 1000;
        const ttft = firstTokenTime ? (firstTokenTime - streamStartTime) / 1000 : null;
        const genTime = firstTokenTime ? (Date.now() - firstTokenTime) / 1000 : totalTime;
        const speed = genTime > 0 && chunkCount > 0 ? (chunkCount / genTime) : 0;
        const chunkRate = genTime > 0 ? (chunkCount / genTime) : 0;
        const stats = { ttft, speed, totalTime, genTime, promptTokens, completionTokens: completionTokens || chunkCount, chunks: chunkCount, chunkRate };
        setMessages(prev => {
          const msgIdx = prev.length - 1;
          if (convId) statsMapRef.current[`${convId}-${msgIdx}`] = stats;
          return prev;
        });
        setStreaming(false);
        abortRef.current = null;
        // Refresh conversation list (but don't reload current messages — keep stats)
        fetch('/api/conversations').then(r => r.json()).then(list => {
          setConversations(list);
        }).catch(() => {});
      }

      function stopStreaming() {
        if (abortRef.current) abortRef.current.abort();
        setStreaming(false);
      }

      const filteredConvs = conversations.filter(c => !searchQuery || c.title?.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="flex flex-1 overflow-hidden">
          {/* Sidebar */}
          <div className="w-[240px] bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div className="p-4 pb-3 flex flex-col gap-2.5">
              <div className="flex items-center gap-2 px-2.5 py-[7px] bg-gray-100 rounded-lg">
                <span className="text-[13px] text-gray-400">🔍</span>
                <input type="text" placeholder="Search..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  className="bg-transparent text-[13px] text-gray-900 outline-none flex-1 placeholder-gray-400" />
              </div>
              <button onClick={newConversation} className="flex items-center justify-center gap-1.5 py-2 bg-exo rounded-lg text-[13px] font-semibold text-gray-900 hover:brightness-95 transition">
                + New chat
              </button>
            </div>
            <div className="flex-1 flex flex-col px-2 gap-0.5 overflow-y-auto">
              {filteredConvs.map(c => (
                <button key={c.id} onClick={() => setActiveConvId(c.id)}
                  className={`text-left px-3 py-2.5 rounded-lg flex flex-col gap-1 group transition-colors ${
                    activeConvId === c.id ? 'bg-gray-100 border-l-[3px] border-exo' : 'hover:bg-gray-50'
                  }`}>
                  <div className="flex justify-between items-center">
                    <span className={`text-[13px] truncate max-w-[150px] ${activeConvId === c.id ? 'font-semibold text-gray-900' : 'font-medium text-gray-700'}`}>
                      {c.pinned && <span className="text-[10px] text-gray-400 mr-1">📌</span>}
                      {c.title || 'New conversation'}
                    </span>
                    <span className="text-[11px] text-gray-400">{timeAgo(c.updatedAt)}</span>
                  </div>
                  {c.lastMessage && <span className="text-[12px] text-gray-400 truncate">{c.lastMessage}</span>}
                  <div className="hidden group-hover:flex justify-between items-center mt-0.5">
                    <div className="flex gap-2">
                      <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'md')); }}
                        className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ MD</button>
                      <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'json')); }}
                        className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ JSON</button>
                    </div>
                    <button onClick={e => { e.stopPropagation(); deleteConversation(c.id); }}
                      className="text-[10px] text-red-400 hover:text-red-600">Delete</button>
                  </div>
                </button>
              ))}
              {filteredConvs.length === 0 && (
                <div className="text-center py-8 text-gray-400 text-sm">No conversations yet</div>
              )}
            </div>
          </div>

          {/* Chat area */}
          <div className="flex-1 flex flex-col bg-[#f9fafb]">
            {/* Chat header */}
            <div className="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 flex-shrink-0">
              <div className="flex items-center gap-3">
                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
                  className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-900 outline-none">
                  {models.map(m => (
                    <option key={m.id} value={m.id}>{m.id === activeModel ? '⚡ ' : ''}{m.id}</option>
                  ))}
                  {models.length === 0 && <option value="">No models available</option>}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                  {['creative', 'normal', 'code'].map(p => (
                    <button key={p} onClick={() => applyPreset(p)}
                      className={`px-3 py-1 text-xs font-medium capitalize transition-colors ${
                        preset === p ? 'bg-exo text-gray-900 font-semibold' : 'text-gray-500 hover:bg-gray-50'
                      }`}>{p === 'creative' ? 'Creative' : p === 'normal' ? 'Normal' : 'Code'}</button>
                  ))}
                </div>
                <button onClick={() => setShowSettings(!showSettings)}
                  className={`px-2.5 py-1 border rounded-lg text-xs font-medium transition-colors ${showSettings ? 'border-exo bg-exo/10 text-gray-900' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}>
                  ⚙ Inference Settings
                </button>
              </div>
            </div>

            {/* Inference Settings Panel */}
            {showSettings && (
              <div className="bg-white border-b border-gray-200 px-6 py-5">
                <div className="flex justify-between items-center mb-4">
                  <span className="text-[15px] font-bold text-gray-900">Inference Settings</span>
                  <button onClick={() => setShowSettings(false)} className="text-gray-400 text-lg hover:text-gray-600">×</button>
                </div>
                <div className="flex gap-6 mb-4">
                  {/* Col 1: Generation */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Generation</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Temperature</span><span className="mono text-xs text-gray-900 font-medium">{params.temperature.toFixed(2)}</span></div>
                      <input type="range" min="0" max="2" step="0.05" value={params.temperature} onChange={e => setParams(p => ({ ...p, temperature: parseFloat(e.target.value) }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Max tokens</span>
                      <input type="number" value={params.maxTokens} onChange={e => setParams(p => ({ ...p, maxTokens: parseInt(e.target.value) || 32768 }))} className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white" />
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-xs text-gray-700 font-medium">Thinking</span>
                      <button onClick={() => setParams(p => ({ ...p, thinking: !p.thinking }))} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${params.thinking ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                    {params.thinking && (
                      <div className="flex flex-col gap-1.5">
                        <span className="text-xs text-gray-700 font-medium">Reasoning effort</span>
                        <select value={params.reasoningEffort} onChange={e => setParams(p => ({ ...p, reasoningEffort: e.target.value }))} className="text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white">
                          {['none','minimal','low','medium','high','xhigh'].map(v => <option key={v} value={v}>{v}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 2: Sampling */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Sampling</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Top P</span><span className="mono text-xs text-gray-400">{params.topP ?? '—'}</span></div>
                      <input type="range" min="0" max="1" step="0.05" value={params.topP ?? 0} onChange={e => setParams(p => ({ ...p, topP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Top K</span>
                      <input type="number" value={params.topK ?? ''} onChange={e => setParams(p => ({ ...p, topK: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Min P</span><span className="mono text-xs text-gray-400">{params.minP ?? '—'}</span></div>
                      <input type="range" min="0" max="0.5" step="0.01" value={params.minP ?? 0} onChange={e => setParams(p => ({ ...p, minP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 3: Penalties & Seed */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Penalties & Seed</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Rep. penalty</span><span className="mono text-xs text-gray-400">{params.repPenalty ?? '—'}</span></div>
                      <input type="range" min="1" max="2" step="0.05" value={params.repPenalty ?? 1} onChange={e => setParams(p => ({ ...p, repPenalty: parseFloat(e.target.value) > 1 ? parseFloat(e.target.value) : null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Seed</span>
                      <input type="number" value={params.seed ?? ''} onChange={e => setParams(p => ({ ...p, seed: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                  </div>
                </div>
                {/* System prompt */}
                <div className="border-t border-gray-100 pt-4">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">System Prompt</span>
                    <button onClick={() => setSystemPromptEnabled(!systemPromptEnabled)} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${systemPromptEnabled ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                      <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                    </button>
                  </div>
                  <div className="flex gap-2 items-start">
                    <select value={selectedPromptIdx} onChange={e => {
                      const idx = parseInt(e.target.value);
                      setSelectedPromptIdx(idx);
                      if (idx >= 0 && savedPrompts[idx]) setSystemPrompt(savedPrompts[idx].content);
                    }} className="text-xs px-2.5 py-2 border border-gray-200 rounded-lg bg-white flex-shrink-0">
                      <option value={-1}>Custom</option>
                      {savedPrompts.map((p, i) => <option key={i} value={i}>{p.name}</option>)}
                    </select>
                    <textarea value={systemPrompt} onChange={e => { setSystemPrompt(e.target.value); setSelectedPromptIdx(-1); }}
                      placeholder="You are a helpful assistant..."
                      className="flex-1 text-xs px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 resize-none h-[120px] overflow-y-auto" />
                    <button onClick={() => {
                      if (!systemPrompt.trim()) return;
                      const name = prompt('Prompt name:');
                      if (name) setSavedPrompts(prev => [...prev, { name, content: systemPrompt }]);
                    }} className="px-3 py-2 bg-exo rounded-lg text-xs font-semibold text-gray-900 flex-shrink-0 hover:brightness-95">Save</button>
                  </div>
                </div>
              </div>
            )}

            {/* Messages */}
            <div className="flex-1 overflow-y-auto">
              <div className="max-w-[720px] mx-auto flex flex-col gap-5 py-6 px-4">
                {messages.length === 0 && !activeConvId && (
                  <div className="flex flex-col items-center justify-center py-20 gap-4">
                    <h2 className="text-2xl font-bold text-gray-900">ExoScopy</h2>
                    <p className="text-gray-400 text-sm">Select a model to get started.</p>
                  </div>
                )}
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    {msg.role === 'user' ? (
                      <div className="max-w-[520px] px-4 py-3 bg-gray-100 rounded-2xl rounded-br-sm">
                        <p className="text-sm text-gray-900 whitespace-pre-wrap">{msg.content}</p>
                      </div>
                    ) : (
                      <div className="max-w-[600px] flex flex-col gap-2">
                        <div className="px-4 py-3 bg-white border border-gray-200 rounded-2xl rounded-tl-sm group/msg relative">
                          <div className="md-body text-sm text-gray-900" dangerouslySetInnerHTML={{ __html: renderMd(msg.content) }} />
                          {!streaming && msg.content && (
                            <div className="flex absolute top-2 right-2 gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
                              <button onClick={() => { copyToClipboard(msg.content); }}
                                className="px-2 py-1 text-[10px] text-gray-500 bg-white/90 border border-gray-200 rounded-md hover:bg-gray-100 hover:text-gray-700 backdrop-blur-sm">📋 Copy</button>
                              <button onClick={() => downloadFile(`response-${i}.md`, msg.content)}
                                className="px-2 py-1 text-[10px] text-gray-500 bg-white/90 border border-gray-200 rounded-md hover:bg-gray-100 hover:text-gray-700 backdrop-blur-sm">↓ Save</button>
                            </div>
                          )}
                        </div>
                        {/* Code block save buttons */}
                        {!streaming && msg.content && (() => {
                          const blocks = extractCodeBlocks(msg.content);
                          if (blocks.length === 0) return null;
                          return (
                            <div className="flex flex-wrap items-center gap-2">
                              {blocks.map((b, j) => (
                                <button key={j} onClick={() => downloadFile(b.filename, b.code)}
                                  className="flex items-center gap-1 px-2 py-1 text-[11px] text-gray-500 bg-gray-50 border border-gray-200 rounded-md hover:bg-gray-100">
                                  💾 {b.filename}
                                </button>
                              ))}
                              {blocks.length > 1 && (
                                <button onClick={() => downloadAllAsZip(blocks)}
                                  className="flex items-center gap-1 px-2 py-1 text-[11px] text-indigo-500 bg-indigo-50 border border-indigo-200 rounded-md hover:bg-indigo-100">
                                  📦 Save all (.zip)
                                </button>
                              )}
                            </div>
                          );
                        })()}
                        {/* Stats */}
                        {(() => {
                          const s = activeConvId && statsMapRef.current[`${activeConvId}-${i}`];
                          if (!s) return null;
                          const statsText = `Total: ${s.totalTime?.toFixed(2)}s | TTFT: ${s.ttft?.toFixed(3)}s | Gen: ${s.genTime?.toFixed(2)}s | Speed: ${s.speed?.toFixed(1)} tk/s | Prompt: ${s.promptTokens || '—'} tk | Completion: ${s.completionTokens} tk | Chunks: ${s.chunks} | Chunk rate: ${s.chunkRate?.toFixed(1)}/s`;
                          return (
                            <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 mono text-[11px]">
                              <div className="flex justify-between items-center mb-2">
                                <span className="text-gray-500 font-semibold text-[10px] uppercase tracking-wider">Stats</span>
                                <button onClick={() => copyToClipboard(statsText)}
                                  className="text-[10px] text-gray-400 hover:text-gray-600 border border-gray-200 px-1.5 py-0.5 rounded">Copy</button>
                              </div>
                              <div className="grid grid-cols-4 gap-x-4 gap-y-1.5">
                                <div className="flex flex-col"><span className="text-gray-400">Total</span><span className="text-gray-700 font-medium">{s.totalTime?.toFixed(2)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">TTFT</span><span className="text-amber-500 font-medium">{s.ttft?.toFixed(3)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Generation</span><span className="text-gray-700 font-medium">{s.genTime?.toFixed(2)}s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Speed</span><span className="text-emerald-500 font-medium">{s.speed?.toFixed(1)} tk/s</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Prompt</span><span className="text-gray-700 font-medium">{s.promptTokens || '—'} tk</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Completion</span><span className="text-indigo-400 font-medium">{s.completionTokens} tk</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Chunks</span><span className="text-gray-700 font-medium">{s.chunks}</span></div>
                                <div className="flex flex-col"><span className="text-gray-400">Chunk rate</span><span className="text-gray-700 font-medium">{s.chunkRate?.toFixed(1)}/s</span></div>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                ))}
                {streaming && (
                  <div className="flex justify-start">
                    <div className="px-3 py-2 text-gray-400 text-sm animate-pulse">●●●</div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
            </div>

            {/* Input bar */}
            <div className="px-6 py-4 bg-white border-t border-gray-200 flex-shrink-0">
              <div className="max-w-[720px] mx-auto flex items-end gap-2.5 px-3.5 py-2.5 border border-gray-300 rounded-xl bg-white focus-within:border-exo transition-colors">
                <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                  placeholder="Type your message..." rows={1}
                  style={{ minHeight: '24px' }}
                  className="flex-1 text-sm text-gray-900 outline-none resize-none max-h-[150px] placeholder-gray-400 bg-transparent" />
                {streaming ? (
                  <button onClick={stopStreaming} className="px-4 py-1.5 bg-red-500 text-white text-[13px] font-semibold rounded-lg hover:bg-red-600 transition-colors">Stop</button>
                ) : (
                  <button onClick={handleSend} disabled={!input.trim()} className="px-4 py-1.5 bg-exo text-gray-900 text-[13px] font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40 disabled:cursor-not-allowed">Send</button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════════════════

    function DashboardPage({ clusterStatus }) {
      const [downloads, setDownloads] = useState([]);
      const [nodeMetrics, setNodeMetrics] = useState([]);
      const [ramData, setRamData] = useState([]);

      useEffect(() => {
        fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {});
        fetch('/api/monitoring/exo-node-metrics').then(r => r.json()).then(d => setNodeMetrics(d.nodes || [])).catch(() => {});
        fetch('/api/monitoring/ram').then(r => r.json()).then(setRamData).catch(() => {});
        const interval = setInterval(() => {
          fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {});
          fetch('/api/monitoring/exo-node-metrics').then(r => r.json()).then(d => setNodeMetrics(d.nodes || [])).catch(() => {});
          fetch('/api/monitoring/ram').then(r => r.json()).then(setRamData).catch(() => {});
        }, 10000);
        return () => clearInterval(interval);
      }, []);

      // Listen to Socket.IO events
      useEffect(() => {
        const onProgress = () => fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {});
        socket.on('download:progress', onProgress);
        socket.on('download:complete', onProgress);
        return () => { socket.off('download:progress', onProgress); socket.off('download:complete', onProgress); };
      }, []);

      const activeDownloads = downloads.filter(d => d.status === 'downloading');
      const queued = downloads.filter(d => d.status === 'queued');
      const history = downloads.filter(d => ['done', 'stopped', 'error'].includes(d.status));
      const nodes = clusterStatus?.nodes || [];
      const instances = clusterStatus?.instances || [];
      const activeModelName = instances[0]?.model || null;

      function parseProgress(prog) {
        if (!prog) return { gb: 0, total: 0, pct: 0, speed: 0 };
        const parts = prog.split(':');
        const gb = parseFloat(parts[0]) || 0;
        const total = parseFloat(parts[1]) || 0;
        const speed = parseFloat(parts[3]) || 0;
        const pct = total > 0 ? Math.round(gb / total * 100) : 0;
        return { gb, total, pct, speed };
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          {/* Page header with active model */}
          <div className="flex justify-between items-center px-10 pt-5 pb-4">
            <span className="text-[22px] font-bold text-gray-900">Dashboard</span>
            {activeModelName && (
              <div className="flex items-center gap-2 px-3.5 py-1.5 bg-amber-50 border border-amber-200 rounded-lg">
                <span className="text-[11px]">⚡</span>
                <span className="mono text-xs font-semibold text-amber-800">{activeModelName}</span>
                <span className="text-[11px] text-amber-700">· {instances[0]?.shardCount || '?'} nodes</span>
              </div>
            )}
          </div>

          <div className="flex-1 flex gap-6 px-10 pb-6">
            {/* Left: Activity */}
            <div className="flex-1 flex flex-col gap-4">
              {/* Downloading */}
              {activeDownloads.length > 0 && (
                <div className="flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Downloading</span>
                  {activeDownloads.map(dl => {
                    const p = parseProgress(dl.progress);
                    return (
                      <div key={dl.id} className="bg-white border border-gray-200 rounded-xl p-4 flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                          <div className="flex flex-col gap-0.5">
                            <span className="text-[13px] font-semibold text-gray-900">{dl.modelId}</span>
                          </div>
                          <div className="flex items-center gap-2.5">
                            <span className="mono text-[11px] text-gray-500">{p.gb} / {p.total} GB</span>
                            <span className="mono text-[11px] font-semibold text-gray-900">{p.pct}%</span>
                            <span className="mono text-[11px] text-emerald-500">{p.speed} MB/s</span>
                            <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })}
                              className="px-2.5 py-0.5 border border-red-200 rounded text-[11px] text-red-600 hover:bg-red-50">Stop</button>
                          </div>
                        </div>
                        <div className="h-[5px] bg-gray-100 rounded-full">
                          <div className="h-full bg-exo rounded-full transition-all" style={{ width: `${p.pct}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Queued */}
              {queued.length > 0 && (
                <div className="flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Queued</span>
                  {queued.map((dl, i) => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-4 py-3 flex justify-between items-center">
                      <div className="flex items-center gap-2.5">
                        <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">#{i + 1}</span>
                        <span className="text-xs font-medium text-gray-900">{dl.modelId}</span>
                      </div>
                      <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })}
                        className="text-[11px] text-red-600 hover:underline">Cancel</button>
                    </div>
                  ))}
                </div>
              )}

              {/* History */}
              {history.length > 0 && (
                <div className="flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">History</span>
                  {history.slice(0, 10).map(dl => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-4 py-3 flex justify-between items-center">
                      <div className="flex items-center gap-2.5">
                        <span className={`text-sm ${dl.status === 'done' ? 'text-emerald-500' : dl.status === 'stopped' ? 'text-yellow-500' : 'text-red-500'}`}>
                          {dl.status === 'done' ? '✓' : dl.status === 'stopped' ? '⚠' : '✕'}
                        </span>
                        <span className="text-xs text-gray-700">{dl.modelId}</span>
                        <span className="mono text-[10px] text-gray-400">{dl.status}</span>
                      </div>
                      <div className="flex items-center gap-3">
                        {(dl.status === 'stopped' || dl.status === 'error') && (
                          <button onClick={() => fetch(`/api/download/restart/${dl.id}`, { method: 'POST' })}
                            className="text-[11px] text-indigo-500 hover:underline">Restart</button>
                        )}
                        <button onClick={() => fetch(`/api/download/${dl.id}`, { method: 'DELETE' })}
                          className="text-[11px] text-gray-400 hover:text-gray-600">🗑</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {activeDownloads.length === 0 && queued.length === 0 && history.length === 0 && (
                <div className="flex-1 flex items-center justify-center text-gray-400 text-sm">No activity</div>
              )}
            </div>

            {/* Right: Cluster Nodes */}
            <div className="w-[320px] flex flex-col gap-2 flex-shrink-0">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Cluster Nodes</span>
              {nodes.map(node => {
                const metrics = nodeMetrics.find(m => m.name === node.name);
                const ram = ramData.find(r => r.name === node.name);
                return (
                  <div key={node.name} className={`bg-white border rounded-xl p-3.5 flex flex-col gap-2 ${node.online ? 'border-gray-200' : 'border-red-200 opacity-60'}`}>
                    <div className="flex justify-between items-center">
                      <div className="flex items-center gap-1.5">
                        <div className={`w-[7px] h-[7px] rounded-full ${node.online ? (node.processRunning ? 'bg-emerald-500' : 'bg-yellow-500') : 'bg-red-500'}`} />
                        <span className="text-[13px] font-semibold text-gray-900">{node.name}</span>
                      </div>
                      <span className="mono text-[10px] text-gray-400">{node.ip}</span>
                    </div>
                    {node.online ? (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex justify-between">
                            <span className="text-[11px] text-gray-500">RAM</span>
                            <span className="mono text-[11px] text-gray-500">{ram ? `${ram.used} / ${ram.total} GB (${ram.percent}%)` : '—'}</span>
                          </div>
                          <div className="h-[3px] bg-gray-100 rounded-full">
                            <div className="h-full bg-emerald-500 rounded-full" style={{ width: `${ram?.percent || 0}%`, minWidth: '4px' }} />
                          </div>
                        </div>
                        <div className="flex gap-4">
                          <span className="mono text-[10px] text-gray-400">GPU {metrics?.gpuPct ?? '—'}%</span>
                          <span className="mono text-[10px] text-gray-400">{metrics?.tempC ?? '—'}°C</span>
                          <span className="mono text-[10px] text-gray-400">{metrics?.watts ?? '—'}W</span>
                        </div>
                      </>
                    ) : (
                      <span className="text-[11px] text-red-500">Offline</span>
                    )}
                  </div>
                );
              })}
              {nodes.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">No nodes configured</div>}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODELS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ModelsPage({ clusterStatus }) {
      const [matrixData, setMatrixData] = useState({ nodes: [], models: [], matrix: {}, activeModel: null, diskInfo: {} });
      const [loadModel, setLoadModel] = useState('');
      const [sharding, setSharding] = useState('Pipeline');
      const [loadStatus, setLoadStatus] = useState(null);
      const [showImport, setShowImport] = useState(false);
      const [importForm, setImportForm] = useState({ sourceIp: '', sourceUser: '', sourcePath: '', targetNode: '' });
      const [activeSyncs, setActiveSyncs] = useState([]);

      useEffect(() => {
        fetch('/api/models/matrix').then(r => r.json()).then(d => {
          setMatrixData(d);
          if (d.activeModel) {
            setLoadModel(d.activeModel);
            setLoadStatus({ status: 'running', model: d.activeModel });
          }
        }).catch(() => {});
        fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
        // Listen for sync progress
        const onSyncProgress = () => fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
        socket.on('sync:progress', onSyncProgress);
        socket.on('sync:complete', () => {
          onSyncProgress();
          // Refresh matrix after sync complete
          setTimeout(() => fetch('/api/models/matrix').then(r => r.json()).then(setMatrixData).catch(() => {}), 2000);
        });
        return () => { socket.off('sync:progress', onSyncProgress); socket.off('sync:complete'); };
      }, []);

      const { nodes: nodeNames, models, matrix, activeModel, diskInfo } = matrixData;

      async function handleLoad() {
        if (!loadModel) return;
        setLoadStatus({ status: 'loading', model: loadModel });
        try {
          const onlineCount = clusterStatus?.nodes?.filter(n => n.online)?.length || 1;
          const res = await fetch('/api/monitoring/load', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId: loadModel, sharding, minNodes: onlineCount }),
          });
          const data = await res.json();
          if (res.ok) {
            setLoadStatus({ status: 'running', model: loadModel });
          } else {
            setLoadStatus({ status: 'failed', model: loadModel, error: data.error });
          }
        } catch (e) {
          setLoadStatus({ status: 'failed', model: loadModel, error: e.message });
        }
      }

      async function handleUnload() {
        try {
          await fetch('/api/monitoring/purge', { method: 'POST' });
          setLoadStatus(null);
        } catch (e) {}
      }

      function modelOnNode(modelId, nodeName) {
        const nodeList = matrix[nodeName] || [];
        return nodeList.find(m => m.id === modelId);
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-4">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Models</span>
              <span className="text-[13px] text-gray-400">{models.length} models across {nodeNames.length} nodes</span>
            </div>
            <div className="flex gap-2">
              <button onClick={() => {/* TODO */}}
                className="px-4 py-2 bg-exo rounded-lg text-[13px] font-semibold text-gray-900 hover:brightness-95">+ Download</button>
              <button onClick={() => setShowImport(true)} className="px-4 py-2 border border-gray-200 rounded-lg text-[13px] font-medium text-gray-500 hover:bg-gray-50">+ Add custom model</button>
            </div>
          </div>

          {/* Model matrix table */}
          {models.length > 0 && (
          <div className="px-10 pb-4">
            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
              {/* Header */}
              <div className="flex px-5 py-3 bg-gray-50 border-b border-gray-200">
                <div className="flex-[2.5]"><span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Model</span></div>
                {nodeNames.map(name => (
                  <div key={name} className="flex-1 text-center flex flex-col items-center gap-0.5">
                    <span className="text-xs font-semibold text-gray-700">{name}</span>
                    {diskInfo[name] && <span className="mono text-[10px] text-gray-400">{diskInfo[name].freeGB} GB free</span>}
                  </div>
                ))}
                <div className="w-[70px]" />
              </div>
              {/* Rows */}
              {models.map(model => {
                const isActive = activeModel === model.id;
                const presentOn = nodeNames.filter(n => modelOnNode(model.id, n));
                const missingOn = nodeNames.filter(n => !modelOnNode(model.id, n));
                return (
                  <div key={model.id} className={`flex px-5 py-3.5 border-b border-gray-100 items-center ${isActive ? 'bg-amber-50' : 'hover:bg-gray-50'}`}>
                    <div className="flex-[2.5] flex flex-col gap-0.5">
                      <div className="flex items-center gap-1.5">
                        {isActive && <span className="text-[11px]">⚡</span>}
                        <span className={`text-[13px] font-medium text-gray-900 ${isActive ? 'font-semibold' : ''}`}>{model.id.split('/').pop()}</span>
                      </div>
                      <span className="mono text-[11px] text-gray-400">{model.id.split('/')[0]} · {model.sizeGB} GB</span>
                    </div>
                    {nodeNames.map(name => {
                      const m = modelOnNode(model.id, name);
                      return (
                        <div key={name} className="flex-1 text-center">
                          {m ? (
                            <span className="text-emerald-500 text-sm">✓ <span className="mono text-[11px] text-gray-500">{m.sizeGB} GB</span></span>
                          ) : (
                            <span className="mono text-[11px] text-gray-300">—</span>
                          )}
                        </div>
                      );
                    })}
                    <div className="w-[70px] text-right">
                      {missingOn.length > 0 && missingOn.length < nodeNames.length && (
                        <button onClick={async () => {
                          const sourceNode = presentOn[0];
                          await fetch('/api/models/sync', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ modelId: model.id, sourceNode, targetNodes: missingOn }),
                          });
                        }} className="text-[11px] text-indigo-500 font-medium hover:underline">Sync</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          )}

          {/* Active syncs */}
          {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').length > 0 && (
            <div className="px-10 pb-4 flex flex-col gap-2">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Syncing</span>
              {activeSyncs.filter(s => s.status === 'syncing' || s.status === 'importing').map(s => (
                <div key={s.id} className="bg-white border border-indigo-200 rounded-xl p-4 flex flex-col gap-2">
                  <div className="flex justify-between items-center">
                    <div className="flex items-center gap-2">
                      <div className="px-1.5 py-0.5 bg-indigo-50 rounded text-[10px] font-semibold text-indigo-500">RSYNC</div>
                      <span className="text-[13px] font-medium text-gray-900">{s.modelId}</span>
                    </div>
                    <span className="mono text-[11px] text-gray-400">{s.sourceNode} → {(s.targetNodes || []).join(', ')}</span>
                  </div>
                  {s.progress && Object.entries(s.progress).map(([node, p]) => (
                    <div key={node} className="flex items-center gap-3">
                      <span className="text-[11px] text-gray-500 w-16">{node}</span>
                      <div className="flex-1 h-1.5 bg-gray-100 rounded-full">
                        <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${p.percent || 0}%` }} />
                      </div>
                      <span className={`mono text-[11px] ${p.status === 'done' ? 'text-emerald-500' : p.status === 'error' ? 'text-red-500' : 'text-indigo-500'}`}>
                        {p.status === 'done' ? '✓' : p.status === 'error' ? '✗ ' + (p.error || '') : `${p.percent || 0}%`}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {/* Load Model section */}
          <div className="px-10 pb-6">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-4">
              <div className="flex justify-between items-center">
                <span className="text-lg font-bold text-gray-900">Load Model</span>
                <span className="text-xs text-gray-400">v1: single instance</span>
              </div>
              <div className="flex gap-4 items-end">
                <div className="flex-1 flex flex-col gap-1.5">
                  <span className="text-xs text-gray-500 font-medium">Model</span>
                  <input type="text" value={loadModel} onChange={e => setLoadModel(e.target.value)}
                    placeholder="mlx-community/ModelName"
                    className="mono text-xs px-3 py-2.5 border border-gray-200 rounded-lg bg-white" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <span className="text-xs text-gray-500 font-medium">Sharding</span>
                  <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                    <button onClick={() => setSharding('Pipeline')} className={`px-4 py-2 text-[13px] font-medium ${sharding === 'Pipeline' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Pipeline</button>
                    <button onClick={() => setSharding('Tensor')} className={`px-4 py-2 text-[13px] font-medium ${sharding === 'Tensor' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Tensor</button>
                  </div>
                </div>
              </div>

              {/* Status + Load button */}
              {loadStatus ? (
                <div className={`flex items-center gap-3 px-4 py-3 rounded-lg ${
                  loadStatus.status === 'running' ? 'bg-emerald-50 border border-emerald-200' :
                  loadStatus.status === 'loading' ? 'bg-amber-50 border border-amber-200' :
                  'bg-red-50 border border-red-200'
                }`}>
                  <div className={`w-2 h-2 rounded-full ${
                    loadStatus.status === 'running' ? 'bg-emerald-500' :
                    loadStatus.status === 'loading' ? 'bg-amber-500 animate-pulse' : 'bg-red-500'
                  }`} />
                  <span className={`text-[13px] font-semibold ${
                    loadStatus.status === 'running' ? 'text-emerald-600' :
                    loadStatus.status === 'loading' ? 'text-amber-600' : 'text-red-600'
                  }`}>{loadStatus.status === 'running' ? 'Running' : loadStatus.status === 'loading' ? 'Loading...' : 'Failed'}</span>
                  <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
                  {loadStatus.error && <span className="text-xs text-red-500">{loadStatus.error}</span>}
                  <div className="flex-1" />
                  {loadStatus.status === 'running' && (
                    <button onClick={handleUnload} className="px-3 py-1 border border-red-200 rounded text-xs text-red-600 hover:bg-red-50">Unload</button>
                  )}
                  <button onClick={handleLoad} className="px-4 py-1.5 bg-exo rounded-md text-[13px] font-semibold text-gray-900 hover:brightness-95">Load Model</button>
                </div>
              ) : (
                <div className="flex justify-end">
                  <button onClick={handleLoad} className="px-5 py-2.5 bg-exo rounded-lg text-sm font-semibold text-gray-900 hover:brightness-95">Load Model</button>
                </div>
              )}
            </div>
          </div>

          {/* Import Custom Model */}
          <div className="px-10 pb-6">
            <button onClick={() => setShowImport(!showImport)}
              className="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
              {showImport ? '▾' : '▸'} Import Custom Model (from external machine)
            </button>
            {showImport && (
              <div className="mt-3 bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-4">
                <span className="text-sm font-semibold text-gray-900">Import from external source via SSH + rsync</span>
                <div className="flex gap-4">
                  <div className="flex flex-col gap-1.5 flex-1">
                    <span className="text-xs text-gray-500 font-medium">Source IP</span>
                    <input type="text" value={importForm.sourceIp} onChange={e => setImportForm(f => ({ ...f, sourceIp: e.target.value }))}
                      placeholder="192.168.86.50" className="mono text-xs px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                  </div>
                  <div className="flex flex-col gap-1.5 flex-1">
                    <span className="text-xs text-gray-500 font-medium">SSH User</span>
                    <input type="text" value={importForm.sourceUser} onChange={e => setImportForm(f => ({ ...f, sourceUser: e.target.value }))}
                      placeholder="sophie" className="mono text-xs px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                  </div>
                  <div className="flex flex-col gap-1.5 flex-[2]">
                    <span className="text-xs text-gray-500 font-medium">Model path on source</span>
                    <input type="text" value={importForm.sourcePath} onChange={e => setImportForm(f => ({ ...f, sourcePath: e.target.value }))}
                      placeholder="/Volumes/models_store/exo/mlx-community--ModelName" className="mono text-xs px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                  </div>
                </div>
                <div className="flex gap-4 items-end">
                  <div className="flex flex-col gap-1.5">
                    <span className="text-xs text-gray-500 font-medium">Target node</span>
                    <select value={importForm.targetNode} onChange={e => setImportForm(f => ({ ...f, targetNode: e.target.value }))}
                      className="text-xs px-3 py-2 border border-gray-200 rounded-lg bg-white">
                      <option value="">Select...</option>
                      {nodeNames.map(n => <option key={n} value={n}>{n}</option>)}
                    </select>
                  </div>
                  <button onClick={async () => {
                    if (!importForm.sourceIp || !importForm.sourceUser || !importForm.sourcePath || !importForm.targetNode) return;
                    await fetch('/api/models/import', {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(importForm),
                    });
                  }} disabled={!importForm.sourceIp || !importForm.sourcePath || !importForm.targetNode}
                    className="px-4 py-2 bg-exo rounded-lg text-xs font-semibold text-gray-900 hover:brightness-95 disabled:opacity-40">
                    Start Import
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function DownloadsPage() {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [format, setFormat] = useState('mlx');
      const [sort, setSort] = useState('downloads');
      const [directId, setDirectId] = useState('');

      async function search() {
        if (!query.trim()) return;
        setLoading(true);
        try {
          const params = new URLSearchParams({ q: query, format, sort, limit: '30' });
          const res = await fetch(`/api/hub/search?${params}`);
          const data = await res.json();
          setResults(data);
        } catch (e) {
          console.error('HF search error:', e);
        }
        setLoading(false);
      }

      async function downloadModel(modelId) {
        try {
          await fetch('/api/download', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId }),
          });
        } catch (e) {}
      }

      async function downloadDirect() {
        if (!directId.includes('/')) return;
        await downloadModel(directId);
        setDirectId('');
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          <div className="flex justify-between items-center px-10 pt-5 pb-0">
            <div className="flex items-baseline gap-3">
              <span className="text-[22px] font-bold text-gray-900">Downloads</span>
              <span className="text-[13px] text-gray-400">Search and download models</span>
            </div>
            <a href="https://huggingface.co" target="_blank" rel="noopener" className="flex items-center gap-1.5 px-2.5 py-1 border border-gray-200 rounded-md hover:bg-gray-50">
              <span className="text-[11px]">↗</span>
              <span className="text-xs text-gray-500">huggingface.co</span>
            </a>
          </div>

          {/* Search + Direct */}
          <div className="px-10 py-4 flex gap-3">
            <div className="flex-1 flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl">
              <span className="text-gray-400">🔍</span>
              <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && search()}
                placeholder="Search HuggingFace..." className="flex-1 text-sm text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={search} className="px-3 py-1 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95">Search</button>
            </div>
            <div className="flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl w-[360px]">
              <span className="text-xs text-gray-400">Direct:</span>
              <input type="text" value={directId} onChange={e => setDirectId(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && downloadDirect()}
                placeholder="author/model-name" className="flex-1 mono text-xs text-gray-900 outline-none placeholder-gray-400" />
              <button onClick={downloadDirect} disabled={!directId.includes('/')}
                className="px-2.5 py-1 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95 disabled:opacity-40">↓</button>
            </div>
          </div>

          {/* Filters */}
          <div className="px-10 pb-4 flex items-center gap-4 flex-wrap">
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Format</span>
              {['mlx', 'all'].map(f => (
                <button key={f} onClick={() => setFormat(f)}
                  className={`px-2.5 py-1 rounded-md text-[11px] font-medium ${format === f ? 'bg-exo font-semibold text-gray-900' : 'border border-gray-200 text-gray-500 hover:bg-gray-50'}`}>
                  {f === 'mlx' ? 'MLX' : 'All'}
                </button>
              ))}
            </div>
            <div className="w-px h-6 bg-gray-200" />
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Sort</span>
              <select value={sort} onChange={e => setSort(e.target.value)} className="text-[11px] px-2 py-1 border border-gray-200 rounded-md bg-white">
                <option value="downloads">Popularity</option>
                <option value="lastModified">Date</option>
                <option value="likes">Likes</option>
              </select>
            </div>
          </div>

          {/* Results */}
          <div className="px-10 pb-4">
            {loading && <div className="text-center py-8 text-gray-400 text-sm">Searching...</div>}
            {!loading && results.length > 0 && (
              <div className="text-xs text-gray-400 mb-2">{results.length} results</div>
            )}
          </div>
          <div className="flex-1 px-10 pb-6 flex flex-col gap-2 overflow-y-auto">
            {results.map(m => (
              <div key={m.id} className="bg-white border border-gray-200 rounded-xl px-5 py-3.5 flex items-center gap-4">
                <div className="flex-1 flex flex-col gap-1">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold text-gray-900">{m.modelName || m.id}</span>
                    {m.format && <span className="mono text-[10px] font-semibold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded">{m.format.toUpperCase()}</span>}
                    {m.quantBits && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.quantBits}-bit</span>}
                    {m.precision && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.precision}</span>}
                    {m.namedParams && <span className="mono text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">{m.namedParams}B</span>}
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="mono text-[11px] text-gray-400">{m.author}</span>
                    {m.estimatedSizeGB && <span className="mono text-[11px] text-gray-500">~{m.estimatedSizeGB} GB</span>}
                    <span className="text-[11px] text-gray-400">↓ {m.downloads >= 1000 ? `${(m.downloads/1000).toFixed(1)}K` : m.downloads}</span>
                  </div>
                </div>
                <button onClick={() => downloadModel(m.id)}
                  className="px-3.5 py-1.5 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95 flex-shrink-0">
                  Download
                </button>
              </div>
            ))}
            {!loading && results.length === 0 && query && (
              <div className="text-center py-8 text-gray-400 text-sm">No results. Try a different search.</div>
            )}
            {!query && results.length === 0 && (
              <div className="text-center py-12 text-gray-400 text-sm">Search HuggingFace to find models for your cluster.</div>
            )}
          </div>
        </div>
      );
    }
