    // SETTINGS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function SettingsPage({ settings, refreshSettings }) {
      const [nodes, setNodes] = useState(settings?.nodes || []);
      const [exoIp, setExoIp] = useState(settings?.chat?.exo1?.ip || '');
      const [exoPort, setExoPort] = useState(settings?.chat?.exo1?.port || 52415);
      const [sshUser, setSshUser] = useState(settings?.sshUser || 'admin');
      const [newNodeName, setNewNodeName] = useState('');
      const [newNodeIp, setNewNodeIp] = useState('');
      const [newNodeRam, setNewNodeRam] = useState('');
      const [passwords, setPasswords] = useState({}); // ip → password
      const [showPasswords, setShowPasswords] = useState({});
      const [discovering, setDiscovering] = useState(false);
      const [discovered, setDiscovered] = useState([]);
      const [testResult, setTestResult] = useState(null);
      const [sshStatus, setSshStatus] = useState({}); // ip → { ok, method }
      const [setupResult, setSetupResult] = useState(null);

      useEffect(() => {
        if (settings) {
          setNodes(settings.nodes || []);
          setExoIp(settings.chat?.exo1?.ip || '');
          setExoPort(settings.chat?.exo1?.port || 52415);
          setSshUser(settings.sshUser || 'admin');
        }
      }, [settings]);

      async function save() {
        const updated = {
          ...settings,
          nodes,
          chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } },
          sshUser,
          setupComplete: nodes.length > 0,
        };
        await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
        refreshSettings();
      }

      async function discover() {
        setDiscovering(true);
        try {
          const res = await fetch('/api/discover');
          const data = await res.json();
          setDiscovered(data);
        } catch (e) {}
        setDiscovering(false);
      }

      function addNode() {
        if (!newNodeName || !newNodeIp) return;
        setNodes(prev => [...prev, { name: newNodeName, ip: newNodeIp, ram: newNodeRam || '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(newNodeIp);
        setNewNodeName(''); setNewNodeIp(''); setNewNodeRam('');
      }

      function addDiscoveredNode(ip) {
        const name = `node-${ip.split('.').pop()}`;
        setNodes(prev => [...prev, { name, ip, ram: '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(ip);
      }

      function removeNode(i) {
        setNodes(prev => prev.filter((_, idx) => idx !== i));
      }

      async function testSSH() {
        const results = {};
        for (const node of nodes) {
          try {
            const r = await fetch('/api/ssh/test', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ip: node.ip, user: sshUser }),
            });
            const data = await r.json();
            results[node.ip] = { ok: data.connected, method: data.method };
          } catch (e) {
            results[node.ip] = { ok: false, method: 'error' };
          }
        }
        setSshStatus(results);
      }

      async function setupSSHKeys() {
        const nodesWithPwd = nodes.filter(n => passwords[n.ip]).map(n => ({
          ip: n.ip, user: sshUser, password: passwords[n.ip],
        }));
        if (nodesWithPwd.length === 0) { setSetupResult('Enter passwords for nodes first'); return; }
        setSetupResult('Installing SSH keys...');
        try {
          const r = await fetch('/api/ssh/setup-keys', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nodes: nodesWithPwd }),
          });
          const data = await r.json();
          const ok = data.results?.filter(r => r.ok)?.length || 0;
          const fail = data.results?.filter(r => !r.ok)?.length || 0;
          setSetupResult(`Keys installed: ${ok} OK, ${fail} failed`);
          // Clear passwords after setup
          setPasswords({});
          // Re-test
          setTimeout(testSSH, 1000);
        } catch (e) {
          setSetupResult(`Error: ${e.message}`);
        }
      }

      async function testEndpoint() {
        try {
          // Save current endpoint first so backend uses it
          const updated = { ...settings, chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } }, sshUser };
          await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
          // Test via backend proxy (avoids CORS)
          const res = await fetch('/api/chat/active-model?engine=exo1');
          setTestResult(res.ok ? 'connected' : 'failed');
        } catch (e) {
          setTestResult('failed');
        }
        setTimeout(() => setTestResult(null), 5000);
      }

      return (
        <div className="flex-1 flex gap-8 px-10 py-5 overflow-y-auto">
          <div className="flex-1 flex flex-col gap-7">
            <span className="text-[22px] font-bold text-gray-900">Settings</span>

            {/* EXO Nodes */}
            <div className="flex flex-col gap-3">
              <div className="flex justify-between items-center">
                <span className="text-sm font-semibold text-gray-900">EXO Nodes</span>
                <div className="flex gap-2">
                  <button onClick={discover} disabled={discovering}
                    className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                    {discovering ? 'Scanning...' : '🔍 Re-discover'}
                  </button>
                </div>
              </div>

              {/* Discovered nodes */}
              {discovered.length > 0 && (
                <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-indigo-600 uppercase">Discovered on LAN</span>
                  {discovered.map(d => (
                    <div key={d.ip} className="flex items-center justify-between">
                      <span className="mono text-xs text-gray-700">{d.ip}:{d.port} — {d.modelCount} models</span>
                      {!nodes.find(n => n.ip === d.ip) ? (
                        <button onClick={() => addDiscoveredNode(d.ip)} className="text-[11px] text-indigo-600 hover:underline">+ Add</button>
                      ) : (
                        <span className="text-[11px] text-gray-400">Already added</span>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* Nodes table */}
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex px-4 py-2 bg-gray-50 border-b border-gray-200">
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Name</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">IP Address</div>
                  <div className="flex-1 text-[11px] font-semibold text-gray-400 uppercase tracking-wider">RAM</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Password (for SSH setup)</div>
                  <div className="w-[80px] text-[11px] font-semibold text-gray-400 uppercase tracking-wider text-center">SSH</div>
                  <div className="w-[60px]" />
                </div>
                {nodes.map((node, i) => (
                  <div key={i} className="flex px-4 py-2.5 border-b border-gray-100 items-center">
                    <div className="flex-[2] text-[13px] font-medium text-gray-900">{node.name}</div>
                    <div className="flex-[2] mono text-xs text-gray-500">{node.ip}</div>
                    <div className="flex-1 text-xs text-gray-500">{node.ram}</div>
                    <div className="flex-[2] flex items-center gap-1">
                      <input type={showPasswords[node.ip] ? 'text' : 'password'}
                        value={passwords[node.ip] || ''} onChange={e => setPasswords(p => ({ ...p, [node.ip]: e.target.value }))}
                        placeholder="••••••" className="mono text-xs px-2 py-1 border border-gray-200 rounded bg-white w-full" />
                      <button onClick={() => setShowPasswords(p => ({ ...p, [node.ip]: !p[node.ip] }))}
                        className="text-[11px] text-gray-400 hover:text-gray-600 flex-shrink-0">{showPasswords[node.ip] ? '🙈' : '👁'}</button>
                    </div>
                    <div className="w-[80px] text-center">
                      {sshStatus[node.ip] ? (
                        <span className={`text-[11px] font-medium ${sshStatus[node.ip].ok ? 'text-emerald-500' : 'text-red-500'}`}>
                          {sshStatus[node.ip].ok ? '✓ Key' : '✗ No key'}
                        </span>
                      ) : (
                        <span className="text-[11px] text-gray-300">—</span>
                      )}
                    </div>
                    <div className="w-[60px] text-right">
                      <button onClick={() => removeNode(i)} className="text-xs text-red-400 hover:text-red-600">Remove</button>
                    </div>
                  </div>
                ))}
                {/* Add row */}
                <div className="flex px-4 py-2 items-center gap-2 bg-gray-50">
                  <input type="text" value={newNodeName} onChange={e => setNewNodeName(e.target.value)} placeholder="Name" className="flex-[2] text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeIp} onChange={e => setNewNodeIp(e.target.value)} placeholder="IP Address" className="flex-[2] mono text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeRam} onChange={e => setNewNodeRam(e.target.value)} placeholder="RAM" className="flex-1 text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <button onClick={addNode} className="px-3 py-1.5 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95">+ Add</button>
                </div>
              </div>
              {/* SSH actions */}
              <div className="flex items-center gap-3 mt-1">
                <button onClick={testSSH} className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50">
                  🔑 Test SSH Keys
                </button>
                <button onClick={setupSSHKeys} className="px-3 py-1.5 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95">
                  🔐 Setup SSH Keys
                </button>
                {setupResult && <span className="text-xs text-gray-500">{setupResult}</span>}
              </div>
            </div>

            {/* EXO Endpoint */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">EXO Endpoint</span>
              <div className="flex gap-3 items-center">
                <input type="text" value={exoIp} onChange={e => setExoIp(e.target.value)} placeholder="192.168.86.29"
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[200px]" />
                <span className="text-gray-400">:</span>
                <input type="number" value={exoPort} onChange={e => setExoPort(parseInt(e.target.value) || 52415)}
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[80px]" />
                <button onClick={testEndpoint} className="px-3.5 py-2 border border-gray-200 rounded-lg text-xs text-gray-500 hover:bg-gray-50">Test</button>
                {testResult && (
                  <div className="flex items-center gap-1.5">
                    <div className={`w-1.5 h-1.5 rounded-full ${testResult === 'connected' ? 'bg-emerald-500' : 'bg-red-500'}`} />
                    <span className={`text-xs ${testResult === 'connected' ? 'text-emerald-600' : 'text-red-600'}`}>
                      {testResult === 'connected' ? 'Connected' : 'Failed'}
                    </span>
                  </div>
                )}
              </div>
            </div>

            {/* SSH */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">SSH</span>
              <div className="flex gap-4">
                <div className="flex flex-col gap-1 flex-1">
                  <span className="text-xs text-gray-500">User</span>
                  <input type="text" value={sshUser} onChange={e => setSshUser(e.target.value)}
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                </div>
                <div className="flex flex-col gap-1 flex-[2]">
                  <span className="text-xs text-gray-500">Key path</span>
                  <input type="text" value={settings?.sshOpts?.match(/-i\s+(\S+)/)?.[1] || '/root/.ssh/id_ed25519'} readOnly
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500" />
                </div>
              </div>
            </div>

            {/* Save */}
            <button onClick={save} className="self-start px-6 py-2.5 bg-exo rounded-lg text-sm font-semibold text-gray-900 hover:brightness-95">
              Save Settings
            </button>
          </div>

          {/* About card */}
          <div className="w-[260px] flex-shrink-0">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-3.5">
              <span className="text-sm font-semibold text-gray-900">About</span>
              <div className="flex flex-col gap-2">
                <div className="flex justify-between"><span className="text-xs text-gray-500">Version</span><span className="mono text-xs text-gray-900">{settings?.version || '—'}</span></div>
                <div className="flex justify-between"><span className="text-xs text-gray-500">Nodes</span><span className="text-xs text-gray-900">{nodes.length} configured</span></div>
              </div>
              <div className="h-px bg-gray-100" />
              <div className="flex flex-col gap-2">
                <a href="https://github.com/Sofille65/exoscopy" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ ExoScopy on GitHub</a>
                <a href="https://github.com/exo-explore/exo" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ exo on GitHub</a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // APP — Router
    // ═══════════════════════════════════════════════════════════════════

    function App() {
      const [page, setPage] = useState('Chat');
      const [settings, setSettings] = useState(null);
      const [clusterStatus, setClusterStatus] = useState(null);

      function refreshSettings() {
        fetch('/api/settings').then(r => r.json()).then(setSettings).catch(() => {});
      }

      useEffect(() => {
        refreshSettings();
        // Fetch cluster status
        const fetchStatus = () => {
          fetch('/api/monitoring/status').then(r => r.json()).then(setClusterStatus).catch(() => {});
        };
        fetchStatus();
        const interval = setInterval(fetchStatus, 15000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="h-screen flex flex-col">
          <NavBar page={page} setPage={setPage} version={settings?.version} clusterStatus={clusterStatus} />
          {page === 'Chat' && <ChatPage clusterStatus={clusterStatus} />}
          {page === 'Dashboard' && <DashboardPage clusterStatus={clusterStatus} />}
          {page === 'Models' && <ModelsPage clusterStatus={clusterStatus} />}
          {page === 'Downloads' && <DownloadsPage />}
          {page === 'Settings' && <SettingsPage settings={settings} refreshSettings={refreshSettings} />}
        </div>
      );
    }

    // ─── Error Boundary ───────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      render() {
        if (this.state.error) {
          return (
            <div className="h-screen flex items-center justify-center bg-gray-50">
              <div className="text-center max-w-md">
                <h1 className="text-xl font-bold text-red-600 mb-2">Something went wrong</h1>
                <p className="text-sm text-gray-500 mb-4">{this.state.error.message}</p>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-exo rounded-lg text-sm font-semibold">Reload</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );
  </script>
</body>
</html>
