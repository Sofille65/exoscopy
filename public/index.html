<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExoScopy</title>
  <!-- All vendor libs self-hosted in /vendor/ — works offline, no CDN dependency -->
  <script src="vendor/tailwind.min.js"></script>

    tailwind.config = {

          }

  </script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/socket.io.min.js"></script>
  <script src="vendor/marked.min.js"></script>

      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.js';

  </script>
  <style>
    body { background: #f9fafb; color: #111827; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', monospace; }
    .md-body p { margin: 0.4em 0; line-height: 1.6; }
    .md-body p:first-child { margin-top: 0; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body h1, .md-body h2, .md-body h3 { font-weight: 600; margin: 0.8em 0 0.3em; }
    .md-body h1 { font-size: 1.25em; }
    .md-body h2 { font-size: 1.1em; }
    .md-body h3 { font-size: 1em; color: #6366f1; }
    .md-body ul, .md-body ol { margin: 0.3em 0; padding-left: 1.5em; }
    .md-body ul { list-style-type: disc; }
    .md-body ol { list-style-type: decimal; }
    .md-body li { margin: 0.15em 0; }
    .md-body code { background: #1e1e2e; color: #a5b4fc; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.88em; font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', monospace; }
    .md-body pre { background: #1e1e2e; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.8em 1em; margin: 0.5em 0; overflow-x: auto; }
    .md-body pre code { background: none; padding: 0; color: #e2e8f0; display: block; line-height: 1.6; font-size: 0.85em; }
    .md-body blockquote { border-left: 3px solid #e5e7eb; padding-left: 0.8em; margin: 0.4em 0; color: #6b7280; }
    .md-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
    .md-body th, .md-body td { border: 1px solid #e5e7eb; padding: 0.3em 0.6em; font-size: 0.88em; }
    .md-body th { background: #f9fafb; font-weight: 600; }
    .md-body strong { font-weight: 600; color: #111827; }
    .md-body a { color: #6366f1; text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 0.8em 0; }
    .think-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .think-block summary { cursor: pointer; color: #9ca3af; font-style: italic; font-size: 0.85em; }
    .think-block .think-content { color: #6b7280; font-style: italic; font-size: 0.9em; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const socket = io();

    // ═══════════════════════════════════════════════════════════════════
    // STREAM MANAGER — persists across page/conversation switches
    // ═══════════════════════════════════════════════════════════════════

    const StreamManager = {
      _streams: new Map(), // convId → { content, done, error, stats, controller, startTime, firstTokenTime, chunkCount, promptTokens, completionTokens, toolStatus }
      _listeners: new Map(), // convId → Set<fn> — persistent, survives stream lifecycle
      _globalListeners: new Set(), // notified on any stream start/stop (for badges)

      startStream(convId, body) {
        const controller = new AbortController();
        const entry = {
          content: '', done: false, error: null, stats: null,
          controller,
          startTime: Date.now(), firstTokenTime: null,
          chunkCount: 0, promptTokens: 0, completionTokens: 0,
          toolStatus: null, // { tool, args } when a tool is executing
        };
        this._streams.set(convId, entry);
        this._notifyGlobal();
        this._pump(convId, body, entry);
        return controller;
      },

      async _pump(convId, body, entry) {
        try {
          const res = await fetch('/api/chat/completions', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body), signal: entry.controller.signal,
          });
          if (!res.ok) {
            const errText = await res.text().catch(() => `HTTP ${res.status}`);
            throw new Error(errText || `HTTP ${res.status}`);
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            for (const line of chunk.split('\n')) {
              // SSE comment (keepalive from exo v1.0.70+) — ignore
              if (line.startsWith(':')) continue;
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                // Handle tool events from server
                if (parsed._event === 'tool_start') {
                  entry.toolStatus = { tool: parsed.tool, args: parsed.args };
                  this._notify(convId);
                  continue;
                }
                if (parsed._event === 'tool_done') {
                  entry.toolStatus = null;
                  this._notify(convId);
                  continue;
                }
                const delta = parsed.choices?.[0]?.delta;
                const textContent = delta?.content;
                const thinkContent = delta?.reasoning_content;
                if (textContent || thinkContent) {
                  if (!entry.firstTokenTime) entry.firstTokenTime = Date.now();
                  if (thinkContent) {
                    if (!entry.content.includes('<think>')) entry.content += '<think>';
                    entry.content += thinkContent;
                  } else if (textContent) {
                    if (entry.content.includes('<think>') && !entry.content.includes('</think>')) entry.content += '</think>';
                    entry.content += textContent;
                  }
                  entry.chunkCount++;
                  if (parsed.usage) {
                    if (parsed.usage.completion_tokens) entry.completionTokens = parsed.usage.completion_tokens;
                    if (parsed.usage.prompt_tokens) entry.promptTokens = parsed.usage.prompt_tokens;
                  }
                  this._notify(convId);
                }
              } catch (e) {}
            }
          }
          // Stream complete — calculate stats
          const totalTime = (Date.now() - entry.startTime) / 1000;
          const ttft = entry.firstTokenTime ? (entry.firstTokenTime - entry.startTime) / 1000 : null;
          const genTime = entry.firstTokenTime ? (Date.now() - entry.firstTokenTime) / 1000 : totalTime;
          const speed = genTime > 0 && entry.chunkCount > 0 ? entry.chunkCount / genTime : 0;
          entry.stats = { ttft, speed, totalTime, genTime, promptTokens: entry.promptTokens, completionTokens: entry.completionTokens || entry.chunkCount, chunks: entry.chunkCount, chunkRate: speed };
          entry.done = true;
          this._notify(convId);
          this._notifyGlobal();
        } catch (e) {
          entry.done = true;
          if (e.name !== 'AbortError') entry.error = e.message;
          this._notify(convId);
          this._notifyGlobal();
        }
      },

      stop(convId) {
        const entry = this._streams.get(convId);
        if (entry && !entry.done) {
          entry.controller.abort();
          entry.done = true;
          this._notify(convId);
          this._notifyGlobal();
        }
      },

      subscribe(convId, fn) {
        if (!this._listeners.has(convId)) this._listeners.set(convId, new Set());
        this._listeners.get(convId).add(fn);
        // Immediately deliver current state to catch up
        const entry = this._streams.get(convId);
        if (entry && entry.content) fn(entry);
      },
      unsubscribe(convId, fn) {
        const subs = this._listeners.get(convId);
        if (subs) { subs.delete(fn); if (subs.size === 0) this._listeners.delete(convId); }
      },
      onGlobal(fn) { this._globalListeners.add(fn); },
      offGlobal(fn) { this._globalListeners.delete(fn); },

      _notify(convId) {
        const entry = this._streams.get(convId);
        const subs = this._listeners.get(convId);
        if (entry && subs) subs.forEach(fn => fn(entry));
      },
      _notifyGlobal() {
        const ids = this.getActiveIds();
        this._globalListeners.forEach(fn => fn(ids));
      },

      get(convId) { return this._streams.get(convId) || null; },
      isActive(convId) { const e = this._streams.get(convId); return e && !e.done; },
      getActiveIds() {
        const ids = [];
        this._streams.forEach((e, id) => { if (!e.done) ids.push(id); });
        return ids;
      },
      cleanup(convId) { this._streams.delete(convId); },
    };

    // ═══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════

    // Render markdown — same approach as Model Manager (simple, reliable)
    const renderMd = (text) => {
      if (!text) return '';
      let t = text.replace(/\\n/g, '\n');
      // Handle think blocks before markdown
      t = t.replace(/<think>([\s\S]*?)<\/think>/g, (_, content) => {
        return `<details class="think-block"><summary>Thinking... (click to expand)</summary><div class="think-content">${content}</div></details>`;
      });
      try {
        if (typeof marked !== 'undefined') {
          const fn = typeof marked.parse === 'function' ? marked.parse : marked;
          return fn(t, { breaks: true, gfm: true });
        }
      } catch (e) {}
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d`;
      return new Date(dateStr).toLocaleDateString('en', { month: 'short', day: 'numeric' });
    }

    // Extract code blocks from markdown text
    function extractCodeBlocks(text) {
      const blocks = [];
      const regex = /```(\w*)\n([\s\S]*?)```/g;
      const lines = text.split('\n');
      let match;
      while ((match = regex.exec(text)) !== null) {
        const lang = match[1] || 'txt';
        const code = match[2];
        // Try to detect filename from line before the code block
        const beforeIdx = text.substring(0, match.index).split('\n').length - 2;
        let filename = null;
        if (beforeIdx >= 0 && lines[beforeIdx]) {
          const line = lines[beforeIdx].trim();
          const fnMatch = line.match(/^(?:\*\*)?`?([a-zA-Z0-9_\-]+\.[a-zA-Z0-9]+)`?(?:\*\*)?$/);
          if (fnMatch) filename = fnMatch[1];
        }
        if (!filename) filename = `file-${blocks.length + 1}.${lang === 'javascript' ? 'js' : lang === 'python' ? 'py' : lang === 'typescript' ? 'ts' : lang || 'txt'}`;
        blocks.push({ filename, lang, code });
      }
      return blocks;
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function downloadAllAsZip(blocks) {
      const zip = new JSZip();
      const names = {};
      for (const b of blocks) {
        let name = b.filename;
        if (names[name]) { const ext = name.split('.').pop(); name = name.replace(`.${ext}`, `-${names[name]}.${ext}`); }
        names[b.filename] = (names[b.filename] || 0) + 1;
        zip.file(name, b.code);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'code-blocks.zip'; a.click();
      URL.revokeObjectURL(url);
    }

    function exportConversation(conv, messages, format = 'md') {
      if (format === 'md') {
        let md = `# ${conv.title || 'Conversation'}\n\n`;
        md += `Model: ${conv.model || '—'}\nDate: ${new Date(conv.createdAt).toLocaleString()}\n\n---\n\n`;
        for (const m of messages) {
          md += m.role === 'user' ? `**User:**\n${m.content}\n\n` : `**Assistant:**\n${m.content}\n\n---\n\n`;
        }
        downloadFile(`${conv.title || 'conversation'}.md`, md);
      } else {
        downloadFile(`${conv.title || 'conversation'}.json`, JSON.stringify({ ...conv, messages }, null, 2));
      }
    }

    // Clipboard copy that works on HTTP (not just HTTPS)
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        copyToClipboard(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    // SVG Icons — clean, minimal, 14px
    const Icons = {
      trash: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      eye: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      eyeOff: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
      copy: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
      download: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      key: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
      lock: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      save: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
      speaker: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>,
      speakerOff: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>,
    };

    // ═══════════════════════════════════════════════════════════════════
    // TTS — Browser speech synthesis for accessibility
    // ═══════════════════════════════════════════════════════════════════

    const TTS = {
      _utterance: null,
      _speaking: false,
      _listeners: new Set(),

      // Strip markdown/HTML for clean speech
      cleanText(text) {
        if (!text) return '';
        return text
          .replace(/<think>[\s\S]*?<\/think>/g, '') // remove thinking blocks
          .replace(/```[\s\S]*?```/g, ' code block omitted ') // code blocks
          .replace(/`([^`]+)`/g, '$1') // inline code
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // links
          .replace(/#{1,6}\s+/g, '') // headings
          .replace(/[*_~]{1,3}/g, '') // bold/italic/strikethrough
          .replace(/\|[^\n]+\|/g, '') // tables
          .replace(/^[-*+]\s+/gm, '') // list markers
          .replace(/^\d+\.\s+/gm, '') // numbered lists
          .replace(/\n{2,}/g, '. ') // paragraph breaks → pause
          .replace(/\n/g, ' ')
          .trim();
      },

      speak(text, voiceURI) {
        this.stop();
        const clean = this.cleanText(text);
        if (!clean) return;
        const utterance = new SpeechSynthesisUtterance(clean);
        if (voiceURI) {
          const voice = speechSynthesis.getVoices().find(v => v.voiceURI === voiceURI);
          if (voice) utterance.voice = voice;
        }
        utterance.rate = 1.0;
        utterance.onend = () => { this._speaking = false; this._utterance = null; this._notifyAll(); };
        utterance.onerror = () => { this._speaking = false; this._utterance = null; this._notifyAll(); };
        this._utterance = utterance;
        this._speaking = true;
        this._notifyAll();
        speechSynthesis.speak(utterance);
      },

      stop() {
        if (speechSynthesis.speaking) speechSynthesis.cancel();
        this._speaking = false;
        this._utterance = null;
        this._notifyAll();
      },

      isSpeaking() { return this._speaking; },

      subscribe(fn) { this._listeners.add(fn); return () => this._listeners.delete(fn); },
      _notifyAll() { this._listeners.forEach(fn => fn(this._speaking)); },
    };

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '—';
      if (bytes < 1073741824) return `${Math.round(bytes / 1048576)} MB`;
      return `${Math.round(bytes / 1073741824)} GB`;
    }

    function formatGB(sizeKb) {
      if (!sizeKb) return '—';
      return `${(sizeKb / 1048576).toFixed(0)} GB`;
    }

    // ═══════════════════════════════════════════════════════════════════
    // NAV BAR
    // ═══════════════════════════════════════════════════════════════════

    function HelpModal({ onClose }) {
      const [helpPages, setHelpPages] = useState([]);
      const [activeSlug, setActiveSlug] = useState(null);
      const [content, setContent] = useState('');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('/api/help').then(r => r.json()).then(pages => {
          setHelpPages(pages);
          if (pages.length > 0) loadPage(pages[0].slug);
          else setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      function loadPage(slug) {
        setActiveSlug(slug);
        setLoading(true);
        fetch(`/api/help/${slug}`).then(r => r.json()).then(data => {
          setContent(data.content || '');
          setLoading(false);
        }).catch(() => { setContent('# Error\nFailed to load page.'); setLoading(false); });
      }

      const renderedHtml = useMemo(() => {
        if (!content) return '';
        if (typeof marked !== 'undefined' && marked.parse) return marked.parse(content);
        return content.replace(/\n/g, '<br/>');
      }, [content]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl border border-gray-200 w-[850px] max-h-[80vh] flex overflow-hidden" onClick={e => e.stopPropagation()}>
            {/* Sidebar */}
            <div className="w-[200px] bg-gray-50 border-r border-gray-200 flex flex-col flex-shrink-0">
              <div className="px-4 py-4 border-b border-gray-200">
                <span className="text-sm font-bold text-gray-900">Help</span>
              </div>
              <div className="flex flex-col py-2 overflow-y-auto flex-1">
                {helpPages.map(p => (
                  <button key={p.slug} onClick={() => loadPage(p.slug)}
                    className={`text-left px-4 py-2 text-[13px] transition-colors ${activeSlug === p.slug ? 'bg-white text-gray-900 font-semibold border-r-2 border-indigo-500' : 'text-gray-600 hover:bg-gray-100'}`}>
                    {p.title}
                  </button>
                ))}
              </div>
              <div className="px-4 py-3 border-t border-gray-200 text-[10px] text-gray-400">
                <a href="https://github.com/Sofille65/exoscopy" target="_blank" className="text-indigo-400 underline">GitHub</a>
                {' · '}
                <a href="https://github.com/exo-explore/exo" target="_blank" className="text-indigo-400 underline">exo</a>
              </div>
            </div>
            {/* Content */}
            <div className="flex-1 flex flex-col overflow-hidden">
              <div className="flex justify-between items-center px-6 py-4 border-b border-gray-200 flex-shrink-0">
                <span className="text-lg font-bold text-gray-900">ExoScopy — User Guide</span>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">×</button>
              </div>
              <div className="flex-1 overflow-y-auto px-6 py-5">
                {loading ? (
                  <div className="text-sm text-gray-400">Loading...</div>
                ) : (
                  <div className="prose prose-sm prose-gray max-w-none
                    [&_h1]:text-xl [&_h1]:font-bold [&_h1]:text-gray-900 [&_h1]:mb-4

    // CHAT PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ChatPage({ clusterStatus, settings, userRole }) {
      const [conversations, setConversations] = useState([]);
      const [activeConvId, setActiveConvId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [attachedFiles, setAttachedFiles] = useState([]);
      const [streaming, setStreaming] = useState(false);
      const [activeModel, setActiveModel] = useState(null);
      const [activeModels, setActiveModels] = useState([]); // all currently loaded models
      const [models, setModels] = useState([]);
      const [modelGroups, setModelGroups] = useState(null);
      const [chatSource, setChatSource] = useState('exo'); // 'exo' or 'openrouter'
      const [selectedModel, setSelectedModel] = useState('');
      const [preset, setPreset] = useState('normal');
      const [showSettings, setShowSettings] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [renamingId, setRenamingId] = useState(null);
      const [renameValue, setRenameValue] = useState('');
      const [params, setParams] = useState({ temperature: 0.7, maxTokens: 32768, thinking: false, reasoningEffort: 'medium', topP: null, topK: null, minP: null, repPenalty: null, seed: null });
      const [toolsEnabled, setToolsEnabled] = useState(() => localStorage.getItem('exoscopy-tools-enabled') === 'true');
      useEffect(() => { localStorage.setItem('exoscopy-tools-enabled', toolsEnabled); }, [toolsEnabled]);
      const [hideMultimodalInfo, setHideMultimodalInfo] = useState(() => localStorage.getItem('exoscopy-hide-multimodal-info') === '1');
      const [activeToolStatus, setActiveToolStatus] = useState(null); // { tool, args } or null
      const [systemPrompt, setSystemPrompt] = useState('');
      const [systemPromptEnabled, setSystemPromptEnabled] = useState(false);
      const [savedPrompts, setSavedPrompts] = useState([]);

      // Projects
      const [projects, setProjects] = useState([]);
      const [activeProjectId, setActiveProjectId] = useState(null); // null = all conversations
      const [showNewProject, setShowNewProject] = useState(false);
      const [editingProject, setEditingProject] = useState(null); // project id or null
      const [projectCategories, setProjectCategories] = useState([]);

      // Load saved prompts from localStorage (personal, not shared)
      useEffect(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('exoscopy-system-prompts') || '[]');
          setSavedPrompts(saved);
        } catch (e) {}
      }, []);
      const [selectedPromptIdx, setSelectedPromptIdx] = useState(-1);
      const statsMapRef = useRef({}); // convId-msgIdx → stats
      const messagesEndRef = useRef(null);

      // TTS accessibility
      const [ttsEnabled, setTtsEnabled] = useState(() => localStorage.getItem('exoscopy-tts-enabled') === 'true');
      const [ttsVoice, setTtsVoice] = useState(() => localStorage.getItem('exoscopy-tts-voice') || '');
      const [ttsSpeaking, setTtsSpeaking] = useState(false);

      useEffect(() => {
        return TTS.subscribe(speaking => setTtsSpeaking(speaking));
      }, []);

      // Sync TTS settings from localStorage (Settings page writes directly)
      useEffect(() => {
        const handler = () => {
          setTtsEnabled(localStorage.getItem('exoscopy-tts-enabled') === 'true');
          setTtsVoice(localStorage.getItem('exoscopy-tts-voice') || '');
        };
        window.addEventListener('tts-settings-changed', handler);
        return () => window.removeEventListener('tts-settings-changed', handler);
      }, []);
      const inputRef = useRef(null);
      const fileInputRef = useRef(null);
      const [expandedEditor, setExpandedEditor] = useState(false);

      // Auto-resize textarea
      const autoResize = useCallback(() => {
        const el = inputRef.current;
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 200) + 'px';
        el.style.overflowY = el.scrollHeight > 200 ? 'auto' : 'hidden';
      }, []);
      useEffect(() => { autoResize(); }, [input, autoResize]);

      const PRESETS = {
        creative: { temperature: 1.2, topP: 0.95, topK: null, minP: null, maxTokens: 32768, thinking: false },
        normal: { temperature: 0.7, topP: null, topK: null, minP: null, maxTokens: 32768, thinking: false },
        code: { temperature: 0.2, topP: 0.9, topK: 50, minP: 0.05, maxTokens: 65536, thinking: false },
      };

      // Load conversations
      useEffect(() => {
        fetch('/api/conversations').then(r => r.json()).then(setConversations).catch(() => {});
      }, []);

      // Load projects
      useEffect(() => {
        fetch('/api/projects').then(r => r.json()).then(setProjects).catch(() => {});
        fetch('/api/projects/categories').then(r => r.json()).then(setProjectCategories).catch(() => {});
      }, []);

      // Load models when source changes
      useEffect(() => {
        const engineKey = chatSource === 'openrouter' ? 'openrouter' : 'exo1';
        setModels([]); setModelGroups(null);
        Promise.all([
          fetch(`/api/chat/models?engine=${engineKey}`).then(r => r.json()),
          fetch('/api/chat/active-model?engine=exo1').then(r => r.json()),
        ]).then(([modelsData, activeData]) => {
          const modelList = modelsData.models || [];
          setModels(modelList);
          setModelGroups(modelsData.groups || null);
          const actives = activeData.activeModels || (activeData.activeModel ? [activeData.activeModel] : []);
          if (chatSource === 'exo') setActiveModels(actives); else setActiveModels([]);
          if (chatSource === 'exo' && activeData.activeModel) {
            setActiveModel(activeData.activeModel);
            setSelectedModel(activeData.activeModel);
            localStorage.setItem('exoscopy-last-model', activeData.activeModel);
          } else {
            setActiveModel(chatSource === 'exo' ? (activeData.activeModel || null) : null);
            const lastModel = localStorage.getItem(`exoscopy-last-model-${chatSource}`);
            if (lastModel && modelList.find(m => m.id === lastModel)) {
              setSelectedModel(lastModel);
            } else if (modelList.length > 0) {
              setSelectedModel(modelList[0].id);
            }
          }
        }).catch(() => {});
      }, [chatSource]);

      // Load conversation messages when active changes
      useEffect(() => {
        if (!activeConvId) { setMessages([]); setStreaming(false); return; }
        // Reset streaming state — will be set to true if this conv has an active stream
        setStreaming(false);
        const stream = StreamManager.get(activeConvId);
        if (stream && !stream.done) {
          // Active stream — fetch saved messages from server, then append live content
          fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d => {
            const saved = d.messages || [];
            setMessages([...saved, { role: 'assistant', content: stream.content, timestamp: new Date().toISOString() }]);
            setStreaming(true);
          }).catch(() => {});
        } else if (stream && stream.done) {
          // Stream finished while we were away — reload from server (message already persisted)
          StreamManager.cleanup(activeConvId);
          fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d => {
            setMessages(d.messages || []);
          }).catch(() => {});
        } else {
          // No active stream — check server for background inference (e.g. after page refresh)
          fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d => {
            setMessages(d.messages || []);
            if (d.inference?.active) {
              // Server is still streaming (e.g. we refreshed mid-stream) — poll for updates
              setStreaming(true);
              const poll = setInterval(() => {
                fetch(`/api/conversations/${activeConvId}/inference`).then(r => r.json()).then(inf => {
                  if (inf.active) {
                    setMessages(prev => {
                      const updated = [...prev];
                      if (updated.length > 0 && updated[updated.length - 1].role === 'assistant') {
                        updated[updated.length - 1] = { ...updated[updated.length - 1], content: inf.content };
                      } else {
                        updated.push({ role: 'assistant', content: inf.content, timestamp: new Date().toISOString() });
                      }
                      return updated;
                    });
                  } else {
                    clearInterval(poll);
                    setStreaming(false);
                    // Reload final messages from server
                    fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d2 => {
                      setMessages(d2.messages || []);
                    }).catch(() => {});
                    fetch(`/api/conversations/${activeConvId}/inference/clear`, { method: 'POST' }).catch(() => {});
                  }
                }).catch(() => { clearInterval(poll); setStreaming(false); });
              }, 500);
              return () => clearInterval(poll);
            }
          }).catch(() => {});
        }
      }, [activeConvId]);

      // Subscribe to StreamManager for real-time updates on active conversation
      useEffect(() => {
        if (!activeConvId) return;
        const handler = (entry) => {
          // Track tool execution status
          setActiveToolStatus(entry.toolStatus || null);
          setMessages(prev => {
            const updated = [...prev];
            // Update last assistant message with accumulated content, or create one
            if (updated.length > 0 && updated[updated.length - 1].role === 'assistant') {
              updated[updated.length - 1] = { ...updated[updated.length - 1], content: entry.content };
            } else {
              updated.push({ role: 'assistant', content: entry.content, timestamp: new Date().toISOString() });
            }
            return updated;
          });
          if (entry.done) {
            // Store stats
            if (entry.stats) {
              setMessages(prev => {
                const msgIdx = prev.length - 1;
                if (activeConvId) statsMapRef.current[`${activeConvId}-${msgIdx}`] = entry.stats;
                return prev;
              });
            }
            if (entry.error) {
              setMessages(prev => {
                const updated = [...prev];
                if (updated.length > 0 && updated[updated.length - 1].role === 'assistant') {
                  updated[updated.length - 1] = { ...updated[updated.length - 1], content: entry.content || `Error: ${entry.error}` };
                }
                return updated;
              });
            }
            setStreaming(false);
            setActiveToolStatus(null);
            // Auto-read response if TTS accessibility is enabled
            if (localStorage.getItem('exoscopy-tts-enabled') === 'true' && entry.content && !entry.error) {
              TTS.speak(entry.content, localStorage.getItem('exoscopy-tts-voice') || '');
            }
            // Refresh conversation list
            fetch('/api/conversations').then(r => r.json()).then(setConversations).catch(() => {});
            // Clean up after a short delay (let stats render)
            setTimeout(() => StreamManager.cleanup(activeConvId), 2000);
          }
        };
        StreamManager.subscribe(activeConvId, handler);
        return () => StreamManager.unsubscribe(activeConvId, handler);
      }, [activeConvId]);

      // Auto-scroll
      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      // Apply preset
      function applyPreset(name) {
        setPreset(name);
        const p = PRESETS[name];
        setParams(prev => ({ ...prev, temperature: p.temperature, topP: p.topP, topK: p.topK, minP: p.minP, maxTokens: p.maxTokens, thinking: p.thinking }));
      }

      // Process a PDF file: extract text + rasterize each page to PNG
      async function processPdf(file, placeholderId) {
        const MAX_PAGES = 20;
        const RENDER_SCALE = 1.5;
        if (!window.pdfjsLib) throw new Error('PDF library not loaded');
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        const processedPages = Math.min(totalPages, MAX_PAGES);
        const pages = [];

        for (let i = 1; i <= processedPages; i++) {
          // Update progress in placeholder
          setAttachedFiles(prev => prev.map(f => f.id === placeholderId ? { ...f, progress: `${i}/${processedPages}` } : f));

          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const text = textContent.items.map(item => item.str).join(' ').trim();

          const viewport = page.getViewport({ scale: RENDER_SCALE });
          const canvas = document.createElement('canvas');
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          const dataUrl = canvas.toDataURL('image/png');
          pages.push({ pageNum: i, text, dataUrl });
        }

        return { totalPages, processedPages, pages };
      }

      // File attachments — images as base64 DataURL, PDFs as pages, text files as text
      function handleFileAttach(e) {
        const files = Array.from(e.target.files || []);
        files.forEach(async (file) => {
          const isImage = file.type.startsWith('image/');
          const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');

          if (isPdf) {
            const placeholderId = `pdf-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            // Push a loading placeholder first
            setAttachedFiles(prev => [...prev, {
              id: placeholderId, name: file.name, type: 'pdf',
              processing: true, progress: '0/?', size: file.size,
            }]);
            try {
              const { totalPages, processedPages, pages } = await processPdf(file, placeholderId);
              setAttachedFiles(prev => prev.map(f => f.id === placeholderId ? {
                id: placeholderId, name: file.name, type: 'pdf', size: file.size,
                totalPages, processedPages, pages,
                thumbnail: pages[0]?.dataUrl,
                truncated: totalPages > processedPages,
              } : f));
            } catch (err) {
              console.error('PDF processing failed:', err);
              setAttachedFiles(prev => prev.map(f => f.id === placeholderId ? {
                id: placeholderId, name: file.name, type: 'pdf', error: err.message, size: file.size,
              } : f));
            }
            return;
          }

          const reader = new FileReader();
          reader.onload = (ev) => {
            if (isImage) {
              setAttachedFiles(prev => [...prev, {
                name: file.name, type: 'image', mimeType: file.type,
                dataUrl: ev.target.result, size: file.size,
              }]);
            } else {
              setAttachedFiles(prev => [...prev, {
                name: file.name, type: 'text',
                content: ev.target.result, size: file.size,
              }]);
            }
          };
          if (isImage) reader.readAsDataURL(file);
          else reader.readAsText(file);
        });
        e.target.value = '';
      }

      // Multi-turn edit
      async function handleEdit(msgIndex) {
        const msg = messages[msgIndex];
        if (msg.role !== 'user') return;
        // Extract text portion (multimodal messages store images we can't easily re-edit)
        let textContent = msg.content;
        if (Array.isArray(msg.content)) {
          textContent = msg.content.filter(p => p.type === 'text').map(p => p.text).join('\n');
        }
        setInput(textContent);
        // Truncate messages from this point
        const truncated = messages.slice(0, msgIndex);
        setMessages(truncated);
        // Update on server
        if (activeConvId) {
          await fetch(`/api/conversations/${activeConvId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: truncated }),
          });
        }
        inputRef.current?.focus();
      }

      // Pin/unpin conversation
      async function togglePin(convId) {
        const conv = conversations.find(c => c.id === convId);
        if (!conv) return;
        await fetch(`/api/conversations/${convId}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pinned: !conv.pinned }),
        });
        setConversations(prev => prev.map(c => c.id === convId ? { ...c, pinned: !c.pinned } : c));
      }

      // Global keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); newConversation(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // Create new conversation (linked to active project if any)
      async function newConversation() {
        const body = { engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel };
        if (activeProjectId) body.projectId = activeProjectId;
        const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
        setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        setActiveConvId(conv.id);
        setMessages([]);
      }

      // Get active project details (cached)
      const activeProject = useMemo(() => {
        if (!activeProjectId) return null;
        return projects.find(p => p.id === activeProjectId) || null;
      }, [activeProjectId, projects]);

      // Load full project data when project changes (for system prompt)
      const [activeProjectFull, setActiveProjectFull] = useState(null);
      useEffect(() => {
        if (!activeProjectId) { setActiveProjectFull(null); return; }
        fetch(`/api/projects/${activeProjectId}`).then(r => r.json()).then(setActiveProjectFull).catch(() => {});
      }, [activeProjectId]);

      // Delete conversation
      async function deleteConversation(id) {
        await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
        setConversations(prev => prev.filter(c => c.id !== id));
        if (activeConvId === id) { setActiveConvId(null); setMessages([]); }
      }

      // Send message
      const [chatWarning, setChatWarning] = useState(null);

      async function handleSend() {
        if (!input.trim() && !attachedFiles.length) return;
        // Block if this specific conversation is already streaming
        if (activeConvId && StreamManager.isActive(activeConvId)) return;
        if (!selectedModel) {
          setChatWarning('No model selected. Please select a model from the dropdown.');
          setTimeout(() => setChatWarning(null), 5000);
          return;
        }
        // Auto-load model on exo if none is active (skip for openrouter)
        if (!activeModel && chatSource === 'exo') {
          setChatWarning(`Loading ${selectedModel.split('/').pop()} on cluster...`);
          try {
            const loadRes = await fetch('/api/monitoring/load', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ modelId: selectedModel, sharding: 'Pipeline', minNodes: 1 }),
            });
            if (loadRes.ok) {
              setActiveModel(selectedModel);
              localStorage.setItem('exoscopy-last-model', selectedModel);
              setChatWarning(null);
            } else {
              const err = await loadRes.json();
              setChatWarning(`Failed to load model: ${err.error || 'unknown error'}`);
              setTimeout(() => setChatWarning(null), 5000);
              return;
            }
          } catch (e) {
            setChatWarning(`Failed to load model: ${e.message}`);
            setTimeout(() => setChatWarning(null), 5000);
            return;
          }
        }
        const rawInput = input.trim();
        const imageAttachments = attachedFiles.filter(f => f.type === 'image');
        const pdfAttachments = attachedFiles.filter(f => f.type === 'pdf' && !f.processing && !f.error && f.pages);
        const textAttachments = attachedFiles.filter(f => f.type === 'text');

        // Guard: still processing PDFs
        if (attachedFiles.some(f => f.type === 'pdf' && f.processing)) {
          setChatWarning('A PDF is still being processed — please wait.');
          setTimeout(() => setChatWarning(null), 4000);
          return;
        }

        // Build text portion: combine input + text file blocks
        let textPortion = rawInput;
        if (textAttachments.length) {
          const fileBlocks = textAttachments.map(f => {
            const ext = f.name.split('.').pop();
            return `**[${f.name}]**\n\`\`\`${ext}\n${f.content}\n\`\`\``;
          }).join('\n\n');
          textPortion = fileBlocks + (textPortion ? '\n\n' + textPortion : '');
        }

        // Build multimodal content when images or PDFs are attached
        let userMsg;
        if (imageAttachments.length > 0 || pdfAttachments.length > 0) {
          userMsg = [];
          if (textPortion) userMsg.push({ type: 'text', text: textPortion });
          // Standalone images
          for (const img of imageAttachments) {
            userMsg.push({ type: 'image_url', image_url: { url: img.dataUrl } });
          }
          // PDFs: interleave page text + page image per page
          for (const pdf of pdfAttachments) {
            userMsg.push({ type: 'text', text: `**[${pdf.name}] — ${pdf.processedPages} page${pdf.processedPages > 1 ? 's' : ''}${pdf.truncated ? ` (truncated from ${pdf.totalPages})` : ''}**` });
            for (const page of pdf.pages) {
              if (page.text) {
                userMsg.push({ type: 'text', text: `Page ${page.pageNum}:\n${page.text}` });
              }
              userMsg.push({ type: 'image_url', image_url: { url: page.dataUrl } });
            }
          }
        } else {
          userMsg = textPortion;
        }

        if (attachedFiles.length) setAttachedFiles([]);
        setInput('');

        let convId = activeConvId;
        if (!convId) {
          const newConvBody = { engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel };
          if (activeProjectId) newConvBody.projectId = activeProjectId;
          const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newConvBody) }).then(r => r.json());
          convId = conv.id;
          // Don't setActiveConvId here — defer until after stream starts to avoid useEffect clobbering
          setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        }

        const userMessage = { role: 'user', content: userMsg, timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, userMessage]);

        const allMessages = [...messages, userMessage];
        const apiMessages = [];
        // Project system prompt replaces session prompt when active
        const effectivePrompt = activeProjectFull?.systemPrompt || (systemPromptEnabled && systemPrompt ? systemPrompt : null);
        if (effectivePrompt) {
          apiMessages.push({ role: 'system', content: effectivePrompt });
        }
        apiMessages.push(...allMessages.map(m => ({ role: m.role, content: m.content })));

        // Build request body
        const body = {
          engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel || undefined, messages: apiMessages, stream: true,
          conversationId: convId,
          temperature: params.temperature, max_tokens: params.maxTokens,
        };
        if (params.thinking) { body.thinking = true; body.enable_thinking = true; }
        else { body.enable_thinking = false; }
        if (params.thinking && params.reasoningEffort) body.reasoning_effort = params.reasoningEffort;
        if (params.topP != null) body.top_p = params.topP;
        if (params.topK != null) body.top_k = params.topK;
        if (params.minP != null) body.min_p = params.minP;
        if (params.repPenalty != null) { body.repetition_penalty = params.repPenalty; body.repetition_context_size = 256; }
        if (params.seed != null) body.seed = params.seed;
        if (toolsEnabled && chatSource !== 'openrouter') body.toolsEnabled = true;

        // Start streaming BEFORE setting activeConvId (for new conversations)
        // This prevents useEffect[activeConvId] from clobbering messages with a server fetch
        setMessages(prev => [...prev, { role: 'assistant', content: '', timestamp: new Date().toISOString() }]);
        setStreaming(true);
        StreamManager.startStream(convId, body);
        // Set activeConvId last — the stream is already running, so useEffect will find it active
        if (convId !== activeConvId) setActiveConvId(convId);
        // Subscription handles real-time updates (see useEffect below)
      }

      function stopStreaming() {
        if (activeConvId) StreamManager.stop(activeConvId);
        setStreaming(false);
      }

      const filteredConvs = conversations
        .filter(c => activeProjectId ? c.projectId === activeProjectId : !c.projectId)
        .filter(c => !searchQuery || c.title?.toLowerCase().includes(searchQuery.toLowerCase()));

      // Project modal state
      const [projForm, setProjForm] = useState({ name: '', category: 'general', systemPrompt: '' });

      // Load project data into form when editing
      useEffect(() => {
        if (editingProject) {
          fetch(`/api/projects/${editingProject}`).then(r => r.json()).then(p => {
            setProjForm({ name: p.name, category: p.category, systemPrompt: p.systemPrompt || '' });
          }).catch(() => {});
        } else if (showNewProject) {
          setProjForm({ name: '', category: 'general', systemPrompt: '' });
        }
      }, [editingProject, showNewProject]);

      async function saveProject() {
        if (!projForm.name.trim()) return;
        if (editingProject) {
          const updated = await fetch(`/api/projects/${editingProject}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(projForm) }).then(r => r.json());
          setProjects(prev => prev.map(p => p.id === updated.id ? { ...p, ...updated } : p));
          setEditingProject(null);
          // Refresh full project data if editing the active project
          if (activeProjectId === editingProject) {
            fetch(`/api/projects/${editingProject}`).then(r => r.json()).then(setActiveProjectFull).catch(() => {});
          }
        } else {
          const created = await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(projForm) }).then(r => r.json());
          setProjects(prev => [created, ...prev]);
          setShowNewProject(false);
          setActiveProjectId(created.id);
          setActiveConvId(null);
        }
      }

      const showProjectModal = showNewProject || editingProject;

      return (
        <div className="flex flex-1 overflow-hidden">
          {/* Sidebar */}
          <div className="w-[240px] bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div className="p-4 pb-3 flex flex-col gap-2.5">
              <div className="flex items-center gap-2 px-2.5 py-[7px] bg-gray-100 rounded-lg">
                <span className="text-[13px] text-gray-400">🔍</span>
                <input type="text" placeholder="Search..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  className="bg-transparent text-[13px] text-gray-900 outline-none flex-1 placeholder-gray-400" />
              </div>
              <button onClick={newConversation} className="flex items-center justify-center gap-1.5 py-2 bg-exo rounded-lg text-[13px] font-semibold text-gray-900 hover:brightness-95 transition">
                + New chat
              </button>
            </div>

            {/* Projects */}
            <div className="px-3 pb-2 flex flex-col gap-1">
              <div className="flex items-center justify-between mb-0.5">
                <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Projects</span>
                <button onClick={() => setShowNewProject(true)} className="text-[11px] text-gray-400 hover:text-gray-600" title="New project">+</button>
              </div>
              <button onClick={() => { setActiveProjectId(null); setActiveConvId(null); }}
                className={`text-left px-2.5 py-1.5 rounded-md text-[12px] transition-colors ${!activeProjectId ? 'bg-gray-100 font-semibold text-gray-900' : 'text-gray-500 hover:bg-gray-50'}`}>
                💬 All Chats
              </button>
              {projects.map(p => (
                <div key={p.id} className={`flex items-center gap-1 group rounded-md transition-colors ${activeProjectId === p.id ? 'bg-gray-100' : 'hover:bg-gray-50'}`}>
                  <button onClick={() => { setActiveProjectId(p.id); setActiveConvId(null); }}
                    className={`flex-1 text-left px-2.5 py-1.5 text-[12px] truncate ${activeProjectId === p.id ? 'font-semibold text-gray-900' : 'text-gray-600'}`}>
                    {p.icon} {p.name}
                  </button>
                  <button onClick={e => { e.stopPropagation(); setEditingProject(p.id); }} className="hidden group-hover:block text-[10px] text-gray-400 hover:text-gray-600 pr-1" title="Edit">⚙</button>
                  <button onClick={async e => {
                    e.stopPropagation();
                    if (!confirm(`Delete project "${p.name}"? Conversations will be kept.`)) return;
                    await fetch(`/api/projects/${p.id}`, { method: 'DELETE' });
                    setProjects(prev => prev.filter(x => x.id !== p.id));
                    if (activeProjectId === p.id) setActiveProjectId(null);
                  }} className="hidden group-hover:block text-[10px] text-gray-400 hover:text-red-500 pr-2" title="Delete">✕</button>
                </div>
              ))}
            </div>
            <div className="mx-3 border-t border-gray-100" />

            <div className="flex-1 flex flex-col px-2 pt-1 gap-0.5 overflow-y-auto">
              {filteredConvs.map(c => (
                <button key={c.id} onClick={() => setActiveConvId(c.id)}
                  className={`text-left px-3 py-2.5 rounded-lg flex flex-col gap-1 group transition-colors ${
                    activeConvId === c.id ? 'bg-gray-100 border-l-[3px] border-exo' : 'hover:bg-gray-50'
                  }`}>
                  <div className="flex justify-between items-center">
                    {renamingId === c.id ? (
                      <input type="text" value={renameValue} autoFocus
                        onChange={e => setRenameValue(e.target.value)}
                        onBlur={async () => {
                          if (renameValue.trim()) {
                            await fetch(`/api/conversations/${c.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: renameValue.trim() }) });
                            setConversations(prev => prev.map(x => x.id === c.id ? { ...x, title: renameValue.trim() } : x));
                          }
                          setRenamingId(null);
                        }}
                        onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') setRenamingId(null); }}
                        onClick={e => e.stopPropagation()}
                        className="text-[13px] font-medium text-gray-900 bg-white border border-exo rounded px-1 py-0 outline-none w-full" />
                    ) : (
                      <span onDoubleClick={e => { e.stopPropagation(); setRenamingId(c.id); setRenameValue(c.title || ''); }}
                        className={`text-[13px] truncate max-w-[150px] flex items-center gap-1 ${activeConvId === c.id ? 'font-semibold text-gray-900' : 'font-medium text-gray-700'}`}>
                        {c.pinned && <span className="text-[10px] text-gray-400 mr-0.5">📌</span>}
                        {StreamManager.isActive(c.id) && <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse flex-shrink-0" />}
                        {c.title || 'New conversation'}
                      </span>
                    )}
                    <span className="text-[11px] text-gray-400">{timeAgo(c.updatedAt)}</span>
                  </div>
                  {c.lastMessage && <span className="text-[12px] text-gray-400 truncate">{c.lastMessage}</span>}
                  <div className="hidden group-hover:flex flex-col gap-1 mt-0.5">
                    <div className="flex justify-between items-center">
                      <div className="flex gap-2">
                        <button onClick={e => { e.stopPropagation(); togglePin(c.id); }}
                          className={`text-[10px] ${c.pinned ? 'text-amber-500' : 'text-gray-400'} hover:text-amber-600`}>{c.pinned ? 'Unpin' : 'Pin'}</button>
                        <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'md')); }}
                          className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ MD</button>
                        <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'json')); }}
                          className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ JSON</button>
                      </div>
                      <button onClick={e => { e.stopPropagation(); deleteConversation(c.id); }}
                        className="text-[10px] text-red-400 hover:text-red-600">Delete</button>
                    </div>
                    {projects.length > 0 && (
                      <select value={c.projectId || ''} onClick={e => e.stopPropagation()} onChange={async e => {
                        e.stopPropagation();
                        const newProjectId = e.target.value || null;
                        await fetch(`/api/conversations/${c.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ projectId: newProjectId }) });
                        setConversations(prev => prev.map(x => x.id === c.id ? { ...x, projectId: newProjectId } : x));
                      }} className="text-[10px] text-gray-500 bg-gray-50 border border-gray-200 rounded px-1.5 py-0.5 w-full cursor-pointer">
                        <option value="">No project</option>
                        {projects.map(p => <option key={p.id} value={p.id}>{p.icon} {p.name}</option>)}
                      </select>
                    )}
                  </div>
                </button>
              ))}
              {filteredConvs.length === 0 && (
                <div className="text-center py-8 text-gray-400 text-sm">No conversations yet</div>
              )}
            </div>

            {/* Multimodal info box (dismissible) */}
            {!hideMultimodalInfo && (
              <div className="mx-3 mb-3 mt-2 px-3 py-2.5 bg-amber-50 border border-amber-200 rounded-lg relative">
                <button onClick={() => { setHideMultimodalInfo(true); localStorage.setItem('exoscopy-hide-multimodal-info', '1'); }}
                  className="absolute top-1.5 right-1.5 w-4 h-4 flex items-center justify-center text-gray-400 hover:text-gray-700 text-[11px]"
                  title="Dismiss">×</button>
                <div className="text-[11px] text-gray-700 leading-relaxed pr-3">
                  <span className="font-semibold text-gray-900">Multimodal inference</span>
                  <br />Attach images or PDFs when using a vision model (Gemma, Qwen-VL, Kimi-VL). Requires exo v1.0.70+ on your cluster — see Help for details.
                </div>
              </div>
            )}
          </div>

          {/* Chat area */}
          <div className="flex-1 flex flex-col bg-[#f9fafb]">
            {/* Chat header */}
            <div className="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 flex-shrink-0">
              <div className="flex items-center gap-3">
                {/* Source toggle: exo / openrouter (only show if API key configured) */}
                {settings?.openRouterApiKey && (
                  <div className="flex border border-gray-200 rounded-lg overflow-hidden mr-1">
                    <button onClick={() => setChatSource('exo')}
                      className={`px-2 py-1 text-[10px] font-medium ${chatSource === 'exo' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-400 hover:bg-gray-50'}`}>EXO</button>
                    <button onClick={() => setChatSource('openrouter')}
                      className={`px-2 py-1 text-[10px] font-medium ${chatSource === 'openrouter' ? 'bg-indigo-100 font-semibold text-indigo-600' : 'text-gray-400 hover:bg-gray-50'}`}>Cloud</button>
                  </div>
                )}
                {userRole === 'user' || userRole === 'guest' ? (
                  activeModels.length === 0 ? (
                    <div className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-gray-50 text-gray-400 max-w-[350px]">
                      No model loaded
                    </div>
                  ) : (
                    <select value={activeModels.includes(selectedModel) ? selectedModel : activeModels[0]}
                      onChange={e => { setSelectedModel(e.target.value); localStorage.setItem(`exoscopy-last-model-${chatSource}`, e.target.value); }}
                      className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-900 outline-none max-w-[350px]">
                      {activeModels.map(id => {
                        const m = models.find(mm => mm.id === id);
                        return <option key={id} value={id}>⚡ {m?.vision ? '👁 ' : ''}{id}</option>;
                      })}
                    </select>
                  )
                ) : (
                  <select value={selectedModel} onChange={e => { setSelectedModel(e.target.value); localStorage.setItem(`exoscopy-last-model-${chatSource}`, e.target.value); }}
                    className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-900 outline-none max-w-[350px]">
                    {modelGroups ? (
                      Object.entries(modelGroups).sort(([a],[b]) => a.localeCompare(b)).map(([group, gModels]) => (
                        <optgroup key={group} label={group.charAt(0).toUpperCase() + group.slice(1)}>
                          {gModels.map(m => (
                            <option key={m.id} value={m.id}>{m.id.split('/').slice(1).join('/')}</option>
                          ))}
                        </optgroup>
                      ))
                    ) : (
                      models.map(m => (
                        <option key={m.id} value={m.id}>{activeModels.includes(m.id) ? '⚡ ' : ''}{m.vision ? '👁 ' : ''}{m.id}</option>
                      ))
                    )}
                    {models.length === 0 && <option value="">{chatSource === 'openrouter' ? 'Add API key in Settings' : 'No models available'}</option>}
                  </select>
                )}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                  {['creative', 'normal', 'code'].map(p => (
                    <button key={p} onClick={() => applyPreset(p)}
                      className={`px-3 py-1 text-xs font-medium capitalize transition-colors ${
                        preset === p ? 'bg-exo text-gray-900 font-semibold' : 'text-gray-500 hover:bg-gray-50'
                      }`}>{p === 'creative' ? 'Creative' : p === 'normal' ? 'Normal' : 'Code'}</button>
                  ))}
                </div>
                <button onClick={() => setShowSettings(!showSettings)}
                  className={`px-2.5 py-1 border rounded-lg text-xs font-medium transition-colors ${showSettings ? 'border-exo bg-exo/10 text-gray-900' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}>
                  ⚙ Inference Settings
                </button>
              </div>
            </div>

            {/* Inference Settings Panel */}
            {showSettings && (
              <div className="bg-white border-b border-gray-200 px-6 py-5">
                <div className="flex justify-between items-center mb-4">
                  <span className="text-[15px] font-bold text-gray-900">Inference Settings</span>
                  <button onClick={() => setShowSettings(false)} className="text-gray-400 text-lg hover:text-gray-600">×</button>
                </div>
                <div className="flex gap-6 mb-4">
                  {/* Col 1: Generation */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Generation</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Temperature</span><span className="mono text-xs text-gray-900 font-medium">{params.temperature.toFixed(2)}</span></div>
                      <input type="range" min="0" max="2" step="0.05" value={params.temperature} onChange={e => setParams(p => ({ ...p, temperature: parseFloat(e.target.value) }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Max tokens</span>
                      <input type="number" value={params.maxTokens} onChange={e => setParams(p => ({ ...p, maxTokens: parseInt(e.target.value) || 32768 }))} className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white" />
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-xs text-gray-700 font-medium">Thinking</span>
                      <button onClick={() => setParams(p => ({ ...p, thinking: !p.thinking }))} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${params.thinking ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                    {params.thinking && (
                      <div className="flex flex-col gap-1.5">
                        <span className="text-xs text-gray-700 font-medium">Reasoning effort</span>
                        <select value={params.reasoningEffort} onChange={e => setParams(p => ({ ...p, reasoningEffort: e.target.value }))} className="text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white">
                          {['none','minimal','low','medium','high','xhigh'].map(v => <option key={v} value={v}>{v}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 2: Sampling */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Sampling</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Top P</span><span className="mono text-xs text-gray-400">{params.topP ?? '—'}</span></div>
                      <input type="range" min="0" max="1" step="0.05" value={params.topP ?? 0} onChange={e => setParams(p => ({ ...p, topP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Top K</span>
                      <input type="number" value={params.topK ?? ''} onChange={e => setParams(p => ({ ...p, topK: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Min P</span><span className="mono text-xs text-gray-400">{params.minP ?? '—'}</span></div>
                      <input type="range" min="0" max="0.5" step="0.01" value={params.minP ?? 0} onChange={e => setParams(p => ({ ...p, minP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 3: Penalties & Seed */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Penalties & Seed</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Rep. penalty</span><span className="mono text-xs text-gray-400">{params.repPenalty ?? '—'}</span></div>
                      <input type="range" min="1" max="2" step="0.05" value={params.repPenalty ?? 1} onChange={e => setParams(p => ({ ...p, repPenalty: parseFloat(e.target.value) > 1 ? parseFloat(e.target.value) : null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Seed</span>
                      <input type="number" value={params.seed ?? ''} onChange={e => setParams(p => ({ ...p, seed: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-xs text-gray-700 font-medium">🌐 Web Tools</span>
                      <button onClick={() => setToolsEnabled(t => !t)} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${toolsEnabled ? 'bg-indigo-500 justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                  </div>
                </div>
                {/* System prompt */}
                <div className="border-t border-gray-100 pt-4">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">System Prompt</span>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] text-gray-400">{systemPromptEnabled ? 'included' : 'not included'}</span>
                      <button onClick={() => setSystemPromptEnabled(!systemPromptEnabled)} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${systemPromptEnabled ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                  </div>
                  <div className="flex gap-2 items-start">
                    <div className="flex flex-col gap-1 flex-shrink-0">
                      <select value={selectedPromptIdx} onChange={e => {
                        const idx = parseInt(e.target.value);
                        setSelectedPromptIdx(idx);
                        if (idx >= 0 && savedPrompts[idx]) setSystemPrompt(savedPrompts[idx].content);
                      }} className="text-xs px-2.5 py-2 border border-gray-200 rounded-lg bg-white">
                        <option value={-1}>Custom</option>
                        {savedPrompts.map((p, i) => <option key={i} value={i}>{p.name}</option>)}
                      </select>
                      {selectedPromptIdx >= 0 && (
                        <div className="flex gap-1">
                          <button onClick={() => {
                            const p = savedPrompts[selectedPromptIdx];
                            if (!p) return;
                            const newName = prompt('Rename prompt:', p.name);
                            if (!newName || newName === p.name) return;
                            const updated = savedPrompts.map((sp, i) => i === selectedPromptIdx ? { ...sp, name: newName } : sp);
                            setSavedPrompts(updated);
                            localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));
                          }} className="px-1.5 py-0.5 text-[11px] text-gray-400 hover:text-gray-600" title="Rename">✏️</button>
                          <button onClick={() => {
                            const p = savedPrompts[selectedPromptIdx];
                            if (!p || !confirm(`Delete "${p.name}"?`)) return;
                            const updated = savedPrompts.filter((_, i) => i !== selectedPromptIdx);
                            setSavedPrompts(updated);
                            localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));
                            setSelectedPromptIdx(-1);
                            setSystemPrompt('');
                          }} className="px-1.5 py-0.5 text-[11px] text-gray-400 hover:text-red-500" title="Delete">🗑</button>
                        </div>
                      )}
                    </div>
                    <textarea value={systemPrompt} onChange={e => setSystemPrompt(e.target.value)}
                      placeholder="You are a helpful assistant..."
                      className="flex-1 text-xs px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 resize-none h-[120px] overflow-y-auto" />
                    <div className="flex flex-col gap-1 flex-shrink-0">
                      <button onClick={() => {
                        if (!systemPrompt.trim()) return;
                        if (selectedPromptIdx >= 0 && savedPrompts[selectedPromptIdx]) {
                          const updated = savedPrompts.map((sp, i) => i === selectedPromptIdx ? { ...sp, content: systemPrompt } : sp);
                          setSavedPrompts(updated);
                          localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));
                          return;
                        }
                        const name = prompt('Prompt name:');
                        if (!name) return;
                        const updated = [...savedPrompts.filter(p => p.name !== name), { name, content: systemPrompt }];
                        setSavedPrompts(updated);
                        localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));
                        setSelectedPromptIdx(updated.length - 1);
                      }} className="px-3 py-2 bg-exo rounded-lg text-xs font-semibold text-gray-900 flex-shrink-0 hover:brightness-95">Save</button>
                      <button onClick={() => {
                        const blob = new Blob([JSON.stringify(savedPrompts, null, 2)], { type: 'application/json' });
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'exoscopy-prompts.json'; a.click();
                      }} className="px-2 py-2 border border-gray-200 rounded-lg text-gray-400 hover:text-gray-600 flex-shrink-0" title="Export prompts">
                        {Icons.download('#9ca3af')}
                      </button>
                      <button onClick={() => {
                        const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                        input.onchange = (e) => {
                          const reader = new FileReader();
                          reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); setSavedPrompts(d); localStorage.setItem('exoscopy-system-prompts', JSON.stringify(d)); } catch(e){} };
                          reader.readAsText(e.target.files[0]);
                        };
                        input.click();
                      }} className="px-2 py-2 border border-gray-200 rounded-lg text-gray-400 hover:text-gray-600 flex-shrink-0" title="Import prompts">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Messages */}
            <div className="flex-1 overflow-y-auto">
              <div className="max-w-[720px] mx-auto flex flex-col gap-5 py-6 px-4">
                {activeProjectFull && (
                  <div className="flex items-center gap-2 px-3 py-2 bg-indigo-50 rounded-lg border border-indigo-100 mb-2">
                    <span className="text-sm">{activeProject?.icon}</span>
                    <span className="text-xs font-medium text-indigo-600">{activeProjectFull.name}</span>
                    {activeProjectFull.systemPrompt && <span className="text-[10px] text-indigo-400">System prompt active</span>}
                  </div>
                )}
                {messages.length === 0 && !activeConvId && (
                  <div className="flex flex-col items-center justify-center py-20 gap-4">
                    <h2 className="text-2xl font-bold text-gray-900">ExoScopy</h2>
                    <p className="text-gray-400 text-sm">{activeProjectFull ? `Start a conversation in ${activeProjectFull.name}` : 'Select a model to get started.'}</p>
                  </div>
                )}
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    {msg.role === 'user' ? (
                      <div className="relative group/user pl-10">
                        <div className="max-w-[520px] px-4 py-3 bg-gray-100 rounded-2xl rounded-br-sm">
                          {Array.isArray(msg.content) ? (
                            <div className="flex flex-col gap-2">
                              {msg.content.map((part, pi) => {
                                if (part.type === 'text' && part.text) {
