<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExoScopy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="marked.min.js"></script>
  <style>
    body { background: #030712; color: #f9fafb; font-family: ui-sans-serif, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111827; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const socket = io();

    // ─── Placeholder UI — full UI coming from Stitch ──────────
    function App() {
      const [version, setVersion] = useState('');
      const [settings, setSettings] = useState(null);

      useEffect(() => {
        fetch('/api/settings').then(r => r.json()).then(d => {
          setVersion(d.version || '');
          setSettings(d);
        }).catch(() => {});
      }, []);

      return (
        <div className="h-screen flex flex-col items-center justify-center gap-6">
          <div className="text-center">
            <h1 className="text-4xl font-bold text-white tracking-tight">ExoScopy</h1>
            <p className="text-gray-500 mt-2 text-sm">See your cluster. Run your models.</p>
            {version && <p className="text-gray-700 text-xs mt-1">v{version}</p>}
          </div>

          {settings && !settings.setupComplete && (
            <div className="bg-gray-900 border border-indigo-500/30 rounded-xl px-8 py-6 text-center max-w-sm">
              <div className="text-indigo-400 font-medium mb-2">Setup required</div>
              <p className="text-gray-400 text-sm mb-4">No EXO nodes configured yet. Run node discovery to get started.</p>
              <button
                onClick={() => fetch('/api/discover').then(r => r.json()).then(d => console.log('Discovered:', d))}
                className="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg transition-colors"
              >
                Discover nodes
              </button>
            </div>
          )}

          <p className="text-gray-700 text-xs">UI in progress — backend ready</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
