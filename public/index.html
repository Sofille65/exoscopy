<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const socket = io();

    // ═══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════

    // Render markdown — same approach as Model Manager (simple, reliable)
    const renderMd = (text) => {
      if (!text) return '';
      let t = text.replace(/\\n/g, '\n');
      // Handle think blocks before markdown
      t = t.replace(/<think>([\s\S]*?)<\/think>/g, (_, content) => {
        return `<details class="think-block"><summary>Thinking... (click to expand)</summary><div class="think-content">${content}</div></details>`;
      });
      try {
        if (typeof marked !== 'undefined') {
          const fn = typeof marked.parse === 'function' ? marked.parse : marked;
          return fn(t, { breaks: true, gfm: true });
        }
      } catch (e) {}
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d`;
      return new Date(dateStr).toLocaleDateString('en', { month: 'short', day: 'numeric' });
    }

    // Extract code blocks from markdown text
    function extractCodeBlocks(text) {
      const blocks = [];
      const regex = /```(\w*)\n([\s\S]*?)```/g;
      const lines = text.split('\n');
      let match;
      while ((match = regex.exec(text)) !== null) {
        const lang = match[1] || 'txt';
        const code = match[2];
        // Try to detect filename from line before the code block
        const beforeIdx = text.substring(0, match.index).split('\n').length - 2;
        let filename = null;
        if (beforeIdx >= 0 && lines[beforeIdx]) {
          const line = lines[beforeIdx].trim();
          const fnMatch = line.match(/^(?:\*\*)?`?([a-zA-Z0-9_\-]+\.[a-zA-Z0-9]+)`?(?:\*\*)?$/);
          if (fnMatch) filename = fnMatch[1];
        }
        if (!filename) filename = `file-${blocks.length + 1}.${lang === 'javascript' ? 'js' : lang === 'python' ? 'py' : lang === 'typescript' ? 'ts' : lang || 'txt'}`;
        blocks.push({ filename, lang, code });
      }
      return blocks;
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function downloadAllAsZip(blocks) {
      const zip = new JSZip();
      const names = {};
      for (const b of blocks) {
        let name = b.filename;
        if (names[name]) { const ext = name.split('.').pop(); name = name.replace(`.${ext}`, `-${names[name]}.${ext}`); }
        names[b.filename] = (names[b.filename] || 0) + 1;
        zip.file(name, b.code);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'code-blocks.zip'; a.click();
      URL.revokeObjectURL(url);
    }

    function exportConversation(conv, messages, format = 'md') {
      if (format === 'md') {
        let md = `# ${conv.title || 'Conversation'}\n\n`;
        md += `Model: ${conv.model || '—'}\nDate: ${new Date(conv.createdAt).toLocaleString()}\n\n---\n\n`;
        for (const m of messages) {
          md += m.role === 'user' ? `**User:**\n${m.content}\n\n` : `**Assistant:**\n${m.content}\n\n---\n\n`;
        }
        downloadFile(`${conv.title || 'conversation'}.md`, md);
      } else {
        downloadFile(`${conv.title || 'conversation'}.json`, JSON.stringify({ ...conv, messages }, null, 2));
      }
    }

    // Clipboard copy that works on HTTP (not just HTTPS)
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        copyToClipboard(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    // SVG Icons — clean, minimal, 14px
    const Icons = {
      trash: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      eye: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      eyeOff: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
      copy: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
      download: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      key: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
      lock: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      save: (color = 'currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
    };

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '—';
      if (bytes < 1073741824) return `${Math.round(bytes / 1048576)} MB`;
      return `${Math.round(bytes / 1073741824)} GB`;
    }

    function formatGB(sizeKb) {
      if (!sizeKb) return '—';
      return `${(sizeKb / 1048576).toFixed(0)} GB`;
    }

    // ═══════════════════════════════════════════════════════════════════
    // NAV BAR
    // ═══════════════════════════════════════════════════════════════════

    function HelpModal({ onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl border border-gray-200 w-[700px] max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center px-6 py-4 border-b border-gray-200 sticky top-0 bg-white rounded-t-2xl">
              <span className="text-lg font-bold text-gray-900">ExoScopy — User Guide</span>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">×</button>
            </div>
            <div className="px-6 py-5 text-sm text-gray-700 flex flex-col gap-6">

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">What is ExoScopy?</h3>
                <p className="leading-relaxed">ExoScopy is a web dashboard for <a href="https://github.com/exo-explore/exo" target="_blank" className="text-indigo-500 underline">exo</a> — the open-source framework that turns Apple Silicon Macs into a distributed AI inference cluster. It gives you a clean interface to chat with your models, monitor your cluster, manage models across nodes, and download new ones from HuggingFace.</p>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Getting Started</h3>
                <ol className="list-decimal ml-5 flex flex-col gap-1.5">
                  <li>Go to <strong>Settings</strong> and add your EXO nodes (name + IP address)</li>
                  <li>Click <strong>Re-discover</strong> to automatically find exo nodes on your network</li>
                  <li>Set the <strong>EXO Endpoint</strong> (IP of your master node, port 52415)</li>
                  <li>Click <strong>Test</strong> to verify connectivity</li>
                  <li>For model sync between nodes: enter passwords and click <strong>Setup SSH Keys</strong></li>
                </ol>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Chat</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li><strong>New chat</strong> — click "+ New chat" in the sidebar</li>
                  <li><strong>Model selector</strong> — dropdown shows installed models (⚡ = currently loaded)</li>
                  <li><strong>Presets</strong> — Creative (temp 1.2), Normal (temp 0.7), Code (temp 0.2)</li>
                  <li><strong>Inference Settings</strong> — full parameter control (temperature, top_p, top_k, min_p, repetition penalty, seed, thinking mode)</li>
                  <li><strong>System Prompt</strong> — toggle ON/OFF, save multiple prompts, export/import as JSON</li>
                  <li><strong>File attachments</strong> — 📎 button to attach .py, .js, .md, .json and more — injected as code blocks</li>
                  <li><strong>Multi-turn editing</strong> — hover a user message → pencil icon → edit and regenerate from that point</li>
                  <li><strong>Thinking mode</strong> — enable in Inference Settings, thinking blocks shown in real-time during streaming</li>
                  <li><strong>Stats</strong> — TTFT, speed (tk/s), tokens, generation time, chunks shown after each response with Copy button</li>
                  <li><strong>Copy / Save</strong> — hover over a response to copy markdown or save as .md file</li>
                  <li><strong>Code blocks</strong> — save individual files or all as .zip</li>
                  <li><strong>Pin conversations</strong> — hover a conversation → Pin/Unpin (pinned stay on top)</li>
                  <li><strong>Export</strong> — hover a conversation in sidebar → ↓ MD or ↓ JSON</li>
                  <li><strong>Keyboard</strong> — Enter to send, Shift+Enter for new line, Cmd+K / Ctrl+K for new chat</li>
                </ul>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Dashboard</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li><strong>Status bar</strong> — shows running model, select + load/unload models, Pipeline/Tensor sharding</li>
                  <li><strong>Model matrix</strong> — models × nodes. ✓ = installed, — = missing</li>
                  <li><strong>Sync</strong> — click "Sync" to rsync a model from one node to others via SSH</li>
                  <li><strong>Delete</strong> — click trash icons to select, then "Delete" to remove from nodes</li>
                  <li><strong>Activity</strong> — active downloads, sync progress, queue, history</li>
                  <li><strong>Cluster nodes</strong> — RAM usage, GPU%, temperature, watts, SSD free space per node</li>
                </ul>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Downloads</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li><strong>Search</strong> — search HuggingFace for MLX models (exo qualified only)</li>
                  <li><strong>Filters</strong> — Quant and Parameters dropdowns, dynamically cross-filtered from results</li>
                  <li><strong>Sort</strong> — by Popularity, Date, Likes, or Size (↑↓ direction)</li>
                  <li><strong>Download mode</strong> — "Node 1 only" or "Distributed" (auto-rsync to all nodes after download)</li>
                  <li><strong>Direct download</strong> — paste a HuggingFace repo ID (e.g. mlx-community/ModelName) and click ↓</li>
                  <li><strong>Download queue</strong> — max 3 concurrent downloads, progress bar at bottom of page</li>
                  <li><strong>Persistent search</strong> — results stay when switching pages, "Clear results" to reset</li>
                  <li><strong>HF link</strong> — click the ↗ icon on any result to view on HuggingFace</li>
                </ul>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Settings</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li><strong>Nodes</strong> — add/remove EXO cluster nodes</li>
                  <li><strong>Re-discover</strong> — scan your LAN for exo nodes (port 52415)</li>
                  <li><strong>SSH Keys</strong> — enter passwords per node, click "Setup SSH Keys" to install keys (container + inter-node)</li>
                  <li><strong>Config Check</strong> — verify SSH, exo API, Python, huggingface_hub, rsync, model path, disk free per node</li>
                  <li><strong>EXO Endpoint</strong> — IP and port of your exo master node</li>
                  <li><strong>OpenRouter</strong> — optional cloud fallback. Add your API key (sk-or-...) to access cloud models (GPT-4, Claude, Gemini, etc.) alongside local exo models</li>
                </ul>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">OpenRouter (Cloud)</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li>Go to <strong>Settings</strong> → enter your OpenRouter API key → <strong>Save Settings</strong></li>
                  <li>In <strong>Chat</strong>, an <strong>EXO / Cloud</strong> toggle appears next to the model dropdown</li>
                  <li>Switch to <strong>Cloud</strong> to browse models from OpenAI, Anthropic, Google, Meta, Mistral, and more</li>
                  <li>Models are grouped by provider in the dropdown for easy browsing</li>
                  <li>No toggle shown if no API key is configured — exo-only by default</li>
                  <li>Get your API key at <a href="https://openrouter.ai" target="_blank" className="text-indigo-500 underline">openrouter.ai</a></li>
                </ul>
              </div>

              <div>
                <h3 className="font-semibold text-gray-900 text-base mb-2">Tips</h3>
                <ul className="list-disc ml-5 flex flex-col gap-1">
                  <li>exo's native dashboard is available via the <strong>↗ exo Dashboard</strong> link in the nav bar</li>
                  <li>Thinking mode (Qwen3.5) is OFF by default — enable in Inference Settings if needed</li>
                  <li>Models must be installed on ALL nodes to be loaded on the cluster — use Sync to distribute</li>
                  <li>The download queue supports max 3 concurrent downloads from HuggingFace</li>
                </ul>
              </div>

              <div className="text-xs text-gray-400 border-t border-gray-100 pt-4">
                ExoScopy v1.2.0 — <a href="https://github.com/Sofille65/exoscopy" target="_blank" className="text-indigo-400 underline">GitHub</a> · Built for <a href="https://github.com/exo-explore/exo" target="_blank" className="text-indigo-400 underline">exo</a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function NavBar({ page, setPage, version, clusterStatus, showHelp, setShowHelp, user, onLogout }) {
      const allPages = ['Chat', 'Dashboard', 'Downloads', 'Settings'];
      const pages = user?.role === 'guest' ? ['Chat'] :
                    user?.role === 'user' ? ['Chat'] :
                    user?.role === 'organizer' ? ['Chat', 'Dashboard'] :
                    allPages;
      const onlineCount = clusterStatus?.nodes?.filter(n => n.online)?.length || 0;
      const totalCount = clusterStatus?.nodes?.length || 0;

      return (
        <div className="flex items-center justify-between px-6 h-[52px] bg-white border-b border-gray-200 flex-shrink-0">
          <div className="flex items-center gap-3">
            <img src="logo.png" alt="" className="w-6 h-6" />
            <span className="text-[17px] font-bold text-gray-900 tracking-tight">ExoScopy</span>
            {version && <span className="text-[11px] text-gray-400 font-medium">v{version}</span>}
          </div>
          <div className="flex items-center gap-1">
            {pages.map(p => (
              <button key={p} onClick={() => setPage(p)}
                className={`px-3.5 py-1.5 text-[13px] rounded-md transition-colors ${
                  page === p ? 'font-semibold text-indigo-500 bg-indigo-50' : 'font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}>
                {p}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-4">
            {totalCount > 0 && (
              <div className="flex items-center gap-1.5">
                <div className={`w-[7px] h-[7px] rounded-full ${onlineCount === totalCount ? 'bg-emerald-500' : onlineCount > 0 ? 'bg-yellow-500' : 'bg-red-500'}`} />
                <span className="text-xs text-gray-500 font-medium">{onlineCount}/{totalCount} online</span>
              </div>
            )}
            <button onClick={() => setShowHelp(true)}
              className="flex items-center gap-1 px-2 py-1 border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </button>
            <a href={clusterStatus?.dashboardURL || '#'} target="_blank" rel="noopener"
              className="flex items-center gap-1.5 px-2.5 py-1 border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
              <span className="text-[11px]">↗</span>
              <span className="text-xs text-gray-500">exo Dashboard</span>
            </a>
            {user && (
              <div className="flex items-center gap-2 pl-2 border-l border-gray-200">
                <span className="text-xs text-gray-500">{user.username}</span>
                {user.role === 'admin' && <span className="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-medium">Admin</span>}
                {user.role === 'organizer' && <span className="text-[10px] bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded font-medium">Organizer</span>}
                {user.role === 'guest' && user.tokenLimit && (
                  <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                    (user.tokensUsed || 0) >= user.tokenLimit ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-500'
                  }`}>{((user.tokensUsed || 0) / 1000).toFixed(1)}k / {(user.tokenLimit / 1000).toFixed(0)}k tokens</span>
                )}
                <button onClick={onLogout} className="text-xs text-gray-400 hover:text-red-500 transition-colors">Logout</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // CHAT PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ChatPage({ clusterStatus, settings, userRole }) {
      const [conversations, setConversations] = useState([]);
      const [activeConvId, setActiveConvId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [attachedFiles, setAttachedFiles] = useState([]);
      const [streaming, setStreaming] = useState(false);
      const [activeModel, setActiveModel] = useState(null);
      const [models, setModels] = useState([]);
      const [modelGroups, setModelGroups] = useState(null);
      const [chatSource, setChatSource] = useState('exo'); // 'exo' or 'openrouter'
      const [selectedModel, setSelectedModel] = useState('');
      const [preset, setPreset] = useState('normal');
      const [showSettings, setShowSettings] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [renamingId, setRenamingId] = useState(null);
      const [renameValue, setRenameValue] = useState('');
      const [params, setParams] = useState({ temperature: 0.7, maxTokens: 32768, thinking: false, reasoningEffort: 'medium', topP: null, topK: null, minP: null, repPenalty: null, seed: null });
      const [systemPrompt, setSystemPrompt] = useState('');
      const [systemPromptEnabled, setSystemPromptEnabled] = useState(false);
      const [savedPrompts, setSavedPrompts] = useState([]);

      // Load saved prompts from localStorage (personal, not shared)
      useEffect(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('exoscopy-system-prompts') || '[]');
          setSavedPrompts(saved);
        } catch (e) {}
      }, []);
      const [selectedPromptIdx, setSelectedPromptIdx] = useState(-1);
      const statsMapRef = useRef({}); // convId-msgIdx → stats
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);
      const fileInputRef = useRef(null);
      const abortRef = useRef(null);
      const [expandedEditor, setExpandedEditor] = useState(false);

      // Auto-resize textarea
      const autoResize = useCallback(() => {
        const el = inputRef.current;
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 200) + 'px';
        el.style.overflowY = el.scrollHeight > 200 ? 'auto' : 'hidden';
      }, []);
      useEffect(() => { autoResize(); }, [input, autoResize]);

      const PRESETS = {
        creative: { temperature: 1.2, topP: 0.95, topK: null, minP: null, maxTokens: 32768, thinking: false },
        normal: { temperature: 0.7, topP: null, topK: null, minP: null, maxTokens: 32768, thinking: false },
        code: { temperature: 0.2, topP: 0.9, topK: 50, minP: 0.05, maxTokens: 65536, thinking: false },
      };

      // Load conversations
      useEffect(() => {
        fetch('/api/conversations').then(r => r.json()).then(setConversations).catch(() => {});
      }, []);

      // Load models when source changes
      useEffect(() => {
        const engineKey = chatSource === 'openrouter' ? 'openrouter' : 'exo1';
        setModels([]); setModelGroups(null);
        Promise.all([
          fetch(`/api/chat/models?engine=${engineKey}`).then(r => r.json()),
          fetch('/api/chat/active-model?engine=exo1').then(r => r.json()),
        ]).then(([modelsData, activeData]) => {
          const modelList = modelsData.models || [];
          setModels(modelList);
          setModelGroups(modelsData.groups || null);
          if (chatSource === 'exo' && activeData.activeModel) {
            setActiveModel(activeData.activeModel);
            setSelectedModel(activeData.activeModel);
            localStorage.setItem('exoscopy-last-model', activeData.activeModel);
          } else {
            setActiveModel(chatSource === 'exo' ? (activeData.activeModel || null) : null);
            const lastModel = localStorage.getItem(`exoscopy-last-model-${chatSource}`);
            if (lastModel && modelList.find(m => m.id === lastModel)) {
              setSelectedModel(lastModel);
            } else if (modelList.length > 0) {
              setSelectedModel(modelList[0].id);
            }
          }
        }).catch(() => {});
      }, [chatSource]);

      // Load conversation messages when active changes
      useEffect(() => {
        if (!activeConvId) { setMessages([]); return; }
        fetch(`/api/conversations/${activeConvId}`).then(r => r.json()).then(d => {
          setMessages(d.messages || []);
        }).catch(() => {});
      }, [activeConvId]);

      // Auto-scroll
      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      // Apply preset
      function applyPreset(name) {
        setPreset(name);
        const p = PRESETS[name];
        setParams(prev => ({ ...prev, temperature: p.temperature, topP: p.topP, topK: p.topK, minP: p.minP, maxTokens: p.maxTokens, thinking: p.thinking }));
      }

      // File attachments
      function handleFileAttach(e) {
        const files = Array.from(e.target.files || []);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => setAttachedFiles(prev => [...prev, { name: file.name, content: ev.target.result, size: file.size }]);
          reader.readAsText(file);
        });
        e.target.value = '';
      }

      // Multi-turn edit
      async function handleEdit(msgIndex) {
        const msg = messages[msgIndex];
        if (msg.role !== 'user') return;
        setInput(msg.content);
        // Truncate messages from this point
        const truncated = messages.slice(0, msgIndex);
        setMessages(truncated);
        // Update on server
        if (activeConvId) {
          await fetch(`/api/conversations/${activeConvId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: truncated }),
          });
        }
        inputRef.current?.focus();
      }

      // Pin/unpin conversation
      async function togglePin(convId) {
        const conv = conversations.find(c => c.id === convId);
        if (!conv) return;
        await fetch(`/api/conversations/${convId}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pinned: !conv.pinned }),
        });
        setConversations(prev => prev.map(c => c.id === convId ? { ...c, pinned: !c.pinned } : c));
      }

      // Global keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); newConversation(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // Create new conversation
      async function newConversation() {
        const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel }) }).then(r => r.json());
        setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        setActiveConvId(conv.id);
        setMessages([]);
      }

      // Delete conversation
      async function deleteConversation(id) {
        await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
        setConversations(prev => prev.filter(c => c.id !== id));
        if (activeConvId === id) { setActiveConvId(null); setMessages([]); }
      }

      // Send message
      const [chatWarning, setChatWarning] = useState(null);

      async function handleSend() {
        if ((!input.trim() && !attachedFiles.length) || streaming) return;
        if (!selectedModel) {
          setChatWarning('No model selected. Please select a model from the dropdown.');
          setTimeout(() => setChatWarning(null), 5000);
          return;
        }
        // Auto-load model on exo if none is active (skip for openrouter)
        if (!activeModel && chatSource === 'exo') {
          setChatWarning(`Loading ${selectedModel.split('/').pop()} on cluster...`);
          try {
            const loadRes = await fetch('/api/monitoring/load', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ modelId: selectedModel, sharding: 'Pipeline', minNodes: 1 }),
            });
            if (loadRes.ok) {
              setActiveModel(selectedModel);
              localStorage.setItem('exoscopy-last-model', selectedModel);
              setChatWarning(null);
            } else {
              const err = await loadRes.json();
              setChatWarning(`Failed to load model: ${err.error || 'unknown error'}`);
              setTimeout(() => setChatWarning(null), 5000);
              return;
            }
          } catch (e) {
            setChatWarning(`Failed to load model: ${e.message}`);
            setTimeout(() => setChatWarning(null), 5000);
            return;
          }
        }
        let userMsg = input.trim();
        // Inject attached files as code blocks
        if (attachedFiles.length) {
          const fileBlocks = attachedFiles.map(f => {
            const ext = f.name.split('.').pop();
            return `**[${f.name}]**\n\`\`\`${ext}\n${f.content}\n\`\`\``;
          }).join('\n\n');
          userMsg = fileBlocks + (userMsg ? '\n\n' + userMsg : '');
          setAttachedFiles([]);
        }
        setInput('');

        let convId = activeConvId;
        if (!convId) {
          const conv = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel }) }).then(r => r.json());
          convId = conv.id;
          setActiveConvId(convId);
          setConversations(prev => [{ ...conv, messageCount: 0, lastMessage: null }, ...prev]);
        }

        const userMessage = { role: 'user', content: userMsg, timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, userMessage]);

        const allMessages = [...messages, userMessage];
        const apiMessages = [];
        if (systemPromptEnabled && systemPrompt) {
          apiMessages.push({ role: 'system', content: systemPrompt });
        }
        apiMessages.push(...allMessages.map(m => ({ role: m.role, content: m.content })));

        setStreaming(true);
        const assistantMsg = { role: 'assistant', content: '', timestamp: new Date().toISOString() };
        setMessages(prev => [...prev, assistantMsg]);
        const streamStartTime = Date.now();
        let firstTokenTime = null;
        let tokenCount = 0;
        let chunkCount = 0;
        let promptTokens = 0;
        let completionTokens = 0;

        try {
          const body = {
            engine: chatSource === 'openrouter' ? 'openrouter' : 'exo1', model: selectedModel || undefined, messages: apiMessages, stream: true,
            conversationId: convId,
            temperature: params.temperature, max_tokens: params.maxTokens,
          };
          if (params.thinking) { body.thinking = true; body.enable_thinking = true; }
          else { body.enable_thinking = false; }
          if (params.thinking && params.reasoningEffort) body.reasoning_effort = params.reasoningEffort;
          if (params.topP != null) body.top_p = params.topP;
          if (params.topK != null) body.top_k = params.topK;
          if (params.minP != null) body.min_p = params.minP;
          if (params.repPenalty != null) { body.repetition_penalty = params.repPenalty; body.repetition_context_size = 256; }
          if (params.seed != null) body.seed = params.seed;

          const controller = new AbortController();
          abortRef.current = controller;
          const res = await fetch('/api/chat/completions', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body), signal: controller.signal,
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let accumulated = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            for (const line of chunk.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices?.[0]?.delta;
                const textContent = delta?.content;
                const thinkContent = delta?.reasoning_content;
                if (textContent || thinkContent) {
                  if (!firstTokenTime) firstTokenTime = Date.now();
                  if (thinkContent) {
                    if (!accumulated.includes('<think>')) accumulated += '<think>';
                    accumulated += thinkContent;
                  } else if (textContent) {
                    if (accumulated.includes('<think>') && !accumulated.includes('</think>')) accumulated += '</think>';
                    accumulated += textContent;
                  }
                  chunkCount++;
                  if (parsed.usage) {
                    if (parsed.usage.completion_tokens) completionTokens = parsed.usage.completion_tokens;
                    if (parsed.usage.prompt_tokens) promptTokens = parsed.usage.prompt_tokens;
                  }
                  setMessages(prev => {
                    const updated = [...prev];
                    updated[updated.length - 1] = { ...updated[updated.length - 1], content: accumulated };
                    return updated;
                  });
                }
              } catch (e) {}
            }
          }
        } catch (e) {
          if (e.name !== 'AbortError') {
            setMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { ...updated[updated.length - 1], content: `Error: ${e.message}` };
              return updated;
            });
          }
        }
        // Calculate final stats and store by convId + message index
        const totalTime = (Date.now() - streamStartTime) / 1000;
        const ttft = firstTokenTime ? (firstTokenTime - streamStartTime) / 1000 : null;
        const genTime = firstTokenTime ? (Date.now() - firstTokenTime) / 1000 : totalTime;
        const speed = genTime > 0 && chunkCount > 0 ? (chunkCount / genTime) : 0;
        const chunkRate = genTime > 0 ? (chunkCount / genTime) : 0;
        const stats = { ttft, speed, totalTime, genTime, promptTokens, completionTokens: completionTokens || chunkCount, chunks: chunkCount, chunkRate };
        setMessages(prev => {
          const msgIdx = prev.length - 1;
          if (convId) statsMapRef.current[`${convId}-${msgIdx}`] = stats;
          return prev;
        });
        setStreaming(false);
        abortRef.current = null;
        // Refresh conversation list (but don't reload current messages — keep stats)
        fetch('/api/conversations').then(r => r.json()).then(list => {
          setConversations(list);
        }).catch(() => {});
      }

      function stopStreaming() {
        if (abortRef.current) abortRef.current.abort();
        setStreaming(false);
      }

      const filteredConvs = conversations.filter(c => !searchQuery || c.title?.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="flex flex-1 overflow-hidden">
          {/* Sidebar */}
          <div className="w-[240px] bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div className="p-4 pb-3 flex flex-col gap-2.5">
              <div className="flex items-center gap-2 px-2.5 py-[7px] bg-gray-100 rounded-lg">
                <span className="text-[13px] text-gray-400">🔍</span>
                <input type="text" placeholder="Search..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  className="bg-transparent text-[13px] text-gray-900 outline-none flex-1 placeholder-gray-400" />
              </div>
              <button onClick={newConversation} className="flex items-center justify-center gap-1.5 py-2 bg-exo rounded-lg text-[13px] font-semibold text-gray-900 hover:brightness-95 transition">
                + New chat
              </button>
            </div>
            <div className="flex-1 flex flex-col px-2 gap-0.5 overflow-y-auto">
              {filteredConvs.map(c => (
                <button key={c.id} onClick={() => setActiveConvId(c.id)}
                  className={`text-left px-3 py-2.5 rounded-lg flex flex-col gap-1 group transition-colors ${
                    activeConvId === c.id ? 'bg-gray-100 border-l-[3px] border-exo' : 'hover:bg-gray-50'
                  }`}>
                  <div className="flex justify-between items-center">
                    {renamingId === c.id ? (
                      <input type="text" value={renameValue} autoFocus
                        onChange={e => setRenameValue(e.target.value)}
                        onBlur={async () => {
                          if (renameValue.trim()) {
                            await fetch(`/api/conversations/${c.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: renameValue.trim() }) });
                            setConversations(prev => prev.map(x => x.id === c.id ? { ...x, title: renameValue.trim() } : x));
                          }
                          setRenamingId(null);
                        }}
                        onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') setRenamingId(null); }}
                        onClick={e => e.stopPropagation()}
                        className="text-[13px] font-medium text-gray-900 bg-white border border-exo rounded px-1 py-0 outline-none w-full" />
                    ) : (
                      <span onDoubleClick={e => { e.stopPropagation(); setRenamingId(c.id); setRenameValue(c.title || ''); }}
                        className={`text-[13px] truncate max-w-[150px] ${activeConvId === c.id ? 'font-semibold text-gray-900' : 'font-medium text-gray-700'}`}>
                        {c.pinned && <span className="text-[10px] text-gray-400 mr-1">📌</span>}
                        {c.title || 'New conversation'}
                      </span>
                    )}
                    <span className="text-[11px] text-gray-400">{timeAgo(c.updatedAt)}</span>
                  </div>
                  {c.lastMessage && <span className="text-[12px] text-gray-400 truncate">{c.lastMessage}</span>}
                  <div className="hidden group-hover:flex justify-between items-center mt-0.5">
                    <div className="flex gap-2">
                      <button onClick={e => { e.stopPropagation(); togglePin(c.id); }}
                        className={`text-[10px] ${c.pinned ? 'text-amber-500' : 'text-gray-400'} hover:text-amber-600`}>{c.pinned ? 'Unpin' : 'Pin'}</button>
                      <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'md')); }}
                        className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ MD</button>
                      <button onClick={e => { e.stopPropagation(); fetch(`/api/conversations/${c.id}`).then(r=>r.json()).then(d => exportConversation(d, d.messages, 'json')); }}
                        className="text-[10px] text-indigo-400 hover:text-indigo-600">↓ JSON</button>
                    </div>
                    <button onClick={e => { e.stopPropagation(); deleteConversation(c.id); }}
                      className="text-[10px] text-red-400 hover:text-red-600">Delete</button>
                  </div>
                </button>
              ))}
              {filteredConvs.length === 0 && (
                <div className="text-center py-8 text-gray-400 text-sm">No conversations yet</div>
              )}
            </div>
          </div>

          {/* Chat area */}
          <div className="flex-1 flex flex-col bg-[#f9fafb]">
            {/* Chat header */}
            <div className="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 flex-shrink-0">
              <div className="flex items-center gap-3">
                {/* Source toggle: exo / openrouter (only show if API key configured) */}
                {settings?.openRouterApiKey && (
                  <div className="flex border border-gray-200 rounded-lg overflow-hidden mr-1">
                    <button onClick={() => setChatSource('exo')}
                      className={`px-2 py-1 text-[10px] font-medium ${chatSource === 'exo' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-400 hover:bg-gray-50'}`}>EXO</button>
                    <button onClick={() => setChatSource('openrouter')}
                      className={`px-2 py-1 text-[10px] font-medium ${chatSource === 'openrouter' ? 'bg-indigo-100 font-semibold text-indigo-600' : 'text-gray-400 hover:bg-gray-50'}`}>Cloud</button>
                  </div>
                )}
                {userRole === 'user' || userRole === 'guest' ? (
                  <div className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-gray-50 text-gray-700 max-w-[350px]">
                    {activeModel ? <><span className="text-emerald-500">⚡</span> {activeModel.split('/').pop()}</> : <span className="text-gray-400">No model loaded</span>}
                  </div>
                ) : (
                  <select value={selectedModel} onChange={e => { setSelectedModel(e.target.value); localStorage.setItem(`exoscopy-last-model-${chatSource}`, e.target.value); }}
                    className="mono text-xs font-medium border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-900 outline-none max-w-[350px]">
                    {modelGroups ? (
                      Object.entries(modelGroups).sort(([a],[b]) => a.localeCompare(b)).map(([group, gModels]) => (
                        <optgroup key={group} label={group.charAt(0).toUpperCase() + group.slice(1)}>
                          {gModels.map(m => (
                            <option key={m.id} value={m.id}>{m.id.split('/').slice(1).join('/')}</option>
                          ))}
                        </optgroup>
                      ))
                    ) : (
                      models.map(m => (
                        <option key={m.id} value={m.id}>{m.id === activeModel ? '⚡ ' : ''}{m.id}</option>
                      ))
                    )}
                    {models.length === 0 && <option value="">{chatSource === 'openrouter' ? 'Add API key in Settings' : 'No models available'}</option>}
                  </select>
                )}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                  {['creative', 'normal', 'code'].map(p => (
                    <button key={p} onClick={() => applyPreset(p)}
                      className={`px-3 py-1 text-xs font-medium capitalize transition-colors ${
                        preset === p ? 'bg-exo text-gray-900 font-semibold' : 'text-gray-500 hover:bg-gray-50'
                      }`}>{p === 'creative' ? 'Creative' : p === 'normal' ? 'Normal' : 'Code'}</button>
                  ))}
                </div>
                <button onClick={() => setShowSettings(!showSettings)}
                  className={`px-2.5 py-1 border rounded-lg text-xs font-medium transition-colors ${showSettings ? 'border-exo bg-exo/10 text-gray-900' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}>
                  ⚙ Inference Settings
                </button>
              </div>
            </div>

            {/* Inference Settings Panel */}
            {showSettings && (
              <div className="bg-white border-b border-gray-200 px-6 py-5">
                <div className="flex justify-between items-center mb-4">
                  <span className="text-[15px] font-bold text-gray-900">Inference Settings</span>
                  <button onClick={() => setShowSettings(false)} className="text-gray-400 text-lg hover:text-gray-600">×</button>
                </div>
                <div className="flex gap-6 mb-4">
                  {/* Col 1: Generation */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Generation</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Temperature</span><span className="mono text-xs text-gray-900 font-medium">{params.temperature.toFixed(2)}</span></div>
                      <input type="range" min="0" max="2" step="0.05" value={params.temperature} onChange={e => setParams(p => ({ ...p, temperature: parseFloat(e.target.value) }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Max tokens</span>
                      <input type="number" value={params.maxTokens} onChange={e => setParams(p => ({ ...p, maxTokens: parseInt(e.target.value) || 32768 }))} className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white" />
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-xs text-gray-700 font-medium">Thinking</span>
                      <button onClick={() => setParams(p => ({ ...p, thinking: !p.thinking }))} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${params.thinking ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                    {params.thinking && (
                      <div className="flex flex-col gap-1.5">
                        <span className="text-xs text-gray-700 font-medium">Reasoning effort</span>
                        <select value={params.reasoningEffort} onChange={e => setParams(p => ({ ...p, reasoningEffort: e.target.value }))} className="text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white">
                          {['none','minimal','low','medium','high','xhigh'].map(v => <option key={v} value={v}>{v}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 2: Sampling */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Sampling</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Top P</span><span className="mono text-xs text-gray-400">{params.topP ?? '—'}</span></div>
                      <input type="range" min="0" max="1" step="0.05" value={params.topP ?? 0} onChange={e => setParams(p => ({ ...p, topP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Top K</span>
                      <input type="number" value={params.topK ?? ''} onChange={e => setParams(p => ({ ...p, topK: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Min P</span><span className="mono text-xs text-gray-400">{params.minP ?? '—'}</span></div>
                      <input type="range" min="0" max="0.5" step="0.01" value={params.minP ?? 0} onChange={e => setParams(p => ({ ...p, minP: parseFloat(e.target.value) || null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                  </div>
                  <div className="w-px bg-gray-100" />
                  {/* Col 3: Penalties & Seed */}
                  <div className="flex-1 flex flex-col gap-3.5">
                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Penalties & Seed</span>
                    <div className="flex flex-col gap-1.5">
                      <div className="flex justify-between"><span className="text-xs text-gray-700 font-medium">Rep. penalty</span><span className="mono text-xs text-gray-400">{params.repPenalty ?? '—'}</span></div>
                      <input type="range" min="1" max="2" step="0.05" value={params.repPenalty ?? 1} onChange={e => setParams(p => ({ ...p, repPenalty: parseFloat(e.target.value) > 1 ? parseFloat(e.target.value) : null }))} className="w-full h-1.5 bg-gray-100 rounded appearance-none accent-[#ffde00]" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-xs text-gray-700 font-medium">Seed</span>
                      <input type="number" value={params.seed ?? ''} onChange={e => setParams(p => ({ ...p, seed: parseInt(e.target.value) || null }))} placeholder="—" className="mono text-xs px-2.5 py-1.5 border border-gray-200 rounded-md bg-white placeholder-gray-400" />
                    </div>
                  </div>
                </div>
                {/* System prompt */}
                <div className="border-t border-gray-100 pt-4">

                    <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">System Prompt</span>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] text-gray-400">{systemPromptEnabled ? 'included' : 'not included'}</span>
                      <button onClick={() => setSystemPromptEnabled(!systemPromptEnabled)} className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${systemPromptEnabled ? 'bg-exo justify-end' : 'bg-gray-200'}`}>
                        <div className="w-4 h-4 bg-white rounded-full shadow-sm" />
                      </button>
                    </div>
                  </div>
                  <div className="flex gap-2 items-start">
                    <div className="flex flex-col gap-1 flex-shrink-0">
                      <select value={selectedPromptIdx} onChange={e => {
                        const idx = parseInt(e.target.value);
                        setSelectedPromptIdx(idx);
                        if (idx >= 0 && savedPrompts[idx]) setSystemPrompt(savedPrompts[idx].content);
                      }} className="text-xs px-2.5 py-2 border border-gray-200 rounded-lg bg-white">
                        <option value={-1}>Custom</option>
                        {savedPrompts.map((p, i) => <option key={i} value={i}>{p.name}</option>)}

                      {selectedPromptIdx >= 0 && (
                        <div className="flex gap-1">

                            const p = savedPrompts[selectedPromptIdx];
                            if (!p) return;
                            const newName = prompt('Rename prompt:', p.name);
                            if (!newName || newName === p.name) return;
                            const updated = savedPrompts.map((sp, i) => i === selectedPromptIdx ? { ...sp, name: newName } : sp);
                            setSavedPrompts(updated);
                            localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));
                          }} className="px-1.5 py-0.5 text-[11px] text-gray-400 hover:text-gray-600" title="Rename">✏️</button>
                          <button onClick={() => {
                            const p = savedPrompts[selectedPromptIdx];
                            if (!p || !confirm(`Delete "${p.name}"?`)) return;
                            const updated = savedPrompts.filter((_, i) => i !== selectedPromptIdx);
                            setSavedPrompts(updated);
                            localStorage.setItem('exoscopy-system-prompts', JSON.stringify(updated));

                                <div className="flex flex-col"><span className="text-gray-400">Speed</span><span className="text-emerald-500 font-medium">{s.speed?.toFixed(1)} tk/s</span></div>

                                <div className="flex flex-col"><span className="text-gray-400">Chunks</span><span className="text-gray-700 font-medium">{s.chunks}</span></div>

    // ═══════════════════════════════════════════════════════════════════
    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════════════════

    function DashboardPage({ clusterStatus, userRole }) {
      // Models state
      const [matrixData, setMatrixData] = useState({ nodes: [], models: [], matrix: {}, activeModel: null, diskInfo: {} });
      const [chatModels, setChatModels] = useState([]);
      const [loadModel, setLoadModel] = useState('');
      const [sharding, setSharding] = useState('Pipeline');
      const [loadStatus, setLoadStatus] = useState(null);
      const [modelPreview, setModelPreview] = useState(null);
      const [activeSyncs, setActiveSyncs] = useState([]);
      const [deleteSelection, setDeleteSelection] = useState(new Set());
      const [deleting, setDeleting] = useState(false);
      // Dashboard state
      const [downloads, setDownloads] = useState([]);
      const [nodeMetrics, setNodeMetrics] = useState([]);
      const [ramData, setRamData] = useState([]);

      const canManageModels = !userRole || userRole === 'admin' || userRole === 'organizer';
      const { nodes: nodeNames, models, matrix, activeModel, diskInfo } = matrixData;

      // Poll real model status from exo
      function refreshExoStatus() {
        fetch('/api/monitoring/exo-load-status').then(r => r.json()).then(d => {
          if (d.status === 'idle') {
            setLoadStatus(null);
          } else {
            setLoadStatus({ status: d.status, model: d.model, readyRunners: d.readyRunners, totalRunners: d.totalRunners, loadingTasks: d.loadingTasks });
            if (d.model && !loadModel) setLoadModel(d.model);
          }
        }).catch(() => {});
      }

      function refreshMatrix() {
        fetch('/api/models/matrix').then(r => r.json()).then(d => {
          setMatrixData(d);
        }).catch(() => {});
        fetch('/api/chat/models?engine=exo1').then(r => r.json()).then(d => setChatModels(d.models || [])).catch(() => {});
        refreshExoStatus();
      }
      function refreshSyncs() {
        fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
      }
      function refreshDashboard() {
        fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {});
        fetch('/api/monitoring/exo-node-metrics').then(r => r.json()).then(d => setNodeMetrics(d.nodes || [])).catch(() => {});
        fetch('/api/monitoring/ram').then(r => r.json()).then(setRamData).catch(() => {});
      }

      // Fast poll exo status when loading/warming (every 3s)
      useEffect(() => {
        if (loadStatus?.status === 'loading' || loadStatus?.status === 'warming') {
          const fast = setInterval(refreshExoStatus, 3000);
          return () => clearInterval(fast);
        }
      }, [loadStatus?.status]);

      useEffect(() => {
        refreshMatrix(); refreshSyncs(); refreshDashboard();
        const interval = setInterval(() => { refreshMatrix(); refreshSyncs(); refreshDashboard(); }, 10000);
        const onDlProgress = () => { fetch('/api/downloads').then(r => r.json()).then(setDownloads).catch(() => {}); };
        socket.on('download:progress', onDlProgress);
        socket.on('download:complete', onDlProgress);
        socket.on('sync:progress', refreshSyncs);
        socket.on('sync:complete', () => { refreshSyncs(); refreshMatrix(); });
        return () => { clearInterval(interval); socket.off('download:progress', onDlProgress); socket.off('download:complete', onDlProgress); socket.off('sync:progress', refreshSyncs); socket.off('sync:complete'); };
      }, []);

      function modelOnNode(modelId, nodeName) {
        return (matrix[nodeName] || []).find(m => m.id === modelId);
      }

      async function handleLoad() {
        if (!loadModel) return;
        setLoadStatus({ status: 'loading', model: loadModel });
        try {
          const onlineCount = clusterStatus?.nodes?.filter(n => n.online)?.length || 1;
          const res = await fetch('/api/monitoring/load', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ modelId: loadModel, sharding, minNodes: onlineCount }),
          });
          if (res.ok) {
            // Don't set to running — let the exo status poller detect the real state
            setTimeout(refreshExoStatus, 2000);
          } else {
            const d = await res.json();
            setLoadStatus({ status: 'failed', model: loadModel, error: d.error });
          }
        } catch (e) { setLoadStatus({ status: 'failed', model: loadModel, error: e.message }); }
      }

      async function handleUnload() {
        await fetch('/api/monitoring/purge', { method: 'POST' });
        setLoadStatus(null);
      }

      const activeDownloads = downloads.filter(d => d.status === 'downloading');
      const queued = downloads.filter(d => d.status === 'queued');
      const history = downloads.filter(d => ['done', 'stopped', 'error'].includes(d.status));
      const nodes = clusterStatus?.nodes || [];

      function parseProgress(prog) {
        if (!prog) return { gb: 0, total: 0, pct: 0, speed: 0 };
        const parts = prog.split(':');
        return { gb: parseFloat(parts[0]) || 0, total: parseFloat(parts[1]) || 0, speed: parseFloat(parts[3]) || 0, pct: parts[1] > 0 ? Math.round(parseFloat(parts[0]) / parseFloat(parts[1]) * 100) : 0 };
      }

      return (
        <div className="flex-1 flex flex-col overflow-y-auto">
          {/* Status bar: running model + load controls */}
          <div className={`flex items-center gap-3 mx-6 mt-4 px-4 py-2.5 rounded-xl flex-shrink-0 ${
            loadStatus?.status === 'running' ? 'bg-emerald-50 border border-emerald-200' :
            loadStatus?.status === 'warming' ? 'bg-blue-50 border border-blue-200' :
            loadStatus?.status === 'loading' ? 'bg-amber-50 border border-amber-200' :
            'bg-gray-50 border border-gray-200'
          }`}>
            {loadStatus?.status === 'running' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-emerald-500" />
                <span className="text-[13px] font-semibold text-emerald-600">Running</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
                <span className="text-xs text-gray-500">· Pipeline · RDMA</span>
              </>
            ) : loadStatus?.status === 'warming' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
                <span className="text-[13px] font-semibold text-blue-600">Warming up...</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
                {loadStatus.readyRunners > 0 && <span className="mono text-[10px] text-blue-400">{loadStatus.readyRunners}/{loadStatus.totalRunners} runners ready</span>}
              </>
            ) : loadStatus?.status === 'loading' ? (
              <>
                <div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse" />
                <span className="text-[13px] font-semibold text-amber-600">Loading...</span>
                <span className="mono text-xs text-gray-700">{loadStatus.model}</span>
                {loadStatus.loadingTasks > 0 && <span className="mono text-[10px] text-amber-400">{loadStatus.loadingTasks} tasks pending</span>}
              </>
            ) : (
              <span className="text-[13px] text-gray-500">No model loaded</span>
            )}
            <div className="flex-1" />
            {canManageModels && (
              <>
                <select value={loadModel} onChange={e => {
                  setLoadModel(e.target.value);
                  if (e.target.value) {
                    fetch(`/api/chat/instance-preview?modelId=${encodeURIComponent(e.target.value)}`).then(r => r.json()).then(d => setModelPreview(d.previews?.[0] || null)).catch(() => setModelPreview(null));
                  } else { setModelPreview(null); }
                }} className="mono text-xs px-3 py-1.5 border border-gray-200 rounded-lg bg-white text-gray-900 min-w-[280px]">
                  <option value="">Select a model...</option>
                  {chatModels.map(m => <option key={m.id} value={m.id}>{m.id === activeModel ? '⚡ ' : ''}{m.id}</option>)}
                </select>
                {modelPreview && (
                  <span className="mono text-[10px] text-gray-400">{modelPreview.storageGB} GB · {modelPreview.nLayers} layers · {modelPreview.nodeCount}n</span>
                )}
                <div className="flex border border-gray-200 rounded-lg overflow-hidden bg-white">
                  <button onClick={() => setSharding('Pipeline')} className={`px-3 py-1 text-[11px] font-medium ${sharding === 'Pipeline' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Pipeline</button>
                  <button onClick={() => setSharding('Tensor')} className={`px-3 py-1 text-[11px] font-medium ${sharding === 'Tensor' ? 'bg-exo font-semibold text-gray-900' : 'text-gray-500'}`}>Tensor</button>
                </div>
                {loadStatus?.status === 'running' && (
                  <button onClick={handleUnload} className="px-3 py-1 border border-red-200 rounded-lg text-[11px] text-red-600 hover:bg-red-50">Unload</button>
                )}
                <button onClick={handleLoad} disabled={loadStatus?.status === 'loading' || loadStatus?.status === 'warming'}
                  className="px-4 py-1.5 bg-exo rounded-lg text-[11px] font-semibold text-gray-900 hover:brightness-95 disabled:opacity-40">Load</button>
              </>
            )}
          </div>

          {/* Two-column layout */}
          <div className="flex-1 flex gap-5 px-6 py-4">
            {/* Left: Matrix + Activity */}
            <div className="flex-1 flex flex-col gap-4 overflow-hidden">

              {/* Model matrix */}
              {models.length > 0 && (
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex px-4 py-2.5 bg-gray-50 border-b border-gray-200">
                  <div className="flex-[2.5]"><span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Model</span></div>
                  {nodeNames.map(name => (
                    <div key={name} className="flex-1 text-center">
                      <span className="text-[11px] font-semibold text-gray-700">{name}</span>
                      {diskInfo[name] && <div className="mono text-[9px] text-gray-400">{diskInfo[name].freeGB} GB free</div>}
                    </div>
                  ))}
                  <div className="w-[50px]" />
                </div>
                {models.map(model => {
                  const isActive = activeModel === model.id;
                  const presentOn = nodeNames.filter(n => modelOnNode(model.id, n));
                  const missingOn = nodeNames.filter(n => !modelOnNode(model.id, n));
                  return (
                    <div key={model.id} className={`flex px-4 py-3 border-b border-gray-100 items-center ${isActive ? 'bg-amber-50' : 'hover:bg-gray-50'}`}>
                      <div className="flex-[2.5] flex flex-col gap-0.5">
                        <span className={`text-[12px] font-medium text-gray-900 ${isActive ? 'font-semibold' : ''}`}>{isActive && '⚡ '}{model.id.split('/').pop()}</span>
                        <span className="mono text-[10px] text-gray-400">{model.id.split('/')[0]} · {formatBytes(model.sizeBytes)}</span>
                      </div>
                      {nodeNames.map(name => {
                        const m = modelOnNode(model.id, name);
                        return (
                          <div key={name} className="flex-1 text-center">
                            {m ? (
                              <div className="flex flex-col items-center gap-0.5">
                                <span className="text-emerald-500 text-sm">✓ <span className="mono text-[10px] text-gray-500">{formatBytes(m.sizeBytes)}</span></span>
                                <button onClick={() => {
                                  const key = `${model.id}::${name}`;
                                  setDeleteSelection(prev => { const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s; });
                                }} className={`transition-colors ${deleteSelection.has(`${model.id}::${name}`) ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}`}>
                                  {Icons.trash(deleteSelection.has(`${model.id}::${name}`) ? '#ef4444' : undefined)}
                                </button>
                              </div>
                            ) : (
                              <span className="mono text-[10px] text-gray-300">—</span>
                            )}
                          </div>
                        );
                      })}
                      <div className="w-[50px] text-right">
                        {missingOn.length > 0 && missingOn.length < nodeNames.length && (
                          <button onClick={async () => {
                            await fetch('/api/models/sync', {
                              method: 'POST', headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ modelId: model.id, sourceNode: presentOn[0], targetNodes: missingOn }),
                            });
                          }} className="text-[10px] text-indigo-500 font-medium hover:underline">Sync</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
              )}

              {/* Delete bar */}
              {deleteSelection.size > 0 && (
                <div className="flex items-center gap-3 px-4 py-2.5 bg-red-50 border border-red-200 rounded-xl">
                  <span className="text-xs text-red-700 font-medium">{deleteSelection.size} selected</span>
                  <div className="flex-1" />
                  <button onClick={() => setDeleteSelection(new Set())} className="px-3 py-1 text-xs text-gray-500 border border-gray-200 rounded-md hover:bg-white">Cancel</button>
                  <button onClick={async () => {
                    if (!confirm(`Delete ${deleteSelection.size} model(s)?`)) return;
                    setDeleting(true);
                    for (const key of deleteSelection) {
                      const [modelId, nodeName] = key.split('::');
                      await fetch('/api/models/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ modelId, nodeName }) });
                    }
                    setDeleteSelection(new Set()); setDeleting(false); refreshMatrix();
                  }} disabled={deleting} className="px-3 py-1 bg-red-500 text-white text-xs font-semibold rounded-md hover:bg-red-600 disabled:opacity-50">
                    {deleting ? 'Deleting...' : `Delete ${deleteSelection.size}`}
                  </button>
                </div>
              )}

              {/* Active syncs */}
              {activeSyncs.filter(s => s.status === 'syncing').map(s => (
                <div key={s.id} className="bg-white border border-indigo-200 rounded-xl p-3.5 flex flex-col gap-2">
                  <div className="flex items-center gap-2">
                    <div className="px-1.5 py-0.5 bg-indigo-50 rounded text-[9px] font-semibold text-indigo-500">RSYNC</div>
                    <span className="text-xs font-medium text-gray-900">{s.modelId}</span>
                    <span className="mono text-[10px] text-gray-400 flex-1">{s.sourceNode} → {(s.targetNodes || []).join(', ')}</span>
                    <button onClick={() => { fetch(`/api/models/syncs/${s.id}`, { method: 'DELETE' }); }}
                      className="text-gray-300 hover:text-red-500 transition" title="Cancel sync">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </div>
                  {s.progress && Object.entries(s.progress).map(([node, p]) => (
                    <div key={node} className="flex items-center gap-2">
                      <span className="text-[10px] text-gray-500 w-12">{node}</span>
                      <div className="flex-1 h-1.5 bg-gray-100 rounded-full"><div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${p.percent || 0}%` }} /></div>
                      <span className={`mono text-[10px] ${p.status === 'done' ? 'text-emerald-500' : p.status === 'error' ? 'text-red-500' : 'text-indigo-500'}`}>{p.status === 'done' ? '✓' : p.status === 'error' ? '✗' : `${p.percent || 0}%`}</span>
                    </div>
                  ))}
                </div>
              ))}

              {/* Activity: Downloads */}
              {(activeDownloads.length > 0 || queued.length > 0 || history.length > 0) && (
                <div className="flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Activity</span>
                  {activeDownloads.map(dl => {
                    const p = parseProgress(dl.progress);
                    return (
                      <div key={dl.id} className="bg-white border border-gray-200 rounded-xl p-3.5 flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                          <span className="text-xs font-semibold text-gray-900">{dl.modelId}</span>
                          <div className="flex items-center gap-2">
                            <span className="mono text-[10px] text-gray-500">{p.gb}/{p.total} GB</span>
                            <span className="mono text-[10px] font-semibold">{p.pct}%</span>
                            <span className="mono text-[10px] text-emerald-500">{p.speed} MB/s</span>
                            <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })} className="px-2 py-0.5 border border-red-200 rounded text-[10px] text-red-600">Stop</button>
                          </div>
                        </div>
                        <div className="h-1 bg-gray-100 rounded-full"><div className="h-full bg-exo rounded-full transition-all" style={{ width: `${p.pct}%` }} /></div>
                      </div>
                    );
                  })}
                  {queued.map((dl, i) => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 flex justify-between items-center">
                      <div className="flex items-center gap-2"><span className="mono text-[9px] text-gray-500 bg-gray-100 px-1 py-0.5 rounded">#{i+1}</span><span className="text-xs text-gray-900">{dl.modelId}</span></div>
                      <button onClick={() => fetch(`/api/download/cancel/${dl.id}`, { method: 'POST' })} className="text-[10px] text-red-600">Cancel</button>
                    </div>
                  ))}
                  {history.slice(0, 5).map(dl => (
                    <div key={dl.id} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 flex justify-between items-center">
                      <div className="flex items-center gap-2">
                        <span className={`text-sm ${dl.status === 'done' ? 'text-emerald-500' : 'text-yellow-500'}`}>{dl.status === 'done' ? '✓' : '⚠'}</span>
                        <span className="text-xs text-gray-700">{dl.modelId}</span>
                        <span className="mono text-[9px] text-gray-400">{dl.status}</span>
                      </div>
                      <div className="flex gap-2">
                        {dl.status !== 'done' && <button onClick={() => fetch(`/api/download/restart/${dl.id}`, { method: 'POST' })} className="text-[10px] text-indigo-500">Restart</button>}
                        <button onClick={() => fetch(`/api/download/${dl.id}`, { method: 'DELETE' })} className="text-[10px] text-gray-400">{Icons.trash('#9ca3af')}</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Right: Cluster Nodes */}
            <div className="w-[280px] flex flex-col gap-2 flex-shrink-0">
              <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Cluster</span>
              {nodes.map(node => {
                const metrics = nodeMetrics.find(m => m.name === node.name);
                const ram = ramData.find(r => r.name === node.name);
                return (
                  <div key={node.name} className={`bg-white border rounded-xl p-3 flex flex-col gap-1.5 ${node.online ? 'border-gray-200' : 'border-red-200 opacity-60'}`}>
                    <div className="flex justify-between items-center">
                      <div className="flex items-center gap-1.5">
                        <div className={`w-[6px] h-[6px] rounded-full ${node.online ? 'bg-emerald-500' : 'bg-red-500'}`} />
                        <span className="text-xs font-semibold text-gray-900">{node.name}</span>
                      </div>
                      <span className="mono text-[9px] text-gray-400">{node.ip}</span>
                    </div>
                    {node.online ? (
                      <>
                        <div className="flex flex-col gap-1">
                          <div className="flex justify-between"><span className="text-[10px] text-gray-500">RAM</span><span className="mono text-[10px] text-gray-500">{ram ? `${ram.used}/${ram.total} GB` : '—'}</span></div>
                          <div className="h-[3px] bg-gray-100 rounded-full"><div className="h-full bg-emerald-500 rounded-full" style={{ width: `${ram?.percent || 0}%`, minWidth: '4px' }} /></div>
                        </div>
                        <div className="flex gap-3 items-center">
                          <span className="mono text-[9px] text-gray-400">GPU {metrics?.gpuPct ?? '—'}%</span>
                          <span className="mono text-[9px] text-gray-400">{metrics?.tempC ?? '—'}°C</span>
                          <span className="mono text-[9px] text-gray-400">{metrics?.watts ?? '—'}W</span>
                          <div className="flex-1" />
                          {diskInfo[node.name] && (() => {
                            const free = diskInfo[node.name].freeGB;
                            const total = diskInfo[node.name].totalGB || (free + 1);
                            const usedPct = total > 0 ? Math.round((1 - free / total) * 100) : 0;
                            const color = usedPct > 90 ? 'border-red-400 text-red-600' : usedPct > 75 ? 'border-amber-400 text-amber-600' : 'border-emerald-400 text-emerald-600';
                            return <span className={`mono text-[9px] px-1.5 py-0.5 border rounded flex items-center gap-1 ${color}`}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>{free} GB free</span>;
                          })()}
                        </div>
                      </>
                    ) : (
                      <span className="text-[10px] text-red-500">Offline</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODELS PAGE
    // ═══════════════════════════════════════════════════════════════════

    function ModelsPage({ clusterStatus }) {
      const [matrixData, setMatrixData] = useState({ nodes: [], models: [], matrix: {}, activeModel: null, diskInfo: {} });
      const [chatModels, setChatModels] = useState([]);
      const [loadModel, setLoadModel] = useState('');
      const [sharding, setSharding] = useState('Pipeline');
      const [loadStatus, setLoadStatus] = useState(null);
      const [activeSyncs, setActiveSyncs] = useState([]);
      const [deleteSelection, setDeleteSelection] = useState(new Set()); // "modelId::nodeName"
      const [deleting, setDeleting] = useState(false);

      function refreshMatrix() {
        fetch('/api/models/matrix').then(r => r.json()).then(d => {
          setMatrixData(d);
          if (d.activeModel && !loadModel) {
            setLoadModel(d.activeModel);
            setLoadStatus({ status: 'running', model: d.activeModel });
          }
        }).catch(() => {});
        fetch('/api/chat/models?engine=exo1').then(r => r.json()).then(d => setChatModels(d.models || [])).catch(() => {});
      }
      function refreshSyncs() {
        fetch('/api/models/syncs').then(r => r.json()).then(setActiveSyncs).catch(() => {});
      }

      useEffect(() => {
        refreshMatrix();
        refreshSyncs();
        // Poll every 10s
