          openRouterApiKey: openRouterKey,
          setupComplete: nodes.length > 0,
        };
        setSaveStatus('saving');
        await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
        refreshSettings();
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(null), 2000);
      }

      async function discover() {
        setDiscovering(true);
        try {
          const res = await fetch('/api/discover');
          const data = await res.json();
          setDiscovered(data);
        } catch (e) {}
        setDiscovering(false);
      }

      function addNode() {
        if (!newNodeName || !newNodeIp) return;
        setNodes(prev => [...prev, { name: newNodeName, ip: newNodeIp, ram: newNodeRam || '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(newNodeIp);
        setNewNodeName(''); setNewNodeIp(''); setNewNodeRam('');
      }

      function addDiscoveredNode(ip) {
        const name = `node-${ip.split('.').pop()}`;
        setNodes(prev => [...prev, { name, ip, ram: '—', paths: { exo: '~/.exo/models' } }]);
        if (!exoIp) setExoIp(ip);
      }

      function removeNode(i) {
        setNodes(prev => prev.filter((_, idx) => idx !== i));
      }

      async function testSSH() {
        const results = {};
        for (const node of nodes) {
          try {
            const r = await fetch('/api/ssh/test', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ip: node.ip, user: sshUser }),
            });
            const data = await r.json();
            results[node.ip] = { ok: data.connected, method: data.method };
          } catch (e) {
            results[node.ip] = { ok: false, method: 'error' };
          }
        }
        setSshStatus(results);
      }

      async function setupSSHKeys() {
        const nodesWithPwd = nodes.filter(n => passwords[n.ip]).map(n => ({
          ip: n.ip, user: sshUser, password: passwords[n.ip],
        }));
        if (nodesWithPwd.length === 0) { setSetupResult('Enter passwords for nodes first'); return; }
        setSetupResult('Installing SSH keys...');
        try {
          const r = await fetch('/api/ssh/setup-keys', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nodes: nodesWithPwd }),
          });
          const data = await r.json();
          const ok = data.results?.filter(r => r.ok)?.length || 0;
          const fail = data.results?.filter(r => !r.ok)?.length || 0;
          const interOk = data.interNodeResults?.filter(r => r.ok)?.length || 0;
          const interFail = data.interNodeResults?.filter(r => !r.ok)?.length || 0;
          setSetupResult(`Container→nodes: ${ok} OK. Inter-node: ${interOk} OK${interFail ? `, ${interFail} failed` : ''}. Total: ${ok + interOk} keys`);
          // Clear passwords after setup
          setPasswords({});
          // Re-test
          setTimeout(testSSH, 1000);
        } catch (e) {
          setSetupResult(`Error: ${e.message}`);
        }
      }

      async function testEndpoint() {
        try {
          // Save current endpoint first so backend uses it
          const updated = { ...settings, chat: { exo1: { name: 'EXO', ip: exoIp, port: exoPort } }, sshUser };
          await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
          // Test via backend proxy (avoids CORS)
          const res = await fetch('/api/chat/active-model?engine=exo1');
          setTestResult(res.ok ? 'connected' : 'failed');
        } catch (e) {
          setTestResult('failed');
        }
        setTimeout(() => setTestResult(null), 5000);
      }

      return (
        <div className="flex-1 flex gap-8 px-10 py-5 overflow-y-auto">
          <div className="flex-1 flex flex-col gap-7">
            <span className="text-[22px] font-bold text-gray-900">Settings</span>

            {/* EXO Nodes */}
            <div className="flex flex-col gap-3">
              <div className="flex justify-between items-center">
                <span className="text-sm font-semibold text-gray-900">EXO Nodes</span>
                <div className="flex gap-2">
                  <button onClick={discover} disabled={discovering}
                    className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                    {discovering ? 'Scanning...' : '🔍 Re-discover'}
                  </button>
                </div>
              </div>

              {/* Discovered nodes */}
              {discovered.length > 0 && (
                <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 flex flex-col gap-2">
                  <span className="text-[11px] font-semibold text-indigo-600 uppercase">Discovered on LAN</span>
                  {discovered.map(d => (
                    <div key={d.ip} className="flex items-center justify-between">
                      <span className="mono text-xs text-gray-700">{d.ip}:{d.port} — {d.modelCount} models</span>
                      {!nodes.find(n => n.ip === d.ip) ? (
                        <button onClick={() => addDiscoveredNode(d.ip)} className="text-[11px] text-indigo-600 hover:underline">+ Add</button>
                      ) : (
                        <span className="text-[11px] text-gray-400">Already added</span>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* Nodes table */}
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="flex px-4 py-2 bg-gray-50 border-b border-gray-200">
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Name</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">IP Address</div>
                  <div className="flex-1 text-[11px] font-semibold text-gray-400 uppercase tracking-wider">RAM</div>
                  <div className="flex-[2] text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Password (for SSH setup)</div>
                  <div className="w-[80px] text-[11px] font-semibold text-gray-400 uppercase tracking-wider text-center">SSH</div>
                  <div className="w-[60px]" />
                </div>
                {nodes.map((node, i) => (
                  <div key={i} className="flex px-4 py-2.5 border-b border-gray-100 items-center">
                    <div className="flex-[2] text-[13px] font-medium text-gray-900">{node.name}</div>
                    <div className="flex-[2] mono text-xs text-gray-500">{node.ip}</div>
                    <div className="flex-1 text-xs text-gray-500">{node.ram}</div>
                    <div className="flex-[2] flex items-center gap-1">
                      <input type={showPasswords[node.ip] ? 'text' : 'password'}
                        value={passwords[node.ip] || ''} onChange={e => setPasswords(p => ({ ...p, [node.ip]: e.target.value }))}
                        placeholder="••••••" className="mono text-xs px-2 py-1 border border-gray-200 rounded bg-white w-full" />
                      <button onClick={() => setShowPasswords(p => ({ ...p, [node.ip]: !p[node.ip] }))}
                        className="text-gray-400 hover:text-gray-600 flex-shrink-0">{showPasswords[node.ip] ? Icons.eyeOff('#9ca3af') : Icons.eye('#9ca3af')}</button>
                    </div>
                    <div className="w-[80px] text-center">
                      {sshStatus[node.ip] ? (
                        <span className={`text-[11px] font-medium ${sshStatus[node.ip].ok ? 'text-emerald-500' : 'text-red-500'}`}>
                          {sshStatus[node.ip].ok ? '✓ Key' : '✗ No key'}
                        </span>
                      ) : (
                        <span className="text-[11px] text-gray-300">—</span>
                      )}
                    </div>
                    <div className="w-[60px] text-right">
                      <button onClick={() => removeNode(i)} className="text-xs text-red-400 hover:text-red-600">Remove</button>
                    </div>
                  </div>
                ))}
                {/* Add row */}
                <div className="flex px-4 py-2 items-center gap-2 bg-gray-50">
                  <input type="text" value={newNodeName} onChange={e => setNewNodeName(e.target.value)} placeholder="Name" className="flex-[2] text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeIp} onChange={e => setNewNodeIp(e.target.value)} placeholder="IP Address" className="flex-[2] mono text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <input type="text" value={newNodeRam} onChange={e => setNewNodeRam(e.target.value)} placeholder="RAM" className="flex-1 text-xs px-2 py-1.5 border border-gray-200 rounded bg-white" />
                  <button onClick={addNode} className="px-3 py-1.5 bg-exo rounded text-xs font-semibold text-gray-900 hover:brightness-95">+ Add</button>
                </div>
              </div>
              {/* SSH actions */}
              <div className="flex items-center gap-3 mt-1">
                <button onClick={testSSH} className="px-3 py-1.5 border border-gray-200 rounded-md text-xs text-gray-500 hover:bg-gray-50 flex items-center gap-1.5">
                  {Icons.key('#6b7280')} Test SSH Keys
                </button>
                <button onClick={setupSSHKeys} className="px-3 py-1.5 bg-exo rounded-md text-xs font-semibold text-gray-900 hover:brightness-95 flex items-center gap-1.5">
                  {Icons.lock('#111827')} Setup SSH Keys
                </button>
                {setupResult && <span className="text-xs text-gray-500">{setupResult}</span>}
                <div className="flex-1" />
                <button onClick={async () => {
                  setChecking(true); setConfigCheck(null);
                  try {
                    const r = await fetch('/api/config-check', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                    setConfigCheck(await r.json());
                  } catch (e) { setConfigCheck({ error: e.message }); }
                  setChecking(false);
                }} disabled={checking || nodes.length === 0}
                  className="px-3 py-1.5 border border-indigo-200 bg-indigo-50 rounded-md text-xs font-semibold text-indigo-600 hover:bg-indigo-100 disabled:opacity-50 flex items-center gap-1.5">
                  {checking ? 'Checking...' : 'Check Config'}
                </button>
              </div>
            </div>

            {/* Config Check Results */}
            {configCheck && configCheck.nodes && (
              <div className="bg-white border border-gray-200 rounded-xl">
                <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                  <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Config Check Results</span>
                  <button onClick={() => setConfigCheck(null)} className="text-[11px] text-gray-400 hover:text-gray-600">×</button>
                </div>
                {configCheck.nodes.map(node => {
                  const c = node.checks;
                  const Dot = ({ ok }) => <div className={`w-2 h-2 rounded-full flex-shrink-0 ${ok ? 'bg-emerald-500' : ok === false ? 'bg-red-500' : 'bg-gray-300'}`} />;
                  const allOk = c.ssh && c.exoApi && c.python && (c.huggingfaceHub === null || c.huggingfaceHub) && c.rsync && c.modelPath;
                  return (
                    <div key={node.name} className="px-4 py-3 border-b border-gray-100">
                      <div className="flex items-center gap-2 mb-2">
                        <Dot ok={allOk} />
                        <span className="text-[13px] font-semibold text-gray-900">{node.name}</span>
                        <span className="mono text-[10px] text-gray-400">{node.ip}</span>
                        {allOk && <span className="text-[10px] text-emerald-500 font-medium">All checks passed</span>}
                      </div>
                      <div className="grid grid-cols-4 gap-2 ml-4">
                        <div className="flex items-center gap-1.5"><Dot ok={c.ssh} /><span className="text-[11px] text-gray-600">SSH</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.exoApi} /><span className="text-[11px] text-gray-600">exo API</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.python} /><span className="text-[11px] text-gray-600">Python3 {c.pythonVersion ? <span className="mono text-[9px] text-gray-400">{c.pythonVersion.replace('Python ','')}</span> : ''}</span></div>
                        <div className="flex items-center gap-1.5">
                          {c.huggingfaceHub === null ? <div className="w-2 h-2 rounded-full bg-gray-200 flex-shrink-0" /> : <Dot ok={c.huggingfaceHub} />}
                          <span className="text-[11px] text-gray-600">huggingface_hub {c.hfHubVersion ? <span className="mono text-[9px] text-gray-400">{c.hfHubVersion}</span> : c.huggingfaceHub === null ? <span className="text-[9px] text-gray-300">not required</span> : ''}</span>
                        </div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.rsync} /><span className="text-[11px] text-gray-600">rsync</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={c.modelPath} /><span className="text-[11px] text-gray-600">~/.exo/models/</span></div>
                        <div className="flex items-center gap-1.5"><Dot ok={!!c.diskFree} /><span className="text-[11px] text-gray-600">Disk {c.diskFree || '—'} free</span></div>
                        {c.interNodeSSH && (
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="text-[11px] text-gray-600">SSH→</span>
                            {Object.entries(c.interNodeSSH).map(([name, ok]) => (
                              <span key={name} className="flex items-center gap-0.5"><Dot ok={ok} /><span className="text-[9px] text-gray-400">{name}</span></span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* EXO Endpoint */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">EXO Endpoint</span>
              <div className="flex gap-3 items-center">
                <input type="text" value={exoIp} onChange={e => setExoIp(e.target.value)} placeholder="192.168.86.29"
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[200px]" />
                <span className="text-gray-400">:</span>
                <input type="number" value={exoPort} onChange={e => setExoPort(parseInt(e.target.value) || 52415)}
                  className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[80px]" />
                <button onClick={testEndpoint} className="px-3.5 py-2 border border-gray-200 rounded-lg text-xs text-gray-500 hover:bg-gray-50">Test</button>
                {testResult && (
                  <div className="flex items-center gap-1.5">
                    <div className={`w-1.5 h-1.5 rounded-full ${testResult === 'connected' ? 'bg-emerald-500' : 'bg-red-500'}`} />
                    <span className={`text-xs ${testResult === 'connected' ? 'text-emerald-600' : 'text-red-600'}`}>
                      {testResult === 'connected' ? 'Connected' : 'Failed'}
                    </span>
                  </div>
                )}
              </div>
            </div>

            {/* SSH */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">SSH</span>
              <div className="flex gap-4">
                <div className="flex flex-col gap-1 flex-1">
                  <span className="text-xs text-gray-500">User</span>
                  <input type="text" value={sshUser} onChange={e => setSshUser(e.target.value)}
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white" />
                </div>
                <div className="flex flex-col gap-1 flex-[2]">
                  <span className="text-xs text-gray-500">Key path</span>
                  <input type="text" value={settings?.sshOpts?.match(/-i\s+(\S+)/)?.[1] || '/root/.ssh/id_ed25519'} readOnly
                    className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500" />
                </div>
              </div>
            </div>

            {/* OpenRouter */}
            <div className="flex flex-col gap-2.5">
              <span className="text-sm font-semibold text-gray-900">OpenRouter (optional cloud fallback)</span>
              <p className="text-xs text-gray-400">Add your OpenRouter API key to access cloud models alongside your local exo cluster.</p>
              <div className="flex gap-3 items-center">
                <input type="password" value={openRouterKey} onChange={e => setOpenRouterKey(e.target.value)}
                  placeholder="sk-or-..." className="mono text-[13px] px-3 py-2 border border-gray-200 rounded-lg bg-white w-[400px]" />
                {openRouterKey && <span className="text-[11px] text-emerald-500">Key configured</span>}
              </div>
            </div>

            {/* Accessibility — TTS */}
            <div className="flex flex-col gap-3">
              <span className="text-sm font-semibold text-gray-900">Accessibility</span>
              <p className="text-xs text-gray-400">Read assistant responses aloud using your browser's built-in text-to-speech. Works offline, no API key needed.</p>
              <div className="flex items-center gap-4">
                <button onClick={() => {
                  const cur = localStorage.getItem('exoscopy-tts-enabled') === 'true';
                  localStorage.setItem('exoscopy-tts-enabled', !cur);
                  setTtsSettingsKey(k => k + 1);
                  window.dispatchEvent(new Event('tts-settings-changed'));
                }} className={`relative w-11 h-6 rounded-full transition-colors ${localStorage.getItem('exoscopy-tts-enabled') === 'true' ? 'bg-indigo-500' : 'bg-gray-300'}`}>
                  <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${localStorage.getItem('exoscopy-tts-enabled') === 'true' ? 'translate-x-[22px]' : 'translate-x-0.5'}`} />
                </button>
                <span className="text-xs text-gray-600">{localStorage.getItem('exoscopy-tts-enabled') === 'true' ? 'Auto-read enabled' : 'Disabled'}</span>
              </div>
              <div className="flex flex-col gap-2">
                <span className="text-xs text-gray-500">Voice</span>
                <select value={localStorage.getItem('exoscopy-tts-voice') || ''} onChange={e => {
                  localStorage.setItem('exoscopy-tts-voice', e.target.value);
                  setTtsSettingsKey(k => k + 1);
                  window.dispatchEvent(new Event('tts-settings-changed'));
                }} className="text-sm px-3 py-2 border border-gray-200 rounded-lg bg-white w-[400px]">
                  <option value="">System default</option>
                  {availableVoices.map(v => (
                    <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang}){v.localService ? '' : ' — online'}</option>
                  ))}
                </select>
                <button onClick={() => {
                  TTS.speak('Hello! This is how I will read responses for you.', localStorage.getItem('exoscopy-tts-voice') || '');
                }} className="self-start px-3 py-1.5 text-xs text-gray-600 bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 flex items-center gap-1.5">
                  {Icons.speaker('#6b7280')} Test voice
                </button>
              </div>
            </div>

            {/* Administrator Mode */}
            <div className="flex flex-col gap-3">
              <span className="text-sm font-semibold text-gray-900">Administrator Mode</span>
              <p className="text-xs text-gray-400">When enabled, users must log in. Only the admin can access Settings, Downloads, and manage cluster.</p>
              <div className="flex items-center gap-4">
                <button onClick={() => { if (settings?.adminMode) toggleAdminMode(); }}
                  className={`relative w-11 h-6 rounded-full transition-colors ${settings?.adminMode ? 'bg-indigo-500' : 'bg-gray-300 cursor-default'}`}>
                  <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${settings?.adminMode ? 'translate-x-[22px]' : 'translate-x-0.5'}`} />
                </button>
                <span className="text-xs text-gray-600">{settings?.adminMode ? 'Enabled' : 'Disabled'}</span>
              </div>
              {!settings?.adminMode && (
                <div className="flex items-center gap-3">
                  <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)}
                    placeholder="Set admin password..." className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[250px]" />
                  <button onClick={toggleAdminMode} disabled={!adminPassword}
                    className="px-4 py-2 bg-indigo-500 text-white text-xs font-semibold rounded-lg hover:bg-indigo-600 transition disabled:opacity-40">
                    Enable
                  </button>
                </div>
              )}
              {adminToggleError && <span className="text-xs text-red-500">{adminToggleError}</span>}
            </div>

            {/* Guest Mode (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <span className="text-sm font-semibold text-gray-900">Guest Access</span>
                <p className="text-xs text-gray-400">Allow unauthenticated users to chat with a token limit per session.</p>
                <div className="flex items-center gap-4">
                  <button onClick={async () => {
                    await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ guestMode: !settings.guestMode }) });
                    refreshSettings();
                  }} className={`relative w-11 h-6 rounded-full transition-colors ${settings.guestMode ? 'bg-indigo-500' : 'bg-gray-300'}`}>
                    <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${settings.guestMode ? 'translate-x-[22px]' : 'translate-x-0.5'}`} />
                  </button>
                  <span className="text-xs text-gray-600">{settings.guestMode ? 'Enabled' : 'Disabled'}</span>
                  {settings.guestMode && (
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-400">Limit:</span>
                      <input type="number" value={settings.guestTokenLimit || 50000}
                        onChange={async e => {
                          await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ guestTokenLimit: parseInt(e.target.value) || 50000 }) });
                          refreshSettings();
                        }}
                        className="w-[100px] px-2 py-1 border border-gray-200 rounded text-xs text-center" />
                      <span className="text-xs text-gray-400">tokens/session</span>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Auth Log (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <div className="flex items-center justify-between">
                  <span className="text-sm font-semibold text-gray-900">Connection Log</span>
                  <div className="flex items-center gap-2">
                    {authLogOpen && (
                      <>
                        <button onClick={refreshAuthLog} className="text-[11px] text-gray-400 hover:text-gray-600">Refresh</button>
                        <button onClick={async () => {
                          await fetch('/api/admin/auth-log', { method: 'DELETE' });
                          setAuthLog([]);
                        }} className="text-[11px] text-gray-400 hover:text-red-500">Clear</button>
                      </>
                    )}
                    <button onClick={() => setAuthLogOpen(!authLogOpen)}
                      className="text-[11px] text-indigo-500 hover:text-indigo-700">{authLogOpen ? 'Hide' : 'Show'}</button>
                  </div>
                </div>
                {authLogOpen && (
                  <div className="border border-gray-200 rounded-lg overflow-hidden">
                    {authLog.length === 0 ? (
                      <div className="px-4 py-6 text-center text-xs text-gray-400">No connections logged yet</div>
                    ) : (
                      <div className="max-h-[300px] overflow-y-auto">
                        <table className="w-full text-sm">
                          <thead className="sticky top-0">
                            <tr className="bg-gray-50 border-b border-gray-200">
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Time</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">User</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Action</th>
                              <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">IP</th>
                            </tr>
                          </thead>
                          <tbody>
                            {[...authLog].reverse().map((entry, i) => (
                              <tr key={i} className="border-b border-gray-100 last:border-0">
                                <td className="px-4 py-2 text-xs text-gray-500 whitespace-nowrap mono">
                                  {new Date(entry.ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' })}
                                </td>
                                <td className="px-4 py-2 text-xs text-gray-900 font-medium">{entry.username}</td>
                                <td className="px-4 py-2">
                                  <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                                    entry.action === 'login' ? 'bg-emerald-100 text-emerald-600' :
                                    entry.action === 'logout' ? 'bg-gray-100 text-gray-600' :
                                    entry.action === 'guest' ? 'bg-amber-100 text-amber-600' :
                                    entry.action === 'login_failed' ? 'bg-red-100 text-red-600' :
                                    'bg-gray-100 text-gray-600'
                                  }`}>{entry.action === 'login_failed' ? 'failed' : entry.action}</span>
                                </td>
                                <td className="px-4 py-2 text-xs text-gray-400 mono">{entry.ip?.replace('::ffff:', '')}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* User Management (admin mode only) */}
            {settings?.adminMode && (
              <div className="flex flex-col gap-3">
                <span className="text-sm font-semibold text-gray-900">Users</span>
                <div className="border border-gray-200 rounded-lg overflow-hidden">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-200">
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Username</th>
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Role</th>
                        <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500">Status</th>
                        <th className="text-right px-4 py-2 text-xs font-semibold text-gray-500">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {users.map(u => (
                        <tr key={u.username} className="border-b border-gray-100 last:border-0">
                          <td className="px-4 py-2.5 text-gray-900 font-medium">{u.username}</td>
                          <td className="px-4 py-2.5">
                            <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                              u.role === 'admin' ? 'bg-indigo-100 text-indigo-600' :
                              u.role === 'organizer' ? 'bg-amber-100 text-amber-600' :
                              'bg-gray-100 text-gray-600'
                            }`}>{u.role}</span>
                          </td>
                          <td className="px-4 py-2.5">
                            <span className={`text-xs ${u.active ? 'text-emerald-600' : 'text-gray-400'}`}>{u.active ? 'Active' : 'Inactive'}</span>
                          </td>
                          <td className="px-4 py-2.5 text-right">
                            {u.username !== 'admin' && (
                              <div className="flex items-center justify-end gap-2">
                                <select value={u.role} onChange={async e => {
                                  await fetch(`/api/admin/users/${u.username}`, {
                                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ role: e.target.value }),
                                  });
                                  fetch('/api/admin/users').then(r => r.json()).then(setUsers).catch(() => {});
                                }} className="text-[11px] px-1.5 py-0.5 border border-gray-200 rounded bg-white text-gray-600">
                                  <option value="user">user</option>
                                  <option value="organizer">organizer</option>
                                  <option value="admin">admin</option>
                                </select>
                                <button onClick={() => toggleUserActive(u.username, u.active)}
                                  className="text-[11px] text-gray-400 hover:text-gray-600">{u.active ? 'Deactivate' : 'Activate'}</button>
                                <button onClick={() => deleteUserAccount(u.username)}
                                  className="text-[11px] text-gray-400 hover:text-red-500">Delete</button>
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {/* Add user form */}
                <div className="flex items-center gap-3">
                  <input type="text" value={newUser.username} onChange={e => setNewUser(p => ({ ...p, username: e.target.value }))}
                    placeholder="Username" className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[140px]" />
                  <input type="password" value={newUser.password} onChange={e => setNewUser(p => ({ ...p, password: e.target.value }))}
                    placeholder="Password" className="px-3 py-2 border border-gray-200 rounded-lg text-sm w-[140px]" />
                  <select value={newUser.role} onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))}
                    className="px-2 py-2 border border-gray-200 rounded-lg text-sm text-gray-600">
                    <option value="user">user</option>
                    <option value="organizer">organizer</option>
                    <option value="admin">admin</option>
                  </select>
                  <button onClick={addUserAccount} disabled={!newUser.username || !newUser.password}
                    className="px-4 py-2 bg-exo text-gray-900 text-xs font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40">
                    Add User
                  </button>
                </div>
                {userError && <span className="text-xs text-red-500">{userError}</span>}
              </div>
            )}

            {/* Save */}
            <button onClick={save} disabled={saveStatus === 'saving'}
              className={`self-start px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 ${
                saveStatus === 'saved' ? 'bg-emerald-500 text-white scale-[1.02]' : 'bg-exo text-gray-900 hover:brightness-95'
              } disabled:opacity-60`}>
              {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? '✓ Saved' : 'Save Settings'}
            </button>
          </div>

          {/* About card */}
          <div className="w-[260px] flex-shrink-0">
            <div className="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-3.5">
              <span className="text-sm font-semibold text-gray-900">About</span>
              <div className="flex flex-col gap-2">
                <div className="flex justify-between"><span className="text-xs text-gray-500">Version</span><span className="mono text-xs text-gray-900">{settings?.version || '—'}</span></div>
                <div className="flex justify-between"><span className="text-xs text-gray-500">Nodes</span><span className="text-xs text-gray-900">{nodes.length} configured</span></div>
              </div>
              <div className="h-px bg-gray-100" />
              <div className="flex flex-col gap-2">
                <a href="https://github.com/Sofille65/exoscopy" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ ExoScopy on GitHub</a>
                <a href="https://github.com/exo-explore/exo" target="_blank" className="text-xs text-indigo-500 hover:underline">↗ exo on GitHub</a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════════════

    function LoginScreen({ onLogin, guestMode }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleLogin(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || 'Login failed'); setLoading(false); return; }
          onLogin(data);
        } catch (e) { setError('Connection error'); setLoading(false); }
      }

      async function handleGuest() {
        setError('');
        setLoading(true);
        try {
          const res = await fetch('/api/auth/guest', { method: 'POST' });
          const data = await res.json();
          if (!res.ok) { setError(data.error || 'Guest access failed'); setLoading(false); return; }
          onLogin(data);
        } catch (e) { setError('Connection error'); setLoading(false); }
      }

      return (
        <div className="h-screen flex items-center justify-center bg-gray-50">
          <form onSubmit={handleLogin} className="bg-white border border-gray-200 rounded-2xl p-8 w-[380px] flex flex-col gap-5 shadow-sm">
            <div className="flex flex-col items-center gap-2">
              <img src="logo.png" alt="" className="w-10 h-10" />
              <span className="text-xl font-bold text-gray-900">ExoScopy</span>
              <span className="text-xs text-gray-400">Sign in to continue</span>
            </div>
            {error && <div className="text-xs text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{error}</div>}
            <div className="flex flex-col gap-3">
              <input type="text" value={username} onChange={e => setUsername(e.target.value)}
                placeholder="Username" autoFocus autoComplete="username"
                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-exo transition-colors" />
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                placeholder="Password" autoComplete="current-password"
                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-exo transition-colors" />
            </div>
            <button type="submit" disabled={loading || !username || !password}
              className="px-4 py-2.5 bg-exo text-gray-900 text-sm font-semibold rounded-lg hover:brightness-95 transition disabled:opacity-40">
              {loading ? 'Signing in...' : 'Sign in'}
            </button>
            {guestMode && (
              <>
                <div className="flex items-center gap-3">
                  <div className="flex-1 h-px bg-gray-200" />
                  <span className="text-[11px] text-gray-400">or</span>
                  <div className="flex-1 h-px bg-gray-200" />
                </div>
                <button type="button" onClick={handleGuest} disabled={loading}
                  className="px-4 py-2.5 border border-gray-200 text-sm text-gray-600 font-medium rounded-lg hover:bg-gray-50 transition disabled:opacity-40 flex flex-col items-center gap-0.5">
                  <span>Try as Guest</span>
                  <span className="text-[10px] text-gray-400 font-normal">Chat only — limited tokens</span>
                </button>
              </>
            )}
          </form>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // APP — Router
    // ═══════════════════════════════════════════════════════════════════

    function App() {
      const [page, setPage] = useState('Chat');
      const [settings, setSettings] = useState(null);
      const [clusterStatus, setClusterStatus] = useState(null);
      const [showHelp, setShowHelp] = useState(false);
      const [authState, setAuthState] = useState(null); // null=loading, {adminMode, user}
      const [activeStreamCount, setActiveStreamCount] = useState(0);

      // Track active streams globally for NavBar badge
      useEffect(() => {
        const handler = (ids) => setActiveStreamCount(ids.length);
        StreamManager.onGlobal(handler);
        return () => StreamManager.offGlobal(handler);
      }, []);

      function refreshSettings() {
        fetch('/api/settings').then(r => r.json()).then(setSettings).catch(() => {});
      }

      // Check auth status on mount
      useEffect(() => {
        async function checkAuth() {
          try {
            const statusRes = await fetch('/api/auth/status');
            const { adminMode, guestMode } = await statusRes.json();
            if (!adminMode) {
              setAuthState({ adminMode: false, guestMode: false, user: null });
            } else {
              // Try to restore session
              const meRes = await fetch('/api/auth/me');
              if (meRes.ok) {
                const user = await meRes.json();
                setAuthState({ adminMode: true, guestMode, user });
              } else {
                setAuthState({ adminMode: true, guestMode, user: null });
              }
            }
          } catch (e) {
            setAuthState({ adminMode: false, user: null });
          }
        }
        checkAuth();
      }, []);

      useEffect(() => {
        if (authState && (authState.user || !authState.adminMode)) {
          refreshSettings();
          const fetchStatus = () => {
            fetch('/api/monitoring/status').then(r => r.json()).then(setClusterStatus).catch(() => {});
          };
          fetchStatus();
          const interval = setInterval(fetchStatus, 15000);
          return () => clearInterval(interval);
        }
      }, [authState]);

      async function handleLogout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        setAuthState({ adminMode: true, user: null });
        setPage('Chat');
      }

      function handleLogin(user) {
        setAuthState(prev => ({ ...prev, adminMode: true, user }));
      }

      // Refresh guest token count periodically
      useEffect(() => {
        if (authState?.user?.role !== 'guest') return;
        const refresh = () => {
          fetch('/api/auth/me').then(r => r.ok ? r.json() : null).then(user => {
            if (user) setAuthState(prev => ({ ...prev, user }));
          }).catch(() => {});
        };
        const interval = setInterval(refresh, 10000);
        return () => clearInterval(interval);
      }, [authState?.user?.role]);

      // Auth loading
      if (!authState) return (
        <div className="h-screen flex items-center justify-center bg-gray-50">
          <span className="text-sm text-gray-400">Loading...</span>
        </div>
      );

      // Login required
      if (authState.adminMode && !authState.user) return <LoginScreen onLogin={handleLogin} guestMode={authState.guestMode} />;

      const userRole = authState.user?.role || null;

      return (
        <div className="h-screen flex flex-col">
          <NavBar page={page} setPage={setPage} version={settings?.version} clusterStatus={clusterStatus}
            showHelp={showHelp} setShowHelp={setShowHelp}
            user={authState.user} onLogout={handleLogout} activeStreamCount={activeStreamCount} />
          {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
          {page === 'Chat' && <ChatPage clusterStatus={clusterStatus} settings={settings} userRole={userRole} />}
          {page === 'Dashboard' && <DashboardPage clusterStatus={clusterStatus} userRole={userRole} />}
          {page === 'Downloads' && (!userRole || userRole === 'admin') && <DownloadsPage />}
          {page === 'Settings' && (!userRole || userRole === 'admin') && <SettingsPage settings={settings} refreshSettings={refreshSettings} authState={authState} setAuthState={setAuthState} />}
        </div>
      );
    }

    // ─── Error Boundary ───────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      render() {
        if (this.state.error) {
          return (
            <div className="h-screen flex items-center justify-center bg-gray-50">
              <div className="text-center max-w-md">
                <h1 className="text-xl font-bold text-red-600 mb-2">Something went wrong</h1>
                <p className="text-sm text-gray-500 mb-4">{this.state.error.message}</p>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-exo rounded-lg text-sm font-semibold">Reload</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );
  </script>
</body>
</html>
